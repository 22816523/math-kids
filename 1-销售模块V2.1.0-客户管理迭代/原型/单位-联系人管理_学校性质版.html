    (() => {

      const provinceData = [

        {

          cities: [
            {

              dists: [
                { value: '510104', html: '&#38177;&#27743;&#21306;' },
                { value: '510106', html: '&#37329;&#29275;&#21306;' }
              ]
            },
            {
              value: '510700',
              html: '&#32485;&#38451;&#24066;',
              dists: [
                { value: '510703', html: '&#28023;&#22478;&#21306;' },
                { value: '510704', html: '&#28201;&#27743;&#21306;' }
              ]
            }
          ]
        },
        {
          value: '530000',
          html: '&#20113;&#21335;&#30465;',
          cities: [
            {
              value: '530100',
              html: '&#26118;&#26126;&#24066;',
              dists: [
                { value: '530102', html: '&#20116;&#21326;&#21306;' },
                { value: '530103', html: '&#30424;&#40857;&#21306;' }
              ]
            }
          ]
        }
      ];

      const staticOptions = {
        0: [
          { value: '0', html: '&#26410;&#24320;&#36890;' },
          { value: '1', html: '&#24050;&#24320;&#36890;' },
          { value: '2', html: '&#36864;&#22238;' },
          { value: '9', html: '&#20572;&#29992;' }
        ],
        5: [
          { value: '1', html: '&#20065;&#38215;&#20013;&#24515;&#23567;&#23398;' },
          { value: '2', html: '&#20844;&#21150;&#23398;&#26657;' },
          { value: '3', html: '&#27665;&#21150;&#23398;&#26657;' },
          { value: '4', html: '&#32844;&#19994;&#23398;&#26657;' }
        ],
        6: [
          { value: '1', html: '&#20844;&#21150;' },
          { value: '2', html: '&#27665;&#21150;' }
        ],
        7: [
          { value: '1', html: '&#23567;&#23398;' },
          { value: '2', html: '&#21021;&#20013;' },
          { value: '3', html: '&#39640;&#20013;' },
          { value: '4', html: '&#23398;&#21069;' }
        ],
        8: [
          { value: '1', html: '&#26412;&#22320;&#24211;' },
          { value: '2', html: '&#25163;&#21160;&#22635;&#20889;' },
          { value: '3', html: '&#20225;&#26597;&#26597;' }
        ],
        9: [
          { value: '1', html: '&#26222;&#36890;' },
          { value: '2', html: '&#19987;&#29992;' },
          { value: '3', html: '&#20869;&#37096;' }
        ]
      };

      const inputIndexes = new Set([1, 10]);
      const fields = Array.from(document.querySelectorAll('.grid .field')).filter(field => field.querySelector('label'));
      const fieldByIndex = new Map();

      const findProvince = value => provinceData.find(item => item.value === value) || null;
      const findCity = value => {
        for (const province of provinceData) {
          const city = province.cities.find(item => item.value === value);
          if (city) return city;
        }
        return null;
      };

      const clearOpen = except => {
        fields.forEach(field => {
          if (field !== except) {
            field.classList.remove('open');
          }
        });
      };

      const syncInputState = field => {
        const input = field.querySelector('.field-input');
        if (!input) return;
        const filled = !!input.value.trim();
        field.classList.toggle('filled', filled);
        if (!filled && !field.classList.contains('focused')) {
          field.classList.remove('filled');
        }
      };

      const setSelectValue = (field, value, text) => {
        const display = field.querySelector('.value');
        field.dataset.value = value || '';
        if (display) {
          display.innerHTML = text || field.dataset.placeholder || '';
          display.classList.toggle('placeholder', !value);
        }
        field.classList.toggle('filled', !!value);
      };

      const selectOptionsFor = index => {
        if (index === 2) return provinceData;
        if (index === 3) {
          const provinceField = fieldByIndex.get(2);
          const province = provinceField ? findProvince(provinceField.dataset.value || '') : null;
          return province ? province.cities : [];
        }
        if (index === 4) {
          const cityField = fieldByIndex.get(3);
          const city = cityField ? findCity(cityField.dataset.value || '') : null;
          return city ? city.dists : [];
        }
        return staticOptions[index] || [];
      };

      const renderOptions = (field, index) => {
        const panel = field.querySelector('.dropdown-panel');
        if (!panel) return;

        const options = selectOptionsFor(index);
        if (!options.length) {
          const hint = index === 3 ? '&#35831;&#20808;&#36873;&#25321;&#30465;&#20221;' : index === 4 ? '&#35831;&#20808;&#36873;&#25321;&#22478;&#24066;' : '&#26222;&#36890;&#26080;&#21487;&#36873;&#39033;';
          panel.innerHTML = `<div class="dropdown-option disabled">${hint}</div>`;
          return;
        }

        const currentValue = field.dataset.value || '';
        panel.innerHTML = options
          .map(item => {
            const html = item.html || '';
            const active = item.value === currentValue ? ' selected' : '';
            return `<div class="dropdown-option${active}" data-value="${item.value}" data-html="${html}">${html}</div>`;
          })
          .join('');
      };

      const clearDependents = index => {
        if (index === 2) {
          const cityField = fieldByIndex.get(3);
          const distField = fieldByIndex.get(4);
          if (cityField) setSelectValue(cityField, '', cityField.dataset.placeholder);
          if (distField) setSelectValue(distField, '', distField.dataset.placeholder);
        }
        if (index === 3) {
          const distField = fieldByIndex.get(4);
          if (distField) setSelectValue(distField, '', distField.dataset.placeholder);
        }
      };

      const buildInput = (field, index) => {
        const valueBox = field.querySelector('.value');
        const placeholder = valueBox ? valueBox.textContent.trim() : '';
        field.dataset.placeholder = placeholder;
        if (valueBox) valueBox.remove();

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'field-input';
        input.placeholder = placeholder;
        input.value = '';
        field.appendChild(input);

        input.addEventListener('focus', () => {
          clearOpen();
          field.classList.add('focused');
        });
        input.addEventListener('blur', () => {
          field.classList.remove('focused');
          syncInputState(field);
        });
        input.addEventListener('input', () => {
          syncInputState(field);
        });
        field.addEventListener('click', event => {
          if (event.target !== input) input.focus();
        });
        syncInputState(field);
      };

      const buildSelect = (field, index) => {
        const valueBox = field.querySelector('.value');
        const placeholder = valueBox ? valueBox.textContent.trim() : '';
        field.dataset.placeholder = placeholder;
        setSelectValue(field, '', placeholder);

        const panel = document.createElement('div');
        panel.className = 'dropdown-panel';
        field.appendChild(panel);

        field.addEventListener('click', event => {
          const option = event.target.closest('.dropdown-option');
          if (option) {
            if (option.classList.contains('disabled')) return;
            const value = option.dataset.value || '';
            const html = option.dataset.html || option.innerHTML;
            setSelectValue(field, value, html);
            clearDependents(index);
            if (index === 2 || index === 3) {
              const cityField = fieldByIndex.get(3);
              const distField = fieldByIndex.get(4);
              if (index === 2 && cityField) renderOptions(cityField, 3);
              if ((index === 2 || index === 3) && distField) renderOptions(distField, 4);
            }
            field.classList.remove('open');
            field.classList.add('focused');
            return;
          }

          if (field.classList.contains('open')) {
            field.classList.remove('open');
          } else {
            clearOpen(field);
            field.classList.add('open', 'focused');
            renderOptions(field, index);
          }
        });

        renderOptions(field, index);
      };

      fields.forEach((field, index) => {
        fieldByIndex.set(index, field);
        if (inputIndexes.has(index)) {
          buildInput(field, index);
        } else {
          buildSelect(field, index);
        }
      });

      document.addEventListener('click', event => {
        const field = event.target.closest('.grid .field');
        if (!field || !field.querySelector('label')) {
          fields.forEach(item => item.classList.remove('open'));
          fields.forEach(item => {
            const input = item.querySelector('.field-input');
            if (input) {
              if (!input.value.trim()) {
                item.classList.remove('focused', 'filled');
              }
            } else if (!item.dataset.value) {
              item.classList.remove('focused');
            }
          });
          return;
        }
      });

      window.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          fields.forEach(field => field.classList.remove('open'));
        }
      });
    })();
