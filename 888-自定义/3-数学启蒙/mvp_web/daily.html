<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙 · 每日一练</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/daily.css">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
  <!-- 护眼背景装饰 -->
  <div class="bg-decoration">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div id="app">
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">◀</a>
        <span class="topbar-title"><span class="iconify" data-icon="fluent-emoji:trophy" style="font-size: 26px; vertical-align: text-bottom;"></span> 每日一练</span>
      </div>
      <div class="topbar-right" id="progressArea" style="display:none;">
        <div class="star-progress" id="starProgress">
          <!-- Stars will be dynamically generated -->
        </div>
      </div>
    </div>

    <div class="content">
      <div class="question-display-bar">
        <div id="questionDisplay" class="question-display"></div>
        <button type="button" id="questionSpeaker" class="question-speaker" aria-label="播放题目语音">🔊</button>
      </div>
      <div id="visualArea" class="visual-area"></div>
      <div id="controlArea" class="control-area"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div id="bottomActions" class="bottom-actions" style="display:none;">
      <button class="btn btn-green btn-lg" id="actionBtn">开始练习</button>
    </div>
  </div>

  <script src="js/practice-support.js"></script>
  <script src="js/daily.js"></script>
</body>
</html>
