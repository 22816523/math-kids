<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260313b">
  <style>
    .home-header {
      text-align: center;
      padding: 32px 20px 16px;
    }
    .home-title {
      font-size: 32px;
      font-weight: 900;
    }
    .home-subtitle {
      font-size: 16px;
      color: var(--gray-400);
      margin-top: 4px;
    }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px 20px;
    }
    .module-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px 16px;
      background: var(--white);
      border: 3px solid var(--gray-100);
      border-bottom: 6px solid var(--gray-200);
      border-radius: var(--radius-xl);
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
      cursor: pointer;
    }
    .module-card:active {
      transform: translateY(4px);
      border-bottom-width: 2px;
    }
    .module-card .module-icon {
      font-size: 48px;
    }
    .module-card .module-name {
      font-size: 20px;
      font-weight: 700;
    }
    .module-card .module-desc {
      font-size: 13px;
      color: var(--gray-300);
      text-align: center;
    }
    .module-card.color-green  { border-color: var(--green);  border-bottom-color: var(--green-dark); background: var(--green-light); }
    .module-card.color-purple { border-color: var(--purple); border-bottom-color: var(--purple-dark); background: var(--purple-light); }
    .module-card.color-blue   { border-color: var(--blue);   border-bottom-color: var(--blue-dark); background: var(--blue-light); }
    .module-card.color-yellow { border-color: var(--yellow); border-bottom-color: var(--yellow-dark); background: var(--yellow-light); }
    .module-card.color-red    { border-color: var(--red);    border-bottom-color: var(--red-dark); background: var(--red-light); }
    .module-card.color-orange { border-color: var(--orange); border-bottom-color: var(--orange-dark); background: #FFF3E0; }
    .module-card.locked {
      opacity: 0.45;
      pointer-events: none;
      border-color: var(--gray-200);
      border-bottom-color: var(--gray-300);
      background: var(--gray-50);
    }
    .module-card.locked .module-name::after {
      content: ' 🔒';
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="home-header">
      <div class="home-title">🧒 数学启蒙</div>
      <div class="home-subtitle">3-8岁 · 玩中学数学</div>
    </div>

    <div class="module-grid">
      <a href="baisu.html" class="module-card color-green">
        <span class="module-icon">🔢</span>
        <span class="module-name">百数板</span>
        <span class="module-desc">认数字 · 填一填 · 跳着数 · 拆一拆</span>
      </a>

      <a href="shape.html" class="module-card color-purple">
        <span class="module-icon">📐</span>
        <span class="module-name">图形与几何</span>
        <span class="module-desc">辨认 · 分类 · 找一找</span>
      </a>

      <div class="module-card locked color-yellow">
        <span class="module-icon">⏰</span>
        <span class="module-name">常见的量</span>
        <span class="module-desc">钟表 · 人民币 · 比较</span>
      </div>

      <div class="module-card locked color-blue">
        <span class="module-icon">🧩</span>
        <span class="module-name">综合与实践</span>
        <span class="module-desc">分类 · 找规律 · 生活问题</span>
      </div>

      <div class="module-card locked color-red">
        <span class="module-icon">➕</span>
        <span class="module-name">加减法</span>
        <span class="module-desc">10以内 · 20以内 · 100以内</span>
      </div>

      <div class="module-card locked color-orange">
        <span class="module-icon">🏆</span>
        <span class="module-name">每日闯关</span>
        <span class="module-desc">混合题型 · 星星收集</span>
      </div>
    </div>
  </div>
</body>
</html>
