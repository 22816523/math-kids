name: Deploy Math Kids Pages

on:
  push:
    branches:
      - main
    paths:
      - "888-自定义产品/3-数学启蒙/mvp_web/**"
      - ".github/workflows/deploy-math-kids-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: math-kids-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf ./math-kids-site
          mkdir -p ./math-kids-site
          cp -R "888-自定义产品/3-数学启蒙/mvp_web/." ./math-kids-site/
          touch ./math-kids-site/.nojekyll

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./math-kids-site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
