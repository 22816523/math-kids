<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙 · 常见的量</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260325d">
  <link rel="stylesheet" href="css/measure.css?v=20260325d">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
  <div class="bg-decoration">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div id="app">
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">◀</a>
        <span class="topbar-title">
          <span class="iconify" data-icon="fluent-emoji:straight-ruler" style="font-size:26px;vertical-align:text-bottom;"></span>
          常见的量
        </span>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="clock">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:alarm-clock"></span></span>
        <span class="tab-label">钟表</span>
      </button>
      <button class="mode-tab" data-mode="money">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:money-bag"></span></span>
        <span class="tab-label">人民币</span>
      </button>
      <button class="mode-tab" data-mode="compare">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:triangular-ruler"></span></span>
        <span class="tab-label">比较</span>
      </button>
      <button class="mode-tab" data-mode="length">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:straight-ruler"></span></span>
        <span class="tab-label">测量</span>
      </button>
      <button class="mode-tab" data-mode="weight">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:balance-scale"></span></span>
        <span class="tab-label">轻重</span>
      </button>
      <button class="mode-tab" data-mode="calendar">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:calendar"></span></span>
        <span class="tab-label">日历</span>
      </button>
    </div>

    <div class="content measure-content">
      <div id="questionBar" class="question-bar" style="display:none;">
        <span class="question-icon" id="questionIcon">🎯</span>
        <span class="question-text" id="questionText"></span>
        <button type="button" id="questionSpeaker" class="question-speaker" hidden aria-label="播放题目语音">🔊</button>
      </div>

      <div id="clockArea" class="clock-area">
        <div class="clock-face" id="clockFace">
          <svg viewBox="0 0 300 300" id="clockSvg"></svg>
        </div>
        <div class="digital-clock" id="digitalClock">--:--</div>
        <div class="clock-options" id="clockOptions"></div>
      </div>

      <div id="moneyArea" class="money-area" style="display:none;">
        <div class="shop-shelf" id="shopShelf"></div>
        <div class="pay-prompt" id="payPrompt" style="display:none;">
          <span class="pay-icon">🛍</span>
          <span class="pay-text" id="payText"></span>
        </div>
        <div class="wallet" id="wallet"></div>
        <div class="cashier" id="cashier">
          <div class="cashier-label">🧾 收银台</div>
          <div class="cashier-tray" id="cashierTray"></div>
          <div class="cashier-total">已付: <span id="paidTotal">0</span> 元</div>
        </div>
      </div>

      <div id="compareArea" class="compare-area" style="display:none;">
        <div class="compare-scene" id="compareScene"></div>
        <div class="compare-options" id="compareOptions"></div>
      </div>

      <div id="lengthArea" class="length-area" style="display:none;">
        <div class="ruler-container" id="rulerContainer"></div>
        <div class="length-options" id="lengthOptions"></div>
      </div>

      <div id="weightArea" class="weight-area" style="display:none;">
        <div class="scale-display" id="scaleDisplay"></div>
        <div class="weight-options" id="weightOptions"></div>
      </div>

      <div id="calendarArea" class="calendar-area" style="display:none;">
        <div class="calendar-paper" id="calendarPaper">
          <div class="calendar-header">
            <span class="cal-month-title" id="calMonthTitle">五月 May</span>
          </div>
          <div class="calendar-weekdays">
            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>
      </div>
    </div>

    <div id="bottomActions" class="bottom-actions" style="display:none;">
      <button class="btn btn-green btn-lg" id="actionBtn">开始练习</button>
    </div>

    <div id="feedbackOverlay" class="feedback-overlay" style="display:none;">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>

    <div id="confettiContainer" class="confetti-container"></div>
  </div>

  <script src="js/timer.js?v=20260325d"></script>
  <script src="js/practice-support.js?v=20260325d"></script>
  <script src="js/measure.js?v=20260325d"></script>
</body>
</html>
