<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙 · 百数板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260325b">
  <link rel="stylesheet" href="css/baisu-board.css?v=20260325b">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
<body>
  <!-- 护眼背景装饰 -->
  <div class="bg-decoration">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div id="app">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">◀</a>
        <span class="topbar-title"><span class="iconify" data-icon="fluent-emoji:input-numbers" style="font-size: 26px; vertical-align: text-bottom;"></span> 百数板</span>
      </div>
      <span id="starCount" style="display:none;">0</span>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="order">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:backhand-index-pointing-up"></span></span>
        <span class="tab-label">认数字</span>
      </button>
      <button class="mode-tab" data-mode="neighbor">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:people-hugging"></span></span>
        <span class="tab-label">找邻居</span>
      </button>
      <button class="mode-tab" data-mode="ninegrid">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:white-square-button"></span></span>
        <span class="tab-label">九宫格</span>
      </button>
      <button class="mode-tab" data-mode="pattern">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:rocket"></span></span>
        <span class="tab-label">找规律</span>
      </button>
      <button class="mode-tab" data-mode="treasure">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:gem-stone"></span></span>
        <span class="tab-label">数字寻宝</span>
      </button>
    </div>

    <!-- 内容区 -->
    <div class="content board-content">

      <!-- 提示/题目区 -->
      <div id="questionBar" class="question-bar" style="display:none;">
        <span class="question-icon" id="questionIcon">🎯</span>
        <span class="question-text" id="questionText"></span>
        <button type="button" id="questionSpeaker" class="question-speaker" hidden aria-label="播放题目语音">🔊</button>
      </div>

      <!-- 认数字练习区（听音选数4选1）-->
      <div id="orderQuiz" class="order-quiz" style="display:none; padding:20px; flex-direction:column; align-items:center; justify-content:center;">
        <div class="order-options" id="orderOptions" style="display:flex; flex-direction:row; gap:16px; flex-wrap:wrap; justify-content:center;">
          <!-- JS动态生成4张选项卡片 -->
        </div>
        <div id="orderHint" style="font-size:15px;color:#888;font-weight:700;text-align:center;margin-top:8px;"></div>
        <div id="orderProgress" style="font-size:14px;color:#8A4CF2;font-weight:900;text-align:center;margin-top:4px;"></div>
        <span id="orderSpeaker" style="display:none;"></span>
      </div>

      <!-- 找规律控制栏 -->
      <div id="skipControls" class="skip-controls" style="display:none;">
        <button class="skip-step-btn active" data-step="2">2个一数</button>
        <button class="skip-step-btn" data-step="5">5个一数</button>
        <button class="skip-step-btn" data-step="10">10个一数</button>
        <button id="skipDirectionBtn" class="skip-direction-btn"><span id="skipDirText">顺数 ▶</span></button>
      </div>

      <!-- 百数板网格 -->
      <div class="board-wrapper" id="boardWrapper">
        <div class="board-grid" id="boardGrid">
          <!-- JS动态生成100个格子 -->
        </div>
      </div>

      <!-- 填空模式：底部数字气泡区 -->
      <div id="bubbleZone" class="bubble-zone" style="display:none;">
        <!-- JS动态生成气泡 -->
      </div>

    </div>

    <!-- 底部操作区 -->
    <div id="bottomActions" class="bottom-actions" style="display:none;">
      <button class="btn btn-green btn-lg" id="actionBtn">🎲 再来一轮</button>
    </div>

    <!-- 反馈浮层 -->
    <div id="feedbackOverlay" class="feedback-overlay" style="display:none;">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>

    <!-- 庆祝彩纸屑容器 -->
    <div id="confettiContainer" class="confetti-container"></div>
  </div>

  <script src="js/timer.js?v=20260325b"></script>
  <script src="js/practice-support.js?v=20260325b"></script>
  <script src="js/baisu-board.js?v=20260325b"></script>
</body>
</html>
