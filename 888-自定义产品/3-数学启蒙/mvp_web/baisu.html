<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙 · 百数板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260313b">
  <link rel="stylesheet" href="css/baisu-board.css?v=20260313b">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
</head>
  <!-- 护眼背景装饰 -->
  <div class="bg-decoration">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div id="app">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">◀</a>
        <span class="topbar-title"><span class="iconify" data-icon="fluent-emoji:input-numbers" style="font-size: 26px; vertical-align: text-bottom;"></span> 百数板</span>
      </div>
      <!-- Removed gamification elements -->
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="order">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:backhand-index-pointing-up"></span></span>
        <span class="tab-label">认数字</span>
      </button>
      <button class="mode-tab" data-mode="fill">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:puzzle-piece"></span></span>
        <span class="tab-label">填一填</span>
      </button>
      <button class="mode-tab" data-mode="skip">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:rabbit-face"></span></span>
        <span class="tab-label">跳着数</span>
      </button>
      <button class="mode-tab" data-mode="place">
        <span class="tab-icon"><span class="iconify" data-icon="fluent-emoji:wood"></span></span>
        <span class="tab-label">拆一拆</span>
      </button>
    </div>

    <!-- 内容区 -->
    <div class="content board-content">

      <!-- 提示/题目区 -->
      <div id="questionBar" class="question-bar" style="display:none;">
        <span class="question-icon" id="questionIcon">🎯</span>
        <span class="question-text" id="questionText"></span>
        <button type="button" id="questionSpeaker" class="question-speaker" hidden aria-label="播放题目语音">🔊</button>
      </div>

      <!-- 跳数模式控制栏 -->
      <div id="skipControls" class="skip-controls" style="display:none;">
        <div class="skip-steps">
          <button class="btn btn-sm btn-ghost skip-step-btn active" data-step="2">2个一数</button>
          <button class="btn btn-sm btn-ghost skip-step-btn" data-step="5">5个一数</button>
          <button class="btn btn-sm btn-ghost skip-step-btn" data-step="10">10个一数</button>
        </div>
        <button class="btn btn-sm btn-blue" id="skipDirectionBtn">
          <span id="skipDirText">顺数 ▶</span>
        </button>
      </div>

      <!-- 跳数练习：选项区 -->
      <div id="skipQuiz" class="skip-quiz" style="display:none;">
        <div class="skip-quiz-hint" id="skipQuizHint"></div>
        <div class="skip-quiz-options" id="skipQuizOptions"></div>
      </div>

      <!-- 数位认识卡片（练习模式：显示小棒让孩子找数字） -->
      <div id="placeValueCard" class="place-value-card" style="display:none;">
        <div class="pv-number" id="pvNumber">--</div>
        <div class="pv-split">
          <div class="pv-unit">
            <div class="pv-rods" id="pvTens"></div>
            <div class="pv-label">十位 <span id="pvTensDigit" class="pv-digit">0</span></div>
          </div>
          <div class="pv-plus">+</div>
          <div class="pv-unit">
            <div class="pv-rods" id="pvOnes"></div>
            <div class="pv-label">个位 <span id="pvOnesDigit" class="pv-digit">0</span></div>
          </div>
        </div>
      </div>

      <!-- 认数字练习：听音选数卡片区 -->
      <div id="orderQuiz" class="order-quiz" style="display:none;">
        <div class="order-quiz-speaker" id="orderSpeaker">🔊</div>
        <div class="order-quiz-hint" id="orderHint">听一听，选出正确的数字</div>
        <div class="order-quiz-options" id="orderOptions">
          <!-- JS动态生成4个大卡片 -->
        </div>
        <div class="order-quiz-progress" id="orderProgress"></div>
      </div>

      <!-- 分段切换栏 -->
      <div class="range-tabs" id="rangeTabs">
        <button class="range-tab active" data-start="1">1-20</button>
        <button class="range-tab" data-start="21">21-40</button>
        <button class="range-tab" data-start="41">41-60</button>
        <button class="range-tab" data-start="61">61-80</button>
        <button class="range-tab" data-start="81">81-100</button>
      </div>

      <!-- 百数板网格 -->
      <div class="board-wrapper" id="boardWrapper">
        <div class="board-grid" id="boardGrid">
          <!-- JS动态生成20个格子 -->
        </div>
      </div>

      <!-- 填空模式：底部数字气泡区 -->
      <div id="bubbleZone" class="bubble-zone" style="display:none;">
        <!-- JS动态生成气泡 -->
      </div>

    </div>

    <!-- 底部操作区 -->
    <div id="bottomActions" class="bottom-actions" style="display:none;">
      <button class="btn btn-green btn-lg" id="actionBtn">🎲 再来一轮</button>
    </div>

    <!-- 反馈浮层 -->
    <div id="feedbackOverlay" class="feedback-overlay" style="display:none;">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>

    <!-- 庆祝彩纸屑容器 -->
    <div id="confettiContainer" class="confetti-container"></div>
  </div>

  <script src="js/timer.js?v=20260313b"></script>
  <script src="js/practice-support.js?v=20260314a"></script>
  <script src="js/baisu-board.js?v=20260313b"></script>
</body>
</html>
