<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙 · 图形与几何</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260314b">
  <link rel="stylesheet" href="css/shape.css?v=20260314b">
</head>
<body>
  <!-- 护眼背景装饰 -->
  <div class="bg-decoration">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <div id="app">
    <!-- 顶栏 -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">◀</a>
        <span class="topbar-title">📐 图形与几何</span>
      </div>
      <!-- Removed gamification elements -->
    </div>

    <!-- 模式切换标签 -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="recognize">
        <span class="tab-icon">👀</span>
        <span class="tab-label">辨认</span>
      </button>
      <button class="mode-tab" data-mode="classify">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">分类</span>
      </button>
      <button class="mode-tab" data-mode="find">
        <span class="tab-icon">🔍</span>
        <span class="tab-label">找一找</span>
      </button>
      <!-- 新增：七巧板拼摆模式 -->
      <button class="mode-tab" data-mode="tangram">
        <span class="tab-icon">🧩</span>
        <span class="tab-label">拼一拼</span>
      </button>
      <!-- 新增：方位九宫格模式 -->
      <button class="mode-tab" data-mode="spatial">
        <span class="tab-icon">🧭</span>
        <span class="tab-label">听指令</span>
      </button>
    </div>

    <!-- 内容区 -->
    <div class="content shape-content">

      <!-- 提示/题目区 -->
      <div id="questionBar" class="question-bar" style="display:none;">
        <span class="question-icon" id="questionIcon">🎯</span>
        <span class="question-text" id="questionText"></span>
        <button type="button" id="questionSpeaker" class="question-speaker" hidden aria-label="播放题目语音">🔊</button>
      </div>

      <!-- 辨认模式：图形展示区 -->
      <div id="recognizeArea" class="recognize-area">
        <!-- JS动态生成图形 -->
      </div>

      <!-- 分类模式：图形区 + 分类篮子 -->
      <div id="classifyArea" class="classify-area" style="display:none;">
        <div class="classify-shapes" id="classifyShapes">
          <!-- JS动态生成待分类图形 -->
        </div>
        <div class="classify-homes" id="classifyHomes">
          <!-- JS动态生成分类目标 -->
        </div>
      </div>

      <!-- 找一找模式：场景区 -->
      <div id="findArea" class="find-area" style="display:none;">
        <div class="scene-container" id="sceneContainer">
          <!-- JS动态生成SVG场景 -->
        </div>
        <div class="find-progress" id="findProgress"></div>
      </div>

      <!-- 新增：拼一拼模式（七巧板拼摆） -->
      <div id="tangramArea" class="tangram-area" style="display:none;">
        <div class="tangram-board" id="tangramBoard">
          <!-- JS动态生成目标轮廓底图和散落拼图碎片 -->
        </div>
      </div>

      <!-- 新增：方位九宫格模式应用 -->
      <div id="spatialArea" class="spatial-area" style="display:none;">
        <div class="spatial-shelf" id="spatialShelf">
          <!-- JS动态生成3x3置物架槽位 -->
        </div>
        <div class="spatial-tray" id="spatialTray">
          <!-- JS动态生成可以被拖拽的物品 -->
        </div>
      </div>

    </div>

    <!-- 底部操作区 -->
    <div id="bottomActions" class="bottom-actions" style="display:none;">
      <button class="btn btn-green btn-lg" id="actionBtn">🎯 开始练习</button>
    </div>

    <!-- 反馈浮层 -->
    <div id="feedbackOverlay" class="feedback-overlay" style="display:none;">
      <div class="feedback-emoji" id="feedbackEmoji"></div>
      <div class="feedback-text" id="feedbackText"></div>
    </div>

    <!-- 庆祝彩纸屑容器 -->
    <div id="confettiContainer" class="confetti-container"></div>
  </div>

  <script src="js/timer.js?v=20260314b"></script>
  <script src="js/practice-support.js?v=20260314b"></script>
  <script src="js/shape.js?v=20260314b"></script>
</body>
</html>
