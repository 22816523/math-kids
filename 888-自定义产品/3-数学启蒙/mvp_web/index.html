<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>数学启蒙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/design-system.css?v=20260313b">
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <style>
    .home-header {
      position: relative;
      text-align: center;
      padding: 24px 20px 12px;
      flex-shrink: 0;
    }
    .settings-btn {
      position: absolute;
      top: 32px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gray-100);
      border: 3px solid var(--gray-200);
      border-bottom: 4px solid var(--gray-300);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .settings-btn:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }
    .home-title {
      font-size: 36px;
      font-weight: 900;
    }
    .home-subtitle {
      font-size: 15px;
      color: var(--gray-400);
      margin-top: 2px;
    }
    .module-grid {
      display: grid;
      /* 首屏优先：默认 2x2，大屏再扩成 3 列 */
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 22px;
      row-gap: 20px;
      padding: 10px 22px 28px;
      flex: 1;
      overflow: hidden;
      align-content: center;
      -webkit-overflow-scrolling: touch;
    }
    .module-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1 / 1;
      gap: 8px;
      padding: 14px 10px;
      background: var(--white);
      border: 3px solid var(--gray-100);
      border-bottom: 6px solid var(--gray-200);
      border-radius: var(--radius-xl);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .module-card:active {
      transform: translateY(4px);
      border-bottom-width: 2px;
    }
    .module-card .module-icon {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(3, 12px);
      gap: 3px;
    }
    .icon-grid-cell {
      width: 12px;
      height: 12px;
      background: var(--green);
      border-radius: 3px;
      box-shadow: 0 2px 0 var(--green-dark);
    }

    .icon-shapes {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .icon-circle {
      width: 16px;
      height: 16px;
      background: var(--purple);
      border-radius: 50%;
      box-shadow: 0 2px 0 var(--purple-dark);
    }
    .icon-triangle {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 16px solid var(--purple);
      filter: drop-shadow(0 2px 0 var(--purple-dark));
    }
    .icon-square {
      width: 16px;
      height: 16px;
      background: var(--purple);
      border-radius: 3px;
      box-shadow: 0 2px 0 var(--purple-dark);
    }

    .icon-clock {
      width: 44px;
      height: 44px;
      background: var(--yellow);
      border-radius: 50%;
      border: 4px solid var(--yellow-dark);
      position: relative;
      box-shadow: 0 3px 0 var(--yellow-dark);
    }
    .icon-clock::before {
      content: '';
      position: absolute;
      width: 2px;
      height: 12px;
      background: var(--yellow-dark);
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }
    .icon-clock::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 2px;
      background: var(--yellow-dark);
      top: 19px;
      left: 19px;
    }

    .icon-plus {
      width: 50px;
      height: 44px;
      position: relative;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .icon-plus-sign {
      width: 20px;
      height: 20px;
      position: relative;
    }
    .icon-plus-sign::before,
    .icon-plus-sign::after {
      content: '';
      position: absolute;
      background: var(--red);
      border-radius: 2px;
      box-shadow: 0 2px 0 var(--red-dark);
    }
    .icon-plus-sign::before {
      width: 4px;
      height: 20px;
      left: 8px;
    }
    .icon-plus-sign::after {
      width: 20px;
      height: 4px;
      top: 8px;
    }
    .icon-minus-sign {
      width: 20px;
      height: 20px;
      position: relative;
    }
    .icon-minus-sign::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 4px;
      background: var(--red);
      border-radius: 2px;
      box-shadow: 0 2px 0 var(--red-dark);
      top: 8px;
    }
    .module-card .module-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }
    .module-card .module-desc {
      font-size: 12px;
      color: var(--gray-300);
      text-align: center;
      line-height: 1.35;
    }
    @keyframes cardBreathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.02) translateY(-4px); }
    }
    
    .module-card:not(.locked) {
      animation: cardBreathe 4s ease-in-out infinite;
    }
    .module-card:not(.locked):nth-child(2) { animation-delay: -1s; }
    .module-card:not(.locked):nth-child(3) { animation-delay: -2s; }
    .module-card:not(.locked):nth-child(5) { animation-delay: -3s; }

    .module-card.color-green { 
      background: linear-gradient(135deg, #F0FBF6 0%, var(--green) 100%); 
      border-color: #E0F7EF; 
      box-shadow: 
        0 var(--card-depth) 0 var(--green-dark), 
        0 12px 24px rgba(118,215,196,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-green:active { box-shadow: 0 2px 0 var(--green-dark), inset 0 2px 8px rgba(0,0,0,0.05); }

    .module-card.color-purple { 
      background: linear-gradient(135deg, #F9F0FC 0%, var(--purple) 100%); 
      border-color: #F1E0F8;
      box-shadow: 
        0 var(--card-depth) 0 var(--purple-dark), 
        0 12px 24px rgba(195,155,211,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-purple:active { box-shadow: 0 2px 0 var(--purple-dark), inset 0 2px 8px rgba(0,0,0,0.05); }

    .module-card.color-blue { 
      background: linear-gradient(135deg, #F0F8FD 0%, var(--blue) 100%); 
      border-color: #E4F1FA;
      box-shadow: 
        0 var(--card-depth) 0 var(--blue-dark), 
        0 12px 24px rgba(133,193,233,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-blue:active { box-shadow: 0 2px 0 var(--blue-dark), inset 0 2px 8px rgba(0,0,0,0.05); }

    .module-card.color-yellow { 
      background: linear-gradient(135deg, #FFFDF8 0%, var(--yellow) 100%); 
      border-color: #FEF3E1;
      box-shadow: 
        0 var(--card-depth) 0 var(--yellow-dark), 
        0 12px 24px rgba(248,196,113,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-yellow:active { box-shadow: 0 2px 0 var(--yellow-dark), inset 0 2px 8px rgba(0,0,0,0.05); }

    .module-card.color-red { 
      background: linear-gradient(135deg, #FEF0EF 0%, var(--red) 100%); 
      border-color: #FCE1DF;
      box-shadow: 
        0 var(--card-depth) 0 var(--red-dark), 
        0 12px 24px rgba(241,148,138,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-red:active { box-shadow: 0 2px 0 var(--red-dark), inset 0 2px 8px rgba(0,0,0,0.05); }
    
    .module-card.color-orange { 
      background: linear-gradient(135deg, #FFF3E0 0%, var(--orange) 100%); 
      border-color: #FDE8C4;
      box-shadow: 
        0 var(--card-depth) 0 var(--orange-dark), 
        0 12px 24px rgba(245,176,65,0.35),
        inset 0 6px 12px rgba(255,255,255,0.7),
        inset 0 -6px 12px rgba(0,0,0,0.04);
    }
    .module-card.color-orange:active { box-shadow: 0 2px 0 var(--orange-dark), inset 0 2px 8px rgba(0,0,0,0.05); }

    @media (min-width: 900px) {
      .module-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 600px) {
      .module-grid {
        grid-template-columns: repeat(2, 1fr);
        column-gap: 16px;
        row-gap: 14px;
        padding: 10px 16px 20px;
      }
      .module-card {
        padding: 12px 8px;
        gap: 6px;
      }
      .module-card .module-icon {
        transform: scale(0.65) !important;
      }
      .module-card .module-name {
        font-size: 16px;
      }
      .module-card .module-desc {
        font-size: 10px;
      }
    }
    .module-card.locked {
      opacity: 0.45;
      pointer-events: none;
      border-color: var(--gray-200);
      border-bottom-color: var(--gray-300);
      background: var(--gray-50);
    }
    .module-card.locked .module-name::after {
      content: ' 🔒';
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="home-header">
      <button class="settings-btn" onclick="openSettings()">⚙️</button>
      <div class="home-title">趣味数学</div>
      <div class="home-subtitle">3-8岁 · 玩中学数学</div>
    </div>

    <div class="module-grid">
      <a href="baisu.html" class="module-card color-green">
        <div class="module-icon">
          <div class="icon-grid">
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
            <div class="icon-grid-cell"></div>
          </div>
        </div>
        <span class="module-name">百数板</span>
        <span class="module-desc">认数字 · 填一填 · 跳着数 · 拆一拆</span>
      </a>

      <a href="shape.html" class="module-card color-purple">
        <div class="module-icon">
          <div class="icon-shapes">
            <div class="icon-circle"></div>
            <div class="icon-triangle"></div>
            <div class="icon-square"></div>
          </div>
        </div>
        <span class="module-name">图形与几何</span>
        <span class="module-desc">辨认 · 分类 · 找一找</span>
      </a>

      <a href="measure.html" class="module-card color-yellow">
        <div class="module-icon">
          <div class="icon-clock"></div>
        </div>
        <span class="module-name">常见的量</span>
        <span class="module-desc">钟表 · 人民币 · 比较</span>
      </a>

      <div class="module-card locked color-blue" style="display:none;">
        <div class="module-icon">🧩</div>
        <span class="module-name">综合与实践</span>
        <span class="module-desc">分类 · 找规律 · 生活问题</span>
      </div>

      <a href="math.html" class="module-card color-red">
        <div class="module-icon">
          <div class="icon-plus">
            <div class="icon-plus-sign"></div>
            <div class="icon-minus-sign"></div>
          </div>
        </div>
        <span class="module-name">加减法</span>
        <span class="module-desc">10以内 · 20以内 · 100以内</span>
      </a>

      <div class="module-card locked color-orange" style="display:none;">
        <div class="module-icon">🏆</div>
        <span class="module-name">每日闯关</span>
        <span class="module-desc">混合题型 · 星星收集</span>
      </div>
    </div>
  </div>

  <script src="js/timer.js?v=20260313b"></script>
  <script>
    function openSettings() {
      window.location.href = 'settings.html';
    }
  </script>
</body>
</html>
