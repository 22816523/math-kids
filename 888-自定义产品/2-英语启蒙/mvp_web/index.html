<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>English Learning MVP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="rotate-hint">
        <div class="rotate-icon">📱</div>
        <p>请将手机横过来使用哦～</p>
    </div>
    <div id="app">
        <div class="topbar">
            <div class="stars-display"><i data-lucide="star"
                    style="width:20px;height:20px;color:#FFD166;fill:#FFD166;"></i><span id="starCount">0</span></div>
            <button class="nav-btn" id="parentBtn"><i data-lucide="settings"
                    style="width:20px;height:20px;"></i></button>
        </div>
        <div class="scene" id="mapScene"></div>
        <nav class="bottom-nav">
            <button class="tab active-tab" onclick="location.href='index.html'"><i data-lucide="map"
                    style="width:18px;height:18px;"></i> 学习</button>
            <button class="tab" onclick="location.href='shop.html'"><i data-lucide="shopping-bag"
                    style="width:18px;height:18px;"></i> 商店</button>
            <button class="tab" onclick="location.href='collection.html'"><i data-lucide="gem"
                    style="width:18px;height:18px;"></i> 我的宝贝</button>
        </nav>
    </div>
    <div class="lockscreen hidden" id="lockScreen">
        <h1>😴 今天学习时间到啦！</h1>
        <p>明天再来继续冒险吧～</p>
        <button class="nav-btn" onclick="showVerify('unlock')">家长解锁</button>
    </div>

    <!-- 家长验证弹窗 -->
    <div class="verify-overlay hidden" id="verifyModal">
        <div class="verify-box">
            <div class="verify-close" onclick="closeVerify()">✕</div>
            <p class="verify-title">请依次点击下方汉字</p>
            <div class="verify-target" id="verifyTarget"></div>
            <div class="verify-grid" id="verifyGrid"></div>
            <p class="verify-hint hidden" id="verifyHint">验证失败，再试一次</p>
        </div>
    </div>

    <script src="js/store.js"></script>
    <script>
        Store.load();

        // ===== 家长验证系统 =====
        const CN_NUMS = ['壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖', '拾'];
        let verifyAnswer = [];
        let verifyClicked = [];
        let verifyCallback = null;

        function showVerify(action) {
            verifyCallback = action;
            verifyClicked = [];
            // 随机选3个不重复的数字
            const indices = [];
            while (indices.length < 3) {
                const r = Math.floor(Math.random() * 10);
                if (!indices.includes(r)) indices.push(r);
            }
            verifyAnswer = indices.map(i => CN_NUMS[i]);

            // 渲染目标提示
            document.getElementById('verifyTarget').innerHTML = verifyAnswer.map(c =>
                '<span class="target-char">' + c + '</span>'
            ).join('<span class="target-arrow">→</span>');

            // 渲染10个按钮（打乱顺序）
            const shuffled = [...CN_NUMS].sort(() => Math.random() - 0.5);
            const grid = document.getElementById('verifyGrid');
            grid.innerHTML = '';
            shuffled.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'verify-btn';
                btn.textContent = ch;
                btn.onclick = () => onVerifyClick(btn, ch);
                grid.appendChild(btn);
            });

            document.getElementById('verifyHint').classList.add('hidden');
            document.getElementById('verifyModal').classList.remove('hidden');
        }

        function onVerifyClick(btn, ch) {
            const expected = verifyAnswer[verifyClicked.length];
            if (ch === expected) {
                btn.classList.add('verify-ok');
                btn.disabled = true;
                verifyClicked.push(ch);
                // 高亮对应的目标字
                const targets = document.querySelectorAll('.target-char');
                targets[verifyClicked.length - 1].classList.add('target-done');

                if (verifyClicked.length === verifyAnswer.length) {
                    // 验证通过
                    setTimeout(() => {
                        closeVerify();
                        if (verifyCallback === 'unlock') {
                            Store.state.anti_addiction.is_locked = false;
                            Store.state.anti_addiction.today_minutes = 0;
                            Store.save();
                            document.getElementById('lockScreen').classList.add('hidden');
                        } else if (verifyCallback === 'parent') {
                            location.href = 'parents.html';
                        }
                    }, 400);
                }
            } else {
                // 点错了，抖动并重置
                btn.classList.add('verify-wrong');
                document.getElementById('verifyHint').classList.remove('hidden');
                setTimeout(() => {
                    btn.classList.remove('verify-wrong');
                    // 重置所有按钮和目标
                    verifyClicked = [];
                    document.querySelectorAll('.verify-btn').forEach(b => {
                        b.classList.remove('verify-ok'); b.disabled = false;
                    });
                    document.querySelectorAll('.target-char').forEach(t => t.classList.remove('target-done'));
                }, 600);
            }
        }

        function closeVerify() {
            document.getElementById('verifyModal').classList.add('hidden');
        }

        // 防沉迷
        const aa = Store.checkAntiAddiction();
        if (aa.is_locked) document.getElementById('lockScreen').classList.remove('hidden');
        setInterval(() => { const r = Store.tickMinute(); if (r.is_locked) document.getElementById('lockScreen').classList.remove('hidden'); }, 60000);

        // 家长中心
        document.getElementById('parentBtn').onclick = () => showVerify('parent');

        // 星星
        document.getElementById('starCount').textContent = Store.starsBalance;

        // 加载课程数据并渲染地图
        fetch('data/curriculum.json').then(r => r.json()).then(data => {
            const map = document.getElementById('mapScene');
            const grid = document.createElement('div');
            grid.className = 'map-grid';

            data.units.forEach(unit => {
                unit.lessons.forEach(lesson => {
                    const id = lesson.lesson_id;
                    const b = document.createElement('div');
                    b.className = 'bubble';
                    const w = lesson.new_words[0];

                    if (Store.state.lessons[id] && Store.state.lessons[id].completed) {
                        b.classList.add('done');
                    } else if (Store.isLessonUnlocked(id)) {
                        b.classList.add('active');
                    } else {
                        b.classList.add('locked');
                    }

                    b.innerHTML = `<span class="emoji"><img src="${w.image}" alt="${w.word}" onerror="this.outerHTML='${w.emoji}'" style="width:48px;height:48px;object-fit:contain;"></span><span class="label">${w.word}</span>`;
                    b.onclick = () => { if (!b.classList.contains('locked')) location.href = 'learning.html?lesson=' + id; };
                    grid.appendChild(b);
                });
            });
            map.appendChild(grid);
            lucide.createIcons();
        });

        // 防止触摸滚动
        document.body.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    </script>
</body>

</html>
