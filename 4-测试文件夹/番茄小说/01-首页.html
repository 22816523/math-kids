<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页 - 番茄小说</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* 顶部导航 */
        .header {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e0e0e0;
        }
        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .header-right {
            display: flex;
            gap: 16px;
        }
        .header-btn {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            background: #fff;
            padding: 12px 16px;
            gap: 20px;
            overflow-x: auto;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 44px;
            z-index: 99;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tabs .tab {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }
        .category-tabs .tab.active {
            color: #333;
            font-weight: 600;
            border-bottom-color: #333;
        }

        /* 主内容区 */
        .main-content {
            padding: 12px;
        }

        /* 轮播Banner */
        .banner-section {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .banner-item {
            position: relative;
        }
        .banner-cover {
            height: 140px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }
        .banner-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            color: #fff;
        }
        .banner-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .banner-desc {
            font-size: 12px;
            opacity: 0.9;
        }
        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 50%;
        }
        .dot.active {
            background: #333;
            width: 16px;
            border-radius: 3px;
        }

        /* 快捷入口 */
        .quick-entry {
            display: flex;
            justify-content: space-around;
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .entry-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .entry-icon {
            width: 44px;
            height: 44px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }
        .entry-text {
            font-size: 12px;
            color: #333;
        }

        /* 通用区块 */
        .section {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .section-action {
            font-size: 12px;
            color: #999;
            cursor: pointer;
        }

        /* 书籍网格（猜你喜欢） */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .book-card {
            cursor: pointer;
        }
        .book-card-cover {
            width: 100%;
            aspect-ratio: 3/4;
            background: #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 10px;
            margin-bottom: 8px;
        }
        .book-card-title {
            font-size: 13px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 4px;
        }
        .book-card-author {
            font-size: 11px;
            color: #999;
        }

        /* 书籍列表 */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .book-item {
            display: flex;
            gap: 12px;
            cursor: pointer;
        }
        .book-cover {
            width: 70px;
            height: 93px;
            background: #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 10px;
            flex-shrink: 0;
        }
        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .book-title {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .book-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .book-author {
            font-size: 12px;
            color: #999;
        }
        .book-tag {
            padding: 2px 6px;
            background: #f5f5f5;
            border-radius: 2px;
            font-size: 10px;
            color: #666;
        }
        .book-tag.hot {
            background: #f0f0f0;
            color: #333;
        }
        .book-tag.free {
            background: #f5f5f5;
            color: #666;
        }

        /* 底部导航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            height: 50px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            z-index: 100;
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            cursor: pointer;
        }
        .tab-icon {
            font-size: 12px;
            color: #999;
        }
        .tab-text {
            font-size: 10px;
            color: #999;
        }
        .tab-item.active .tab-icon,
        .tab-item.active .tab-text {
            color: #333;
            font-weight: 600;
        }

        /* Toast */
        .toast {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 300;
        }
        .toast.show {
            display: block;
            animation: fadeInOut 2s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-left">
            <span class="logo">番茄小说</span>
        </div>
        <div class="header-right">
            <span class="header-btn" onclick="location.href='#search'">[搜索]</span>
            <span class="header-btn">[历史]</span>
        </div>
    </div>

    <!-- 分类标签 -->
    <div class="category-tabs">
        <div class="tab active">推荐</div>
        <div class="tab">男生</div>
        <div class="tab">女生</div>
        <div class="tab">完本</div>
        <div class="tab">免费</div>
        <div class="tab">排行</div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 轮播Banner -->
        <div class="banner-section">
            <div class="banner-item">
                <div class="banner-cover">[Banner图]</div>
                <div class="banner-info">
                    <div class="banner-title">本周热门推荐</div>
                    <div class="banner-desc">精选好书，免费阅读</div>
                </div>
            </div>
            <div class="banner-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-entry">
            <div class="entry-item">
                <div class="entry-icon">[榜]</div>
                <span class="entry-text">排行榜</span>
            </div>
            <div class="entry-item">
                <div class="entry-icon">[完]</div>
                <span class="entry-text">完本</span>
            </div>
            <div class="entry-item">
                <div class="entry-icon">[免]</div>
                <span class="entry-text">免费</span>
            </div>
            <div class="entry-item">
                <div class="entry-icon">[分]</div>
                <span class="entry-text">分类</span>
            </div>
        </div>

        <!-- 猜你喜欢 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">猜你喜欢</span>
                <span class="section-action" onclick="refreshGuess()">[换一批]</span>
            </div>
            <div class="book-grid" id="guessBooks">
                <!-- 书籍卡片通过JS生成 -->
            </div>
        </div>

        <!-- 热门推荐 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">热门推荐</span>
                <span class="section-action">[更多 →]</span>
            </div>
            <div class="book-list" id="hotBooks">
                <!-- 书籍列表通过JS生成 -->
            </div>
        </div>

        <!-- 新书上架 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">新书上架</span>
                <span class="section-action">[更多 →]</span>
            </div>
            <div class="book-list" id="newBooks">
                <!-- 书籍列表通过JS生成 -->
            </div>
        </div>

        <!-- 完本精选 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">完本精选</span>
                <span class="section-action">[更多 →]</span>
            </div>
            <div class="book-list" id="finishedBooks">
                <!-- 书籍列表通过JS生成 -->
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active">
            <span class="tab-icon">[书城]</span>
            <span class="tab-text">书城</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">[书架]</span>
            <span class="tab-text">书架</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">[福利]</span>
            <span class="tab-text">福利</span>
        </div>
        <div class="tab-item">
            <span class="tab-icon">[我的]</span>
            <span class="tab-text">我的</span>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // 书籍数据
        const guessBooks = [
            { id: 1, title: '斗破苍穹', author: '天蚕土豆' },
            { id: 2, title: '完美世界', author: '辰东' },
            { id: 3, title: '遮天', author: '辰东' },
            { id: 4, title: '凡人修仙传', author: '忘语' },
            { id: 5, title: '大奉打更人', author: '卖报小郎君' },
            { id: 6, title: '诡秘之主', author: '爱潜水的乌贼' },
        ];

        const hotBooks = [
            { id: 1, title: '我有一剑', author: '青鸾峰上', desc: '少年叶观，身怀绝世剑意，踏入修行之路，一剑破万法...', tags: ['玄幻', '热门'] },
            { id: 2, title: '神印王座', author: '唐家三少', desc: '魔族强势，人类联盟岌岌可危，少年龙皓晨带着神印踏上征程...', tags: ['玄幻', '完本'] },
            { id: 3, title: '万族之劫', author: '老鹰吃小鸡', desc: '万族林立，人族危机四伏，少年苏宇踏上逆天改命之路...', tags: ['玄幻', '免费'] },
        ];

        const newBooks = [
            { id: 1, title: '开局签到荒古圣体', author: 'J神', desc: '穿越玄幻世界，开局签到荒古圣体，从此踏上无敌之路...', tags: ['玄幻', '新书'] },
            { id: 2, title: '我的师兄太强了', author: '言归正传', desc: '穿越修仙界，发现师兄竟是隐藏的绝世强者...', tags: ['仙侠', '新书'] },
        ];

        const finishedBooks = [
            { id: 1, title: '斗罗大陆', author: '唐家三少', desc: '唐门外门弟子唐三，因偷学内门绝学，被追杀跳崖重生异世...', tags: ['玄幻', '完本'] },
            { id: 2, title: '盘龙', author: '我吃西红柿', desc: '盘龙大陆，魔兽横行，少年林雷偶得神秘戒指，踏上强者之路...', tags: ['玄幻', '完本'] },
        ];

        // 渲染猜你喜欢
        function renderGuessBooks() {
            const container = document.getElementById('guessBooks');
            container.innerHTML = guessBooks.map(book => `
                <div class="book-card" onclick="openBook(${book.id}, '${book.title}')">
                    <div class="book-card-cover">[封面]</div>
                    <div class="book-card-title">${book.title}</div>
                    <div class="book-card-author">${book.author}</div>
                </div>
            `).join('');
        }

        // 渲染书籍列表
        function renderBookList(containerId, books) {
            const container = document.getElementById(containerId);
            container.innerHTML = books.map(book => `
                <div class="book-item" onclick="openBook(${book.id}, '${book.title}')">
                    <div class="book-cover">[封面]</div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-desc">${book.desc}</div>
                        <div class="book-meta">
                            <span class="book-author">${book.author}</span>
                            ${book.tags.map(tag => `<span class="book-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 显示Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 打开书籍
        function openBook(id, title) {
            showToast('打开: ' + title);
        }

        // 换一批
        function refreshGuess() {
            // 随机打乱顺序
            guessBooks.sort(() => Math.random() - 0.5);
            renderGuessBooks();
            showToast('已刷新推荐');
        }

        // 分类切换
        document.querySelectorAll('.category-tabs .tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tabs .tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                showToast('切换到: ' + this.textContent);
            });
        });

        // 底部导航切换
        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                const text = this.querySelector('.tab-text').textContent;
                showToast('切换到: ' + text);
            });
        });

        // 初始化
        renderGuessBooks();
        renderBookList('hotBooks', hotBooks);
        renderBookList('newBooks', newBooks);
        renderBookList('finishedBooks', finishedBooks);
    </script>
</body>
</html>
