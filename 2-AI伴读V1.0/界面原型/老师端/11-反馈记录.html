<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈记录 - 校校读吧小管家（老师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; padding-bottom: 20px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-back { font-size: 18px; cursor: pointer; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }

        /* 筛选区域 */
        .filter-section { background: white; padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-label { font-size: 13px; color: #666; min-width: 60px; line-height: 32px; }
        .filter-tags { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
        .filter-tag { padding: 6px 14px; border-radius: 16px; font-size: 12px; color: #666; background: #f5f5f5; cursor: pointer; transition: all 0.3s; }
        .filter-tag:active { transform: scale(0.96); }
        .filter-tag.active { color: #2E5BFF; background: rgba(46, 91, 255, 0.1); font-weight: 500; }

        /* 自定义时间选择 */
        .date-picker-row { display: none; align-items: center; gap: 8px; margin-top: 10px; }
        .date-picker-row.show { display: flex; }
        .date-input { flex: 1; height: 32px; border: 1px solid #e0e0e0; border-radius: 6px; padding: 0 10px; font-size: 12px; color: #333; }
        .date-input:focus { outline: none; border-color: #2E5BFF; }
        .date-separator { font-size: 12px; color: #999; }
        .date-confirm-btn { padding: 6px 12px; background: #2E5BFF; color: white; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .date-confirm-btn:active { opacity: 0.8; }

        .feedback-list { padding: 16px; }

        .feedback-card { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .feedback-header { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; justify-content: space-between; }
        .feedback-type { display: flex; align-items: center; gap: 8px; }
        .type-tag { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .type-suggestion { background: #e6f7ff; color: #1890ff; }
        .type-problem { background: #fff2e8; color: #fa541c; }
        .type-question { background: #f6ffed; color: #52c41a; }
        .type-other { background: #f5f5f5; color: #666; }
        .feedback-time { font-size: 12px; color: #999; }

        .feedback-status { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
        .status-pending { background: #fff7e6; color: #faad14; }
        .status-replied { background: #f6ffed; color: #52c41a; }
        .status-closed { background: #f5f5f5; color: #999; }

        .feedback-content { padding: 12px 16px; }
        .content-text { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 10px; }
        .content-images { display: flex; gap: 8px; flex-wrap: wrap; }
        .content-images img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; cursor: pointer; }

        /* 管理员回复 */
        .reply-section { background: #f8f9fc; padding: 12px 16px; border-top: 1px solid #f0f0f0; }
        .reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .reply-label { font-size: 13px; color: #2E5BFF; font-weight: 500; }
        .reply-time { font-size: 11px; color: #999; }
        .reply-content { font-size: 13px; color: #666; line-height: 1.6; }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; color: #d9d9d9; margin-bottom: 16px; }
        .empty-text { font-size: 14px; color: #999; }
        .empty-tip { font-size: 12px; color: #bfbfbf; margin-top: 8px; }

        .fa-solid, .fa-regular { font-weight: 400; color: #595959; opacity: 0.85; }
        .navbar .fa-solid { color: inherit; opacity: 1; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-back" onclick="history.back()">←</div>
        <div class="navbar-title">反馈记录</div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section">
        <div class="filter-row">
            <div class="filter-label">状态</div>
            <div class="filter-tags">
                <div class="filter-tag active" onclick="filterByStatus('all', this)">全部</div>
                <div class="filter-tag" onclick="filterByStatus('pending', this)">处理中</div>
                <div class="filter-tag" onclick="filterByStatus('replied', this)">已回复</div>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-label">时间</div>
            <div class="filter-tags">
                <div class="filter-tag active" onclick="filterByTime('all', this)">全部</div>
                <div class="filter-tag" onclick="filterByTime('week', this)">近一周</div>
                <div class="filter-tag" onclick="filterByTime('month', this)">近一月</div>
                <div class="filter-tag" onclick="filterByTime('custom', this)">自定义</div>
            </div>
        </div>
        <div class="date-picker-row" id="datePickerRow">
            <input type="date" class="date-input" id="startDate">
            <span class="date-separator">至</span>
            <input type="date" class="date-input" id="endDate">
            <button class="date-confirm-btn" onclick="applyCustomDate()">确定</button>
        </div>
    </div>

    <div class="feedback-list" id="feedbackList">
        <!-- 反馈记录将通过JavaScript动态生成 -->
    </div>

    <script src="./router.js"></script>
    <script>
        // 筛选条件
        let currentStatus = 'all';
        let currentTime = 'all';
        let customStartDate = null;
        let customEndDate = null;

        // 模拟反馈记录数据
        const mockFeedbacks = [
            {
                id: 1,
                type: '功能建议',
                content: '希望能增加班级之间的阅读排行榜功能，可以激励学生之间的良性竞争，提高阅读积极性。',
                images: [],
                submitTime: '2026-01-25 14:30',
                status: 'replied',
                statusText: '已回复',
                reply: {
                    time: '2026-01-26 09:15',
                    content: '感谢您的宝贵建议！班级排行榜功能已列入我们的开发计划，预计下个版本上线。届时会通过系统消息通知您，敬请期待！'
                }
            },
            {
                id: 2,
                type: '问题反馈',
                content: '学生端打卡页面加载很慢，有时候需要等待10秒以上才能显示内容，影响使用体验。',
                images: ['https://via.placeholder.com/100x100/e0e0e0/999?text=截图1'],
                submitTime: '2026-01-20 10:15',
                status: 'replied',
                statusText: '已回复',
                reply: {
                    time: '2026-01-20 16:30',
                    content: '您好，我们已经定位到问题原因，是服务器在高峰期负载过高导致的。目前已完成服务器扩容，请您再试试看是否有改善。如仍有问题请随时反馈。'
                }
            },
            {
                id: 3,
                type: '使用疑问',
                content: '请问如何批量导出学生的阅读数据？在哪个页面可以操作？',
                images: [],
                submitTime: '2026-01-18 16:45',
                status: 'replied',
                statusText: '已回复',
                reply: {
                    time: '2026-01-18 17:20',
                    content: '您好！批量导出功能在"我的-数据导出"页面，您可以选择导出时间范围和班级，支持导出Excel格式。如有其他问题欢迎继续咨询。'
                }
            },
            {
                id: 4,
                type: '功能建议',
                content: '建议在测评结束后自动生成学生的阅读能力分析报告，方便老师了解每个学生的薄弱环节。',
                images: [],
                submitTime: '2026-01-15 09:20',
                status: 'pending',
                statusText: '处理中',
                reply: null
            }
        ];

        // 页面加载时渲染
        window.addEventListener('DOMContentLoaded', () => {
            renderFeedbackList();
        });

        // 按状态筛选
        function filterByStatus(status, el) {
            currentStatus = status;
            // 更新标签样式
            el.parentElement.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            el.classList.add('active');
            renderFeedbackList();
        }

        // 按时间筛选
        function filterByTime(time, el) {
            currentTime = time;
            // 更新标签样式
            el.parentElement.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            el.classList.add('active');

            // 显示/隐藏自定义日期选择器
            const datePickerRow = document.getElementById('datePickerRow');
            if (time === 'custom') {
                datePickerRow.classList.add('show');
                // 设置默认日期范围（近一月）
                const today = new Date();
                const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
                document.getElementById('endDate').value = today.toISOString().split('T')[0];
                document.getElementById('startDate').value = monthAgo.toISOString().split('T')[0];
            } else {
                datePickerRow.classList.remove('show');
                customStartDate = null;
                customEndDate = null;
                renderFeedbackList();
            }
        }

        // 应用自定义日期
        function applyCustomDate() {
            const startInput = document.getElementById('startDate').value;
            const endInput = document.getElementById('endDate').value;

            if (!startInput || !endInput) {
                alert('请选择开始和结束日期');
                return;
            }

            if (new Date(startInput) > new Date(endInput)) {
                alert('开始日期不能大于结束日期');
                return;
            }

            customStartDate = new Date(startInput);
            customEndDate = new Date(endInput + ' 23:59:59');
            renderFeedbackList();
        }

        // 获取筛选后的数据
        function getFilteredData() {
            let data = [...mockFeedbacks];

            // 状态筛选
            if (currentStatus !== 'all') {
                data = data.filter(item => item.status === currentStatus);
            }

            // 时间筛选
            if (currentTime === 'custom' && customStartDate && customEndDate) {
                data = data.filter(item => {
                    const itemDate = new Date(item.submitTime);
                    return itemDate >= customStartDate && itemDate <= customEndDate;
                });
            } else if (currentTime !== 'all' && currentTime !== 'custom') {
                const now = new Date();
                let startDate;
                if (currentTime === 'week') {
                    startDate = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                } else if (currentTime === 'month') {
                    startDate = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                }
                data = data.filter(item => new Date(item.submitTime) >= startDate);
            }

            return data;
        }

        // 获取类型样式
        function getTypeClass(type) {
            const typeMap = {
                '功能建议': 'type-suggestion',
                '问题反馈': 'type-problem',
                '使用疑问': 'type-question',
                '其他': 'type-other'
            };
            return typeMap[type] || 'type-other';
        }

        // 获取状态样式
        function getStatusClass(status) {
            const statusMap = {
                'pending': 'status-pending',
                'replied': 'status-replied',
                'closed': 'status-closed'
            };
            return statusMap[status] || 'status-pending';
        }

        // 渲染反馈列表
        function renderFeedbackList() {
            const container = document.getElementById('feedbackList');
            const filteredData = getFilteredData();

            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fa-solid fa-comments"></i></div>
                        <div class="empty-text">暂无反馈记录</div>
                        <div class="empty-tip">您提交的反馈将显示在这里</div>
                    </div>
                `;
                return;
            }

            const html = filteredData.map(feedback => {
                // 图片部分
                const imagesHtml = feedback.images.length > 0
                    ? `<div class="content-images">${feedback.images.map(img => `<img src="${img}" alt="反馈图片">`).join('')}</div>`
                    : '';

                // 回复部分
                const replyHtml = feedback.reply
                    ? `
                        <div class="reply-section">
                            <div class="reply-header">
                                <span class="reply-label">官方回复</span>
                                <span class="reply-time">${feedback.reply.time}</span>
                            </div>
                            <div class="reply-content">${feedback.reply.content}</div>
                        </div>
                    `
                    : '';

                return `
                    <div class="feedback-card">
                        <div class="feedback-header">
                            <div class="feedback-type">
                                <span class="type-tag ${getTypeClass(feedback.type)}">${feedback.type}</span>
                                <span class="feedback-time">${feedback.submitTime}</span>
                            </div>
                            <span class="feedback-status ${getStatusClass(feedback.status)}">${feedback.statusText}</span>
                        </div>
                        <div class="feedback-content">
                            <div class="content-text">${feedback.content}</div>
                            ${imagesHtml}
                        </div>
                        ${replyHtml}
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }
    </script>
</body>
</html>
