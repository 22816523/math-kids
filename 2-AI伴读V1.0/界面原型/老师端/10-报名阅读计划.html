<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>报名阅读计划 - 校校读吧小管家（老师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; line-height: 1.4; font-weight: 600; margin-right: 28px; }

        .plan-summary { background: white; margin: 12px 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .plan-preview { background: linear-gradient(135deg, #52c41a, #73d13d); border-radius: 12px; padding: 20px; color: white; margin-bottom: 16px; }
        .plan-preview.spring { background: linear-gradient(135deg, #52c41a, #73d13d); }
        .plan-preview.summer { background: linear-gradient(135deg, #faad14, #ffc53d); }
        .plan-preview.autumn { background: linear-gradient(135deg, #fa8c16, #ffa940); }
        .plan-preview.winter { background: linear-gradient(135deg, #1890ff, #40a9ff); }
        .preview-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .preview-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 16px; }
        .preview-stats { display: flex; gap: 16px; font-size: 13px; }
        .preview-stat { display: flex; align-items: center; gap: 6px; }

        .section { background: white; margin: 12px 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .section-title { font-size: 15px; font-weight: 600; color: #333333; display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
        .section-title i { color: #2E5BFF; }
        .section-title .required { color: #ff4d4f; margin-left: 4px; }
        .select-all-btn { background: none; border: none; color: #2E5BFF; font-size: 14px; cursor: pointer; padding: 4px 8px; margin-left: auto; }

        .class-list { display: flex; flex-direction: column; gap: 12px; }
        .class-item { border: 2px solid #e8e8e8; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.3s; }
        .class-item:active { background: #F5F7FA; }
        .class-item.selected { border-color: #2E5BFF; background: #e6f7ff; }
        .class-item.enrolled { opacity: 0.5; cursor: not-allowed; background: #fafafa; }
        .class-item.enrolled:active { background: #fafafa; }
        .class-checkbox { width: 20px; height: 20px; border: 2px solid #d9d9d9; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
        .class-item.selected .class-checkbox { border-color: #2E5BFF; background: #2E5BFF; }
        .class-checkbox i { color: white; font-size: 12px; display: none; }
        .class-item.selected .class-checkbox i { display: block; }
        .class-info { flex: 1; min-width: 0; }
        .class-name { font-size: 14px; font-weight: 500; color: #333333; display: flex; align-items: center; gap: 8px; }
        .enrolled-badge { display: inline-block; padding: 2px 8px; background: #f0f0f0; color: #999999; font-size: 11px; border-radius: 12px; font-weight: 600; }

        .tips-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px; margin-top: 16px; }
        .tips-title { font-size: 13px; font-weight: 600; color: #faad14; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .tips-title i { font-size: 14px; }
        .tips-list { font-size: 12px; color: #595959; line-height: 1.6; }

        .settings-section { }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #333333; margin-bottom: 8px; }
        .form-input { width: 100%; border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px 12px; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #2E5BFF; }
        .help-text { font-size: 12px; color: #999999; margin-top: 4px; }

        .date-group { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
        .date-separator { color: #999999; font-size: 13px; text-align: center; }

        .switch-group { display: flex; justify-content: space-between; align-items: center; }
        .switch-label { font-size: 14px; color: #333333; }
        .switch { position: relative; width: 48px; height: 28px; background: #d9d9d9; border-radius: 14px; cursor: pointer; transition: all 0.3s; }
        .switch.active { background: #2E5BFF; }
        .switch-slider { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; background: white; border-radius: 50%; transition: all 0.3s; }
        .switch.active .switch-slider { left: 22px; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 12px 16px; max-width: 375px; margin: 0 auto; }
        .action-btn { width: 100%; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-enroll { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; }
        .btn-enroll:disabled { background: #d9d9d9; cursor: not-allowed; }
        .btn-enroll:active:not(:disabled) { opacity: 0.8; }

        .add-class-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; border: 2px dashed #d9d9d9; border-radius: 8px; background: none; color: #2E5BFF; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; margin-top: 12px; }
        .add-class-btn:active { background: #f0f8ff; border-color: #2E5BFF; }
        .add-class-btn i { font-size: 14px; }

        /* 快捷添加班级弹窗 */
        .setup-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .setup-modal-content { background: white; border-radius: 12px; width: 90%; max-width: 340px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
        .setup-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f0f0f0; }
        .setup-modal-title { font-size: 16px; font-weight: 600; color: #333333; flex: 1; }
        .setup-modal-close { background: none; border: none; color: #999999; font-size: 24px; cursor: pointer; padding: 0; width: 24px; height: 24px; line-height: 1; }
        .setup-modal-body { padding: 16px; overflow-y: auto; flex: 1; }
        .setup-modal-tip { font-size: 13px; color: #999999; line-height: 1.6; margin-bottom: 16px; padding: 8px 12px; background: #f5f7fa; border-radius: 6px; }
        .setup-form-group { margin-bottom: 16px; }
        .setup-form-label { display: flex; align-items: center; font-size: 14px; color: #333333; margin-bottom: 8px; font-weight: 500; }
        .setup-required { color: #ff4d4f; margin-left: 4px; }
        .setup-school-selector { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .setup-school-selector:active { background: #f5f5f5; }
        .setup-school-text { font-size: 14px; color: #333333; flex: 1; }
        .setup-school-text.placeholder { color: #bfbfbf; }
        .setup-arrow { color: #999999; font-size: 14px; }
        .setup-form-select { width: 100%; height: 40px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 12px; font-size: 14px; background: white; cursor: pointer; }
        .setup-form-select:focus { outline: none; border-color: #2E5BFF; }
        .setup-form-input { width: 100%; height: 40px; border: 1px solid #d9d9d9; border-radius: 6px; padding: 0 12px; font-size: 14px; background: white; }
        .setup-form-input:focus { outline: none; border-color: #2E5BFF; }
        .setup-form-input::placeholder { color: #bfbfbf; }
        .setup-class-row { display: flex; gap: 8px; }
        .setup-class-row .setup-form-select, .setup-class-row .setup-form-input { flex: 1; }
        .setup-class-preview { font-size: 13px; color: #2E5BFF; font-weight: 500; margin-top: 8px; }
        .setup-error-message { color: #ff4d4f; font-size: 12px; margin-top: 4px; display: none; }
        .setup-form-group.error .setup-school-selector,
        .setup-form-group.error .setup-form-select,
        .setup-form-group.error .setup-form-input { border-color: #ff4d4f; }
        .setup-form-group.error .setup-error-message { display: block; }
        .setup-modal-footer { display: flex; gap: 12px; padding: 12px 16px; border-top: 1px solid #f0f0f0; }
        .setup-btn { flex: 1; height: 44px; border-radius: 6px; font-size: 16px; font-weight: 500; cursor: pointer; border: none; }
        .setup-btn-cancel { background: white; color: #2E5BFF; border: 1px solid #2E5BFF; }
        .setup-btn-cancel:active { background: #f0f8ff; }
        .setup-btn-confirm { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; }
        .setup-btn-confirm:active { opacity: 0.8; }

        /* 学校选择弹窗 */
        .school-picker-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 1001; display: flex; flex-direction: column; }
        .school-picker-content { width: 100%; max-width: 375px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
        .school-picker-header { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; justify-content: space-between; }
        .school-picker-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; }
        .school-picker-title { font-size: 18px; font-weight: 600; flex: 1; text-align: center; }
        .school-picker-confirm { background: none; border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
        .school-picker-search { background: white; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        .school-search-box { display: flex; align-items: center; background: #F5F7FA; border-radius: 8px; padding: 8px 12px; }
        .school-search-box i { color: #999999; font-size: 14px; margin-right: 8px; }
        .school-search-box input { flex: 1; border: none; background: none; font-size: 14px; color: #333333; outline: none; }
        .school-search-box input::placeholder { color: #bfbfbf; }
        .school-picker-list { flex: 1; overflow-y: auto; background: white; }
        .school-picker-item { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .school-picker-item:active { background: #f5f5f5; }
        .school-picker-item-info { flex: 1; }
        .school-picker-item-name { font-size: 15px; color: #333333; margin-bottom: 4px; }
        .school-picker-item-address { font-size: 12px; color: #999999; }
        .school-picker-item-check { color: #2E5BFF; font-size: 20px; }

        /* 地区筛选 */
        .school-region-filter { background: white; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        .school-region-selector { display: flex; align-items: center; gap: 8px; }
        .school-region-btn { flex: 1; padding: 8px 12px; background: #F5F7FA; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; color: #666666; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .school-region-btn:active { background: #e8e8e8; }
        .school-region-btn .text { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .school-region-btn .arrow { color: #999999; font-size: 12px; margin-left: 4px; }
        .school-region-btn.selected { background: #E6F0FF; border-color: #2E5BFF; color: #2E5BFF; }
        .school-region-clear { padding: 8px; color: #999999; cursor: pointer; font-size: 14px; }
        .school-region-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1100; display: none; }
        .school-region-modal.show { display: flex; align-items: flex-end; justify-content: center; }
        .school-region-picker { background: white; width: 375px; border-radius: 12px 12px 0 0; max-height: 60vh; display: flex; flex-direction: column; }
        .school-region-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid #f0f0f0; }
        .school-region-title { font-size: 16px; font-weight: 600; color: #333333; }
        .school-region-cancel { color: #999999; font-size: 15px; cursor: pointer; }
        .school-region-confirm { color: #2E5BFF; font-size: 15px; cursor: pointer; font-weight: 500; }
        .school-region-content { display: flex; flex: 1; overflow: hidden; min-height: 200px; }
        .school-region-column { flex: 1; overflow-y: auto; border-right: 1px solid #f0f0f0; }
        .school-region-column:last-child { border-right: none; }
        .school-region-option { padding: 12px 16px; font-size: 14px; color: #333333; cursor: pointer; text-align: center; }
        .school-region-option:active { background: #f5f5f5; }
        .school-region-option.active { background: #E6F0FF; color: #2E5BFF; font-weight: 500; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">报名阅读计划</div>
    </div>

    <div class="plan-summary">
        <div class="plan-preview spring" id="planPreview">
            <div class="preview-title" id="planTitle">2026春季阅读计划</div>
            <div class="preview-stats">
                <div class="preview-stat">
                    <i class="fa-solid fa-book"></i>
                    <span id="bookCount">2本</span>
                </div>
                <div class="preview-stat">
                    <i class="fa-solid fa-calendar"></i>
                    <span id="levelCount">2026-02-15 至 2026-05-15</span>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <i class="fa-solid fa-book-open"></i>
            <span>选择班级</span>
            <span class="required">*</span>
            <button class="select-all-btn" onclick="toggleSelectAll()">
                <span id="selectAllText">全选</span>
            </button>
        </div>

        <div class="class-list" id="classList">
            <!-- 班级列表将通过JavaScript动态生成 -->
        </div>

        <button class="add-class-btn" onclick="showAddClassModal()">
            <i class="fa-solid fa-plus"></i>
            <span>添加班级</span>
        </button>

        <div class="tips-box">
            <div class="tips-title">
                <i class="fa-solid fa-lightbulb"></i>
                <span>温馨提示</span>
            </div>
            <div class="tips-list">报名后学生将立即看到该计划</div>
        </div>
    </div>

    <div class="action-bar">
        <button class="action-btn btn-enroll" id="enrollBtn" onclick="enrollPlan()" disabled>
            立即报名
        </button>
    </div>

    <!-- 快捷添加班级弹窗 -->
    <div class="setup-modal" id="setupModal" style="display: none;">
        <div class="setup-modal-content">
            <div class="setup-modal-header">
                <div class="setup-modal-title">添加班级即可报名</div>
                <button class="setup-modal-close" onclick="hideAddClassModal()">×</button>
            </div>
            <div class="setup-modal-body">
                <div class="setup-modal-tip">首次报名需要先设置学校和班级信息</div>
                <div class="setup-form-group" id="schoolGroup">
                    <label class="setup-form-label">学校<span class="setup-required">*</span></label>
                    <div class="setup-school-selector" id="schoolSelector" onclick="openSchoolPicker()">
                        <span class="setup-school-text placeholder" id="schoolText">请选择学校</span>
                        <span class="setup-arrow">→</span>
                    </div>
                    <div class="setup-error-message">请选择学校</div>
                </div>
                <div class="setup-form-group" id="admissionYearGroup">
                    <label class="setup-form-label">入学年份<span class="setup-required">*</span></label>
                    <select class="setup-form-select" id="setupAdmissionYearSelect">
                        <option value="">选择入学年份</option>
                    </select>
                    <div class="setup-error-message">请选择入学年份</div>
                </div>
                <div class="setup-form-group" id="gradeGroup">
                    <label class="setup-form-label">年级<span class="setup-required">*</span></label>
                    <select class="setup-form-select" id="setupGradeSelect">
                        <option value="">选择年级</option>
                    </select>
                    <div class="setup-error-message">请选择年级</div>
                </div>
                <div class="setup-form-group" id="classGroup">
                    <label class="setup-form-label">班级<span class="setup-required">*</span></label>
                    <div class="setup-class-row">
                        <select class="setup-form-select" id="setupClassSelect">
                            <option value="">选择班级</option>
                        </select>
                        <input type="text" class="setup-form-input" id="setupClassInput" placeholder="请输入班级名称" style="display: none;">
                    </div>
                    <div class="setup-error-message">请选择或输入班级</div>
                </div>
                <div class="setup-form-group" id="studentCountGroup">
                    <label class="setup-form-label">班级人数</label>
                    <input type="number" class="setup-form-select" id="setupStudentCount" placeholder="请输入班级人数" min="1" max="100">
                </div>
                <div class="setup-class-preview" id="setupClassPreview"></div>
            </div>
            <div class="setup-modal-footer">
                <button class="setup-btn setup-btn-cancel" onclick="hideAddClassModal()">取消</button>
                <button class="setup-btn setup-btn-confirm" onclick="submitAddClass()">确认创建</button>
            </div>
        </div>
    </div>

    <!-- 学校选择弹窗 -->
    <div class="school-picker-modal" id="schoolPickerModal" style="display: none;">
        <div class="school-picker-content">
            <div class="school-picker-header">
                <button class="school-picker-back" onclick="closeSchoolPicker()">←</button>
                <div class="school-picker-title">选择学校</div>
                <button class="school-picker-confirm" onclick="confirmSchool()">确定</button>
            </div>
            <div class="school-picker-search">
                <div class="school-search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="schoolSearchInput" placeholder="搜索学校名称" oninput="searchSchools()">
                </div>
            </div>
            <div class="school-region-filter">
                <div class="school-region-selector">
                    <div class="school-region-btn" id="spProvinceBtn" onclick="openSchoolRegionPicker()">
                        <span class="text">选择省份</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="school-region-btn" id="spCityBtn" onclick="openSchoolRegionPicker()">
                        <span class="text">选择城市</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="school-region-btn" id="spDistrictBtn" onclick="openSchoolRegionPicker()">
                        <span class="text">选择区县</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="school-region-clear" id="spRegionClearBtn" onclick="clearSchoolRegion()" style="display: none;">
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                </div>
            </div>
            <div class="school-picker-list" id="schoolPickerList"></div>
        </div>
    </div>

    <!-- 地区选择弹窗 -->
    <div class="school-region-modal" id="schoolRegionModal" onclick="closeSchoolRegionPicker(event)">
        <div class="school-region-picker" onclick="event.stopPropagation()">
            <div class="school-region-header">
                <div class="school-region-cancel" onclick="closeSchoolRegionPicker()">取消</div>
                <div class="school-region-title">选择地区</div>
                <div class="school-region-confirm" onclick="confirmSchoolRegion()">确定</div>
            </div>
            <div class="school-region-content">
                <div class="school-region-column" id="spProvinceColumn"></div>
                <div class="school-region-column" id="spCityColumn"></div>
                <div class="school-region-column" id="spDistrictColumn"></div>
            </div>
        </div>
    </div>

    <script src="./router.js"></script>
    <script>
        // 模拟班级数据
        const mockClasses = [
            { id: 1, name: '一年级(1)班', admissionYear: '2025', studentCount: 45 },
            { id: 2, name: '一年级(2)班', admissionYear: '2025', studentCount: 43 },
            { id: 3, name: '一年级(3)班', admissionYear: '2025', studentCount: 46 }
        ];

        // 模拟计划数据
        const mockPlans = {
            1: {
                id: 1,
                planId: 1,
                planName: '2026春季阅读计划',
                season: 'spring',
                seasonText: '春季',
                startDate: '2026-02-15',
                endDate: '2026-05-15',
                bookCount: 2,
                description: '精选适合春季阅读的经典文学作品，培养学生的文学素养和阅读兴趣'
            },
            2: {
                id: 2,
                planId: 2,
                planName: '2026寒假阅读计划',
                season: 'winter',
                seasonText: '寒假',
                startDate: '2026-01-15',
                endDate: '2026-02-10',
                bookCount: 2,
                description: '利用寒假时间，通过阅读经典名著提升学生的阅读能力和思维深度'
            },
            3: {
                id: 3,
                planId: 3,
                planName: '2025秋季阅读计划',
                season: 'autumn',
                seasonText: '秋季',
                startDate: '2025-09-01',
                endDate: '2026-01-31',
                bookCount: 2,
                description: '新学期开始，通过阅读帮助学生快速进入学习状态，培养良好的阅读习惯'
            }
        };

        // 模拟已报名班级数据（独立维护）
        const planEnrollments = {
            1: [],           // 计划1：没有班级报名
            2: [],           // 计划2：没有班级报名（首次报名场景）
            3: [1, 2]        // 计划3：班级1和2已报名（追加班级场景）
        };

        let currentPlan = null;
        let selectedClasses = new Set();

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const planId = parseInt(urlParams.get('planId'));

            if (planId) {
                loadPlanData(planId);
            }

            renderClasses();
        });

        // 加载计划数据
        function loadPlanData(planId) {
            currentPlan = mockPlans[planId];
            if (!currentPlan) return;

            document.getElementById('planTitle').textContent = currentPlan.planName;
            document.getElementById('bookCount').textContent = `${currentPlan.bookCount}本`;
            document.getElementById('levelCount').textContent = `${currentPlan.startDate} 至 ${currentPlan.endDate}`;

            const preview = document.getElementById('planPreview');
            preview.className = `plan-preview ${currentPlan.season}`;
        }

        // 渲染班级列表
        function renderClasses() {
            const classList = document.getElementById('classList');

            if (mockClasses.length === 0) {
                classList.innerHTML = `
                    <div class="empty-classes">
                        <div class="empty-icon">🏫</div>
                        <div>还没有创建班级</div>
                        <div style="font-size: 12px; margin-top: 8px;">请先创建班级</div>
                    </div>
                `;
                return;
            }

            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];

            classList.innerHTML = mockClasses.map(cls => {
                const isEnrolled = enrolledClasses.includes(cls.id);
                const isSelected = selectedClasses.has(cls.id);
                const classNames = ['class-item'];

                if (isEnrolled) {
                    classNames.push('enrolled');
                } else if (isSelected) {
                    classNames.push('selected');
                }

                return `
                    <div class="${classNames.join(' ')}" onclick="toggleClass(${cls.id})">
                        <div class="class-checkbox">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div class="class-info">
                            <div class="class-name">
                                ${cls.name}${cls.admissionYear ? ` · ${cls.admissionYear}年入学` : ''} · ${cls.studentCount}人
                                ${isEnrolled ? '<span class="enrolled-badge">已报名</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 切换班级选择
        function toggleClass(classId) {
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            if (enrolledClasses.includes(classId)) {
                return;
            }

            if (selectedClasses.has(classId)) {
                selectedClasses.delete(classId);
            } else {
                selectedClasses.add(classId);
            }

            renderClasses();
            updateSelectedCount();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const availableClasses = mockClasses.filter(cls => !enrolledClasses.includes(cls.id));

            if (selectedClasses.size === availableClasses.length) {
                selectedClasses.clear();
                document.getElementById('selectAllText').textContent = '全选';
            } else {
                availableClasses.forEach(cls => selectedClasses.add(cls.id));
                document.getElementById('selectAllText').textContent = '取消全选';
            }

            renderClasses();
            updateSelectedCount();
        }

        // 更新选中数量显示
        function updateSelectedCount() {
            const enrollBtn = document.getElementById('enrollBtn');
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const availableClasses = mockClasses.filter(cls => !enrolledClasses.includes(cls.id));

            if (selectedClasses.size > 0) {
                enrollBtn.disabled = false;
                document.getElementById('selectAllText').textContent =
                    selectedClasses.size === availableClasses.length ? '取消全选' : '全选';
            } else {
                enrollBtn.disabled = true;
                document.getElementById('selectAllText').textContent = '全选';
            }
        }

        // 报名计划
        function enrollPlan() {
            if (selectedClasses.size === 0) {
                alert('请至少选择一个班级');
                return;
            }

            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const newClassIds = Array.from(selectedClasses).filter(id => !enrolledClasses.includes(id));

            const selectedClassNames = mockClasses
                .filter(cls => newClassIds.includes(cls.id))
                .map(cls => `${cls.name}${cls.admissionYear ? `（${cls.admissionYear}年入学）` : ''}`)
                .join('、');

            const enrollData = {
                planId: currentPlan.id,
                classIds: newClassIds
            };

            // 实际应调用API报名
            console.log('报名数据：', enrollData);

            if (confirm(`确认将"${currentPlan.planName}"报名到以下班级吗？\n\n${selectedClassNames}\n\n报名后学生将立即看到该计划`)) {
                showToast('报名成功');

                setTimeout(() => {
                    Router.toTeacherPage('planList');
                }, 1500);
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000;';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // ========== 快捷添加班级逻辑 ==========

        let selectedSchool = null;
        let tempSelectedSchool = null;
        let allSchools = [];
        let filteredSchools = [];

        const gradeConfig = ['一年级', '二年级', '三年级', '四年级', '五年级', '六年级'];
        const currentYear = new Date().getFullYear();
        const admissionYearConfig = Array.from({ length: 8 }, (_, index) => String(currentYear - index));

        const schoolData = [
            { id: 1, name: '北京市实验小学', address: '北京市西城区', provinceId: 1, cityId: 101, districtId: 10102 },
            { id: 2, name: '北京市第一小学', address: '北京市东城区', provinceId: 1, cityId: 101, districtId: 10101 },
            { id: 3, name: '北京市第二小学', address: '北京市朝阳区', provinceId: 1, cityId: 101, districtId: 10103 },
            { id: 4, name: '中关村第一小学', address: '北京市海淀区', provinceId: 1, cityId: 101, districtId: 10104 },
            { id: 5, name: '中关村第二小学', address: '北京市海淀区', provinceId: 1, cityId: 101, districtId: 10104 },
            { id: 6, name: '中关村第三小学', address: '北京市海淀区', provinceId: 1, cityId: 101, districtId: 10104 },
            { id: 7, name: '北京师范大学附属小学', address: '北京市海淀区', provinceId: 1, cityId: 101, districtId: 10104 },
            { id: 8, name: '清华大学附属小学', address: '北京市海淀区', provinceId: 1, cityId: 101, districtId: 10104 },
            { id: 9, name: '上海市实验小学', address: '上海市黄浦区', provinceId: 2, cityId: 201, districtId: 20101 },
            { id: 10, name: '广州市越秀区东风东路小学', address: '广东省广州市越秀区', provinceId: 3, cityId: 301, districtId: 30102 }
        ];

        const spRegionData = {
            provinces: [
                { id: 1, name: '北京市', cities: [{ id: 101, name: '北京市', districts: [{ id: 10101, name: '东城区' }, { id: 10102, name: '西城区' }, { id: 10103, name: '朝阳区' }, { id: 10104, name: '海淀区' }, { id: 10105, name: '丰台区' }, { id: 10106, name: '石景山区' }] }] },
                { id: 2, name: '上海市', cities: [{ id: 201, name: '上海市', districts: [{ id: 20101, name: '黄浦区' }, { id: 20102, name: '徐汇区' }, { id: 20103, name: '长宁区' }, { id: 20104, name: '静安区' }, { id: 20105, name: '普陀区' }] }] },
                { id: 3, name: '广东省', cities: [{ id: 301, name: '广州市', districts: [{ id: 30101, name: '天河区' }, { id: 30102, name: '越秀区' }, { id: 30103, name: '海珠区' }] }, { id: 302, name: '深圳市', districts: [{ id: 30201, name: '福田区' }, { id: 30202, name: '南山区' }, { id: 30203, name: '宝安区' }] }] }
            ]
        };

        let spSelectedProvince = null, spSelectedCity = null, spSelectedDistrict = null;
        let spTempProvince = null, spTempCity = null, spTempDistrict = null;

        function showAddClassModal() {
            initSetupAdmissionYearSelect();
            initSetupGradeSelect();
            initSetupClassSelect();

            const savedSchool = localStorage.getItem('teacherSchool');
            if (savedSchool) {
                selectedSchool = JSON.parse(savedSchool);
                document.getElementById('schoolText').textContent = selectedSchool.name;
                document.getElementById('schoolText').classList.remove('placeholder');
            }

            document.getElementById('setupModal').style.display = 'flex';
        }

        function hideAddClassModal() {
            document.getElementById('setupModal').style.display = 'none';
            document.querySelectorAll('.setup-form-group').forEach(g => g.classList.remove('error'));
            document.getElementById('setupAdmissionYearSelect').value = '';
            document.getElementById('setupGradeSelect').value = '';
            document.getElementById('setupClassSelect').value = '';
            document.getElementById('setupClassInput').value = '';
            document.getElementById('setupClassInput').style.display = 'none';
            document.getElementById('setupStudentCount').value = '';
            document.getElementById('setupClassPreview').textContent = '';
        }

        function initSetupAdmissionYearSelect() {
            const sel = document.getElementById('setupAdmissionYearSelect');
            sel.innerHTML = '<option value="">选择入学年份</option>';
            admissionYearConfig.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = `${year}年`;
                sel.appendChild(option);
            });
            sel.onchange = updateSetupClassPreview;
        }

        function initSetupGradeSelect() {
            const sel = document.getElementById('setupGradeSelect');
            sel.innerHTML = '<option value="">选择年级</option>';
            gradeConfig.forEach(g => { const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o); });
            sel.onchange = updateSetupClassPreview;
        }

        function initSetupClassSelect() {
            const sel = document.getElementById('setupClassSelect');
            const inp = document.getElementById('setupClassInput');
            sel.innerHTML = '<option value="">选择班级</option>';
            const co = document.createElement('option'); co.value = 'custom'; co.textContent = '自定义'; sel.appendChild(co);
            for (let i = 1; i <= 99; i++) { const o = document.createElement('option'); o.value = i; o.textContent = `${i}班`; sel.appendChild(o); }
            sel.onchange = function() {
                if (this.value === 'custom') { inp.style.display = 'block'; inp.focus(); } else { inp.style.display = 'none'; inp.value = ''; }
                updateSetupClassPreview();
            };
            inp.oninput = updateSetupClassPreview;
        }

        function updateSetupClassPreview() {
            const admissionYear = document.getElementById('setupAdmissionYearSelect').value;
            const grade = document.getElementById('setupGradeSelect').value;
            const cls = document.getElementById('setupClassSelect').value;
            const inp = document.getElementById('setupClassInput').value.trim();
            const preview = document.getElementById('setupClassPreview');
            if (admissionYear && grade) {
                if (cls === 'custom' && inp) preview.textContent = `入学年份：${admissionYear}年 · 班级名称：${grade}${inp}`;
                else if (cls && cls !== 'custom') preview.textContent = `入学年份：${admissionYear}年 · 班级名称：${grade}(${cls})班`;
                else preview.textContent = '';
            } else { preview.textContent = ''; }
        }

        function submitAddClass() {
            let valid = true;
            if (!selectedSchool) { document.getElementById('schoolGroup').classList.add('error'); valid = false; } else { document.getElementById('schoolGroup').classList.remove('error'); }
            const admissionYear = document.getElementById('setupAdmissionYearSelect').value;
            if (!admissionYear) { document.getElementById('admissionYearGroup').classList.add('error'); valid = false; } else { document.getElementById('admissionYearGroup').classList.remove('error'); }
            const grade = document.getElementById('setupGradeSelect').value;
            if (!grade) { document.getElementById('gradeGroup').classList.add('error'); valid = false; } else { document.getElementById('gradeGroup').classList.remove('error'); }
            const cls = document.getElementById('setupClassSelect').value;
            const inp = document.getElementById('setupClassInput').value.trim();
            if (!cls || (cls === 'custom' && !inp)) { document.getElementById('classGroup').classList.add('error'); valid = false; } else { document.getElementById('classGroup').classList.remove('error'); }
            if (!valid) { alert('请填写所有必填项'); return; }

            const className = (cls === 'custom') ? `${grade}${inp}` : `${grade}(${cls})班`;
            const studentCount = parseInt(document.getElementById('setupStudentCount').value) || 0;

            // 检查是否已存在同名班级
            if (mockClasses.some(c => c.name === className && c.admissionYear === admissionYear)) {
                alert('该班级已存在');
                return;
            }

            // 添加新班级到列表
            const newId = mockClasses.length > 0 ? Math.max(...mockClasses.map(c => c.id)) + 1 : 1;
            mockClasses.push({ id: newId, name: className, admissionYear: admissionYear, studentCount: studentCount });

            // 保存学校信息
            localStorage.setItem('teacherSchool', JSON.stringify(selectedSchool));

            hideAddClassModal();
            showToast('班级添加成功');
            renderClasses();
        }

        // ========== 学校选择器 ==========

        function openSchoolPicker() {
            allSchools = schoolData;
            filteredSchools = schoolData;
            tempSelectedSchool = selectedSchool;
            spSelectedProvince = null; spSelectedCity = null; spSelectedDistrict = null;
            updateSchoolRegionButtons();
            renderSchoolList();
            document.getElementById('schoolPickerModal').style.display = 'flex';
        }

        function closeSchoolPicker() {
            document.getElementById('schoolPickerModal').style.display = 'none';
            document.getElementById('schoolSearchInput').value = '';
        }

        function renderSchoolList() {
            const html = filteredSchools.map(s => {
                const sel = tempSelectedSchool && tempSelectedSchool.id === s.id;
                return `<div class="school-picker-item" onclick="selectSchoolItem(${s.id})">
                    <div class="school-picker-item-info"><div class="school-picker-item-name">${s.name}</div><div class="school-picker-item-address">${s.address}</div></div>
                    ${sel ? '<div class="school-picker-item-check"><i class="fa-solid fa-check"></i></div>' : ''}
                </div>`;
            }).join('');
            document.getElementById('schoolPickerList').innerHTML = html || '<div style="text-align:center;padding:40px;color:#999;">未找到相关学校</div>';
        }

        function selectSchoolItem(id) { tempSelectedSchool = allSchools.find(s => s.id === id); renderSchoolList(); }

        function confirmSchool() {
            if (tempSelectedSchool) {
                selectedSchool = tempSelectedSchool;
                document.getElementById('schoolText').textContent = selectedSchool.name;
                document.getElementById('schoolText').classList.remove('placeholder');
                document.getElementById('schoolGroup').classList.remove('error');
            }
            closeSchoolPicker();
        }

        function searchSchools() { applySchoolFilters(); }

        function applySchoolFilters() {
            let schools = allSchools;
            if (spSelectedDistrict) schools = schools.filter(s => s.districtId === spSelectedDistrict.id);
            else if (spSelectedCity) schools = schools.filter(s => s.cityId === spSelectedCity.id);
            else if (spSelectedProvince) schools = schools.filter(s => s.provinceId === spSelectedProvince.id);
            const kw = document.getElementById('schoolSearchInput').value.trim().toLowerCase();
            if (kw) schools = schools.filter(s => s.name.toLowerCase().includes(kw) || s.address.toLowerCase().includes(kw));
            filteredSchools = schools;
            renderSchoolList();
        }

        // ========== 地区筛选 ==========

        function openSchoolRegionPicker() {
            spTempProvince = spSelectedProvince; spTempCity = spSelectedCity; spTempDistrict = spSelectedDistrict;
            renderSpProvinces();
            if (spTempProvince) { renderSpCities(spTempProvince); if (spTempCity) renderSpDistricts(spTempCity); }
            document.getElementById('schoolRegionModal').classList.add('show');
        }
        function closeSchoolRegionPicker(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('schoolRegionModal').classList.remove('show'); }

        function renderSpProvinces() {
            document.getElementById('spProvinceColumn').innerHTML = spRegionData.provinces.map(p =>
                `<div class="school-region-option ${spTempProvince && spTempProvince.id === p.id ? 'active' : ''}" onclick="selectSpProvince(${p.id})">${p.name}</div>`
            ).join('');
        }
        function renderSpCities(prov) {
            if (!prov) { document.getElementById('spCityColumn').innerHTML = ''; return; }
            document.getElementById('spCityColumn').innerHTML = prov.cities.map(c =>
                `<div class="school-region-option ${spTempCity && spTempCity.id === c.id ? 'active' : ''}" onclick="selectSpCity(${prov.id},${c.id})">${c.name}</div>`
            ).join('');
        }
        function renderSpDistricts(city) {
            if (!city) { document.getElementById('spDistrictColumn').innerHTML = ''; return; }
            document.getElementById('spDistrictColumn').innerHTML = city.districts.map(d =>
                `<div class="school-region-option ${spTempDistrict && spTempDistrict.id === d.id ? 'active' : ''}" onclick="selectSpDistrict(${city.id},${d.id})">${d.name}</div>`
            ).join('');
        }
        function selectSpProvince(id) { spTempProvince = spRegionData.provinces.find(p => p.id === id); spTempCity = null; spTempDistrict = null; renderSpProvinces(); renderSpCities(spTempProvince); document.getElementById('spDistrictColumn').innerHTML = ''; }
        function selectSpCity(pid, cid) { const p = spRegionData.provinces.find(x => x.id === pid); spTempCity = p.cities.find(c => c.id === cid); spTempDistrict = null; renderSpCities(p); renderSpDistricts(spTempCity); }
        function selectSpDistrict(cid, did) { const p = spRegionData.provinces.find(x => x.cities.some(c => c.id === cid)); const c = p.cities.find(x => x.id === cid); spTempDistrict = c.districts.find(d => d.id === did); renderSpDistricts(c); }
        function confirmSchoolRegion() { spSelectedProvince = spTempProvince; spSelectedCity = spTempCity; spSelectedDistrict = spTempDistrict; updateSchoolRegionButtons(); closeSchoolRegionPicker(); applySchoolFilters(); }
        function updateSchoolRegionButtons() {
            const pb = document.getElementById('spProvinceBtn'), cb = document.getElementById('spCityBtn'), db = document.getElementById('spDistrictBtn'), clr = document.getElementById('spRegionClearBtn');
            if (spSelectedProvince) { pb.querySelector('.text').textContent = spSelectedProvince.name; pb.classList.add('selected'); clr.style.display = 'block'; } else { pb.querySelector('.text').textContent = '选择省份'; pb.classList.remove('selected'); clr.style.display = 'none'; }
            if (spSelectedCity) { cb.querySelector('.text').textContent = spSelectedCity.name; cb.classList.add('selected'); } else { cb.querySelector('.text').textContent = '选择城市'; cb.classList.remove('selected'); }
            if (spSelectedDistrict) { db.querySelector('.text').textContent = spSelectedDistrict.name; db.classList.add('selected'); } else { db.querySelector('.text').textContent = '选择区县'; db.classList.remove('selected'); }
        }
        function clearSchoolRegion() { spSelectedProvince = null; spSelectedCity = null; spSelectedDistrict = null; updateSchoolRegionButtons(); applySchoolFilters(); }
    </script>
</body>
</html>
