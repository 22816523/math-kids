<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择教龄 - 校校读吧小管家（老师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .save-btn { background: none; border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
        .save-btn:hover { opacity: 0.8; }

        .option-list { background: white; margin: 12px 16px; border-radius: 8px; overflow: hidden; }
        .option-item { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .option-item:last-child { border-bottom: none; }
        .option-item:active { background: #f5f5f5; }
        .option-text { font-size: 16px; color: #333333; }
        .option-check { color: #2E5BFF; font-size: 20px; }

        .loading { text-align: center; padding: 40px 16px; color: #999999; font-size: 14px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">选择教龄</div>
        <button class="save-btn" onclick="saveTeachingYears()">保存</button>
    </div>

    <div class="option-list" id="optionList">
        <div class="loading">加载中...</div>
    </div>

    <script src="./router.js"></script>
    <script>
        // 当前选中的教龄（从URL参数或localStorage获取）
        let currentYears = '10年'
        let selectedYears = currentYears
        let allYears = []

        // 页面加载时获取教龄列表
        window.addEventListener('DOMContentLoaded', () => {
            loadTeachingYears()
        })

        function loadTeachingYears() {
            // 实际应该调用API获取教龄列表
            // fetch('/api/teaching-years').then(res => res.json()).then(data => { ... })

            // 模拟API数据
            allYears = [
                { id: 1, name: '1年以下' },
                { id: 2, name: '1-3年' },
                { id: 3, name: '3-5年' },
                { id: 4, name: '5-10年' },
                { id: 5, name: '10-15年' },
                { id: 6, name: '15-20年' },
                { id: 7, name: '20年以上' }
            ]

            renderTeachingYears(allYears)
        }

        function renderTeachingYears(years) {
            const listHtml = years.map(year => {
                const isSelected = year.name === selectedYears
                return `
                    <div class="option-item" onclick="selectTeachingYears('${year.name}')">
                        <div class="option-text">${year.name}</div>
                        <div class="option-check" id="check-${year.id}" style="display: ${isSelected ? 'block' : 'none'};">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                `
            }).join('')

            document.getElementById('optionList').innerHTML = listHtml
        }

        function selectTeachingYears(years) {
            // 只更新选中状态，不保存
            selectedYears = years
            renderTeachingYears(allYears)
        }

        function saveTeachingYears() {
            // 实际应该调用API保存
            currentYears = selectedYears
            alert('保存成功')
            Router.back()
        }
    </script>
</body>
</html>
