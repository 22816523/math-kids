<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>选择学段 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .save-btn { background: none; border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
        .save-btn:hover { opacity: 0.8; }

        .option-list { background: white; margin: 12px 16px; border-radius: 8px; overflow: hidden; }
        .option-item { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .option-item:last-child { border-bottom: none; }
        .option-item:active { background: #f5f5f5; }
        .option-text { font-size: 16px; color: #333333; }
        .option-check { color: #2E5BFF; font-size: 20px; }

        .loading { text-align: center; padding: 40px 16px; color: #999999; font-size: 14px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">选择学段</div>
        <button class="save-btn" onclick="saveStage()">保存</button>
    </div>

    <div class="option-list" id="optionList">
        <div class="loading">加载中...</div>
    </div>

    <script src="../router.js"></script>
    <script>
        // 当前选中的学段（从URL参数或localStorage获取）
        let currentStage = '初中'
        let selectedStage = currentStage
        let allStages = []

        // 页面加载时获取学段列表
        window.addEventListener('DOMContentLoaded', () => {
            loadStages()
        })

        function loadStages() {
            // 实际应该调用API获取学段列表
            // fetch('/api/stages').then(res => res.json()).then(data => { ... })

            // 模拟API数据
            allStages = [
                { id: 1, name: '小学' },
                { id: 2, name: '初中' },
                { id: 3, name: '高中' },
                { id: 4, name: '中职' },
                { id: 5, name: '高职' }
            ]

            renderStages(allStages)
        }

        function renderStages(stages) {
            const listHtml = stages.map(stage => {
                const isSelected = stage.name === selectedStage
                return `
                    <div class="option-item" onclick="selectStage('${stage.name}')">
                        <div class="option-text">${stage.name}</div>
                        <div class="option-check" id="check-${stage.id}" style="display: ${isSelected ? 'block' : 'none'};">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                `
            }).join('')

            document.getElementById('optionList').innerHTML = listHtml
        }

        function selectStage(stage) {
            // 只更新选中状态，不保存
            selectedStage = stage
            renderStages(allStages)
        }

        function saveStage() {
            // 实际应该调用API保存
            currentStage = selectedStage
            alert('保存成功')
            Router.back()
        }
    </script>
</body>
</html>
