<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑个人简介 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .save-btn { background: none; border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
        .save-btn:hover { opacity: 0.8; }

        .form-section { background: white; margin: 12px 16px; border-radius: 8px; padding: 16px; }
        .form-label { font-size: 14px; color: #999999; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .char-count { font-size: 12px; color: #999999; }
        .form-textarea { width: 100%; border: none; font-size: 16px; color: #333333; outline: none; resize: none; min-height: 150px; font-family: inherit; line-height: 1.6; }
        .form-textarea:focus { border-color: #2E5BFF; }
        .form-tip { font-size: 12px; color: #999999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">编辑个人简介</div>
        <button class="save-btn" onclick="saveBio()">保存</button>
    </div>

    <div class="form-section">
        <div class="form-label">
            <span>个人简介</span>
            <span class="char-count"><span id="currentCount">0</span>/200</span>
        </div>
        <textarea class="form-textarea" id="bioInput" placeholder="请输入个人简介，让学生和家长更了解您" maxlength="200" oninput="updateCharCount()">从事语文教学10年，热爱阅读，致力于培养学生的阅读兴趣和能力</textarea>
        <div class="form-tip">介绍您的教学经验、教学理念或个人特长</div>
    </div>

    <script src="../router.js"></script>
    <script>
        // 页面加载时更新字数统计
        window.addEventListener('DOMContentLoaded', () => {
            updateCharCount()
        })

        function updateCharCount() {
            const bio = document.getElementById('bioInput').value
            document.getElementById('currentCount').textContent = bio.length
        }

        function saveBio() {
            const bio = document.getElementById('bioInput').value.trim()

            if (bio.length > 200) {
                alert('个人简介不能超过200字')
                return
            }

            // 实际应该调用API保存
            alert('保存成功')
            Router.back()
        }
    </script>
</body>
</html>
