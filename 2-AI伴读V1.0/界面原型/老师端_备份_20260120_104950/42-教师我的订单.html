<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教师我的订单 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; font-weight: 600; margin-right: 28px; }

        .tabs-bar { background: white; display: flex; border-bottom: 1px solid #e8e8e8; position: sticky; top: 44px; z-index: 90; }
        .tab-item { flex: 1; text-align: center; padding: 14px 0; font-size: 14px; color: #595959; cursor: pointer; position: relative; }
        .tab-item.active { color: #2E5BFF; font-weight: 600; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: #2E5BFF; border-radius: 2px 2px 0 0; }

        .orders-list { padding: 12px 16px; }
        .order-card { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .order-header { padding: 12px 16px; background: #fafafa; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .order-number { font-size: 13px; color: #595959; }
        .order-status { font-size: 13px; font-weight: 600; }
        .status-pending { color: #faad14; }
        .status-shipped { color: #2E5BFF; }
        .status-completed { color: #52c41a; }

        .order-content { padding: 16px; }
        .product-info { display: flex; gap: 12px; margin-bottom: 12px; }
        .product-image { width: 80px; height: 80px; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); flex-shrink: 0; }
        .product-details { flex: 1; min-width: 0; }
        .product-name { font-size: 15px; font-weight: 600; color: #333333; margin-bottom: 6px; }
        .product-points { font-size: 14px; color: #FF6B6B; font-weight: 600; }

        .order-info { background: #fafafa; border-radius: 8px; padding: 12px; font-size: 13px; color: #595959; line-height: 1.8; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: #999999; }
        .info-value { color: #333333; font-weight: 500; }

        .order-actions { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
        .action-btn { flex: 1; border: 1px solid #d9d9d9; background: white; border-radius: 6px; padding: 8px; font-size: 13px; color: #595959; cursor: pointer; }
        .action-btn:active { background: #F5F7FA; }
        .action-btn.primary { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; border: none; }
        .action-btn.primary:active { opacity: 0.8; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .empty-text { font-size: 15px; color: #999999; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">教师我的订单</div>
    </div>

    <div class="tabs-bar">
        <div class="tab-item active" onclick="switchTab('all', this)">全部</div>
        <div class="tab-item" onclick="switchTab('pending', this)">待发货</div>
        <div class="tab-item" onclick="switchTab('shipped', this)">已发货</div>
        <div class="tab-item" onclick="switchTab('completed', this)">已完成</div>
    </div>

    <div class="orders-list" id="ordersList">
        <!-- 订单列表将通过JavaScript动态生成 -->
    </div>

    <script src="../router.js"></script>
    <script>
        // 模拟订单数据
        const mockOrders = [
            {
                id: 1001,
                orderNumber: 'T20260108001',
                productId: 1,
                productName: '精美书签套装',
                productImage: '',
                points: 500,
                status: 'pending',
                statusText: '待发货',
                address: {
                    name: '张老师',
                    phone: '138****8888',
                    detail: '广东省深圳市南山区科技园南区深南大道10000号'
                },
                createdAt: '2026-01-08 10:30:00',
                shippedAt: null,
                completedAt: null,
                trackingNumber: null
            },
            {
                id: 1002,
                orderNumber: 'T20260107002',
                productId: 2,
                productName: '高级钢笔礼盒',
                productImage: '',
                points: 800,
                status: 'shipped',
                statusText: '已发货',
                address: {
                    name: '张老师',
                    phone: '138****8888',
                    detail: '广东省深圳市南山区科技园南区深南大道10000号'
                },
                createdAt: '2026-01-07 14:20:00',
                shippedAt: '2026-01-08 09:00:00',
                completedAt: null,
                trackingNumber: 'SF1234567890',
                expressCompany: '顺丰速运'
            },
            {
                id: 1003,
                orderNumber: 'T20260105003',
                productId: 4,
                productName: '创意便签本',
                productImage: '',
                points: 300,
                status: 'completed',
                statusText: '已完成',
                address: {
                    name: '张老师',
                    phone: '138****8888',
                    detail: '广东省深圳市南山区科技园南区深南大道10000号'
                },
                createdAt: '2026-01-05 16:45:00',
                shippedAt: '2026-01-06 10:00:00',
                completedAt: '2026-01-07 15:30:00',
                trackingNumber: 'SF0987654321',
                expressCompany: '顺丰速运'
            }
        ];

        let currentTab = 'all';

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            renderOrders();
        });

        // 切换标签
        function switchTab(tab, element) {
            currentTab = tab;

            // 更新标签状态
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            renderOrders();
        }

        // 渲染订单列表
        function renderOrders() {
            const ordersList = document.getElementById('ordersList');

            // 筛选订单
            let filteredOrders = mockOrders;
            if (currentTab !== 'all') {
                filteredOrders = mockOrders.filter(order => order.status === currentTab);
            }

            if (filteredOrders.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-text">暂无订单</div>
                    </div>
                `;
                return;
            }

            // 渲染订单卡片
            ordersList.innerHTML = filteredOrders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-number">订单号：${order.orderNumber}</div>
                        <div class="order-status status-${order.status}">${order.statusText}</div>
                    </div>
                    <div class="order-content">
                        <div class="product-info">
                            <div class="product-image"></div>
                            <div class="product-details">
                                <div class="product-name">${order.productName}</div>
                                <div class="product-points">${order.points} 积分</div>
                            </div>
                        </div>
                        <div class="order-info">
                            <div class="info-row">
                                <span class="info-label">收货人</span>
                                <span class="info-value">${order.address.name} ${order.address.phone}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">收货地址</span>
                                <span class="info-value">${order.address.detail}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">下单时间</span>
                                <span class="info-value">${order.createdAt}</span>
                            </div>
                            ${order.trackingNumber ? `
                                <div class="info-row">
                                    <span class="info-label">物流公司</span>
                                    <span class="info-value">${order.expressCompany}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">物流单号</span>
                                    <span class="info-value">${order.trackingNumber}</span>
                                </div>
                            ` : ''}
                        </div>
                        <div class="order-actions">
                            ${renderOrderActions(order)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 渲染订单操作按钮
        function renderOrderActions(order) {
            if (order.status === 'pending') {
                return `
                    <button class="action-btn" onclick="cancelOrder(${order.id})">取消订单</button>
                    <button class="action-btn" onclick="contactService(${order.id})">联系客服</button>
                `;
            } else if (order.status === 'shipped') {
                return `
                    <button class="action-btn" onclick="viewLogistics(${order.id})">查看物流</button>
                    <button class="action-btn primary" onclick="confirmReceipt(${order.id})">确认收货</button>
                `;
            } else if (order.status === 'completed') {
                return `
                    <button class="action-btn" onclick="viewLogistics(${order.id})">查看物流</button>
                    <button class="action-btn" onclick="deleteOrder(${order.id})">删除订单</button>
                `;
            }
            return '';
        }

        // 取消订单
        function cancelOrder(orderId) {
            if (confirm('确定要取消这个订单吗？积分将退回到您的账户')) {
                showToast('订单已取消');
                // 实际应调用API取消订单
                setTimeout(() => {
                    renderOrders();
                }, 1000);
            }
        }

        // 查看物流
        function viewLogistics(orderId) {
            const order = mockOrders.find(o => o.id === orderId);
            if (order && order.trackingNumber) {
                alert(`物流公司：${order.expressCompany}\n物流单号：${order.trackingNumber}\n\n实际应用中将跳转到物流详情页面`);
            } else {
                showToast('暂无物流信息');
            }
        }

        // 确认收货
        function confirmReceipt(orderId) {
            if (confirm('确认已收到商品吗？')) {
                showToast('确认收货成功');
                // 实际应调用API确认收货
                const order = mockOrders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'completed';
                    order.statusText = '已完成';
                    order.completedAt = new Date().toISOString().replace('T', ' ').substring(0, 19);
                }
                setTimeout(() => {
                    renderOrders();
                }, 1000);
            }
        }

        // 联系客服
        function contactService(orderId) {
            alert('客服电话：400-123-4567\n工作时间：9:00-18:00');
        }

        // 删除订单
        function deleteOrder(orderId) {
            if (confirm('确定要删除这个订单吗？')) {
                showToast('订单已删除');
                // 实际应调用API删除订单
                const index = mockOrders.findIndex(o => o.id === orderId);
                if (index !== -1) {
                    mockOrders.splice(index, 1);
                }
                setTimeout(() => {
                    renderOrders();
                }, 1000);
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000;';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</body>
</html>
