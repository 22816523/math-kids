<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教师商品详情 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; font-weight: 600; margin-right: 28px; }

        .product-image-section { background: white; padding: 20px; text-align: center; }
        .product-image { width: 280px; height: 280px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; margin: 0 auto; position: relative; }
        .teacher-badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg, #FFD700, #FFA500); color: white; font-size: 12px; padding: 4px 12px; border-radius: 12px; font-weight: 600; }

        .product-info-section { background: white; margin-top: 12px; padding: 20px 16px; }
        .product-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .product-name { font-size: 20px; font-weight: 700; color: #333333; flex: 1; line-height: 1.4; }
        .product-points { font-size: 28px; font-weight: 700; color: #FF6B6B; white-space: nowrap; margin-left: 12px; }
        .points-unit { font-size: 14px; color: #999999; }

        .product-meta { display: flex; gap: 24px; padding: 16px 0; border-top: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
        .meta-item { flex: 1; text-align: center; }
        .meta-value { font-size: 18px; font-weight: 600; color: #333333; margin-bottom: 4px; }
        .meta-label { font-size: 12px; color: #999999; }

        .product-detail-section { background: white; margin-top: 12px; padding: 20px 16px; }
        .section-title { font-size: 16px; font-weight: 600; color: #333333; margin-bottom: 12px; }
        .product-description { font-size: 14px; color: #595959; line-height: 1.8; }

        .product-specs { background: white; margin-top: 12px; padding: 20px 16px; }
        .spec-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .spec-item:last-child { border-bottom: none; }
        .spec-label { font-size: 14px; color: #999999; }
        .spec-value { font-size: 14px; color: #333333; font-weight: 500; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 12px 16px; max-width: 375px; margin: 0 auto; display: flex; gap: 12px; }
        .points-info { flex: 1; }
        .points-label { font-size: 12px; color: #999999; }
        .points-value { font-size: 20px; font-weight: 700; color: #FF6B6B; }
        .exchange-btn { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; border: none; border-radius: 8px; padding: 12px 32px; font-size: 16px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .exchange-btn:disabled { background: #d9d9d9; cursor: not-allowed; }
        .exchange-btn:active:not(:disabled) { opacity: 0.8; }

        .insufficient-tip { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 12px 16px; margin: 12px 16px 0; font-size: 13px; color: #d46b08; display: flex; align-items: center; gap: 8px; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">教师商品详情</div>
    </div>

    <div class="product-image-section">
        <div class="product-image" id="productImage">
            <div class="teacher-badge" id="teacherBadge" style="display: none;">教师专属</div>
        </div>
    </div>

    <div class="product-info-section">
        <div class="product-header">
            <div class="product-name" id="productName">精美书签套装</div>
            <div class="product-points">
                <span id="productPoints">500</span>
                <span class="points-unit">积分</span>
            </div>
        </div>

        <div class="product-meta">
            <div class="meta-item">
                <div class="meta-value" id="stockCount">120</div>
                <div class="meta-label">库存</div>
            </div>
            <div class="meta-item">
                <div class="meta-value" id="salesCount">856</div>
                <div class="meta-label">已兑换</div>
            </div>
            <div class="meta-item">
                <div class="meta-value" id="myPoints">1520</div>
                <div class="meta-label">我的积分</div>
            </div>
        </div>
    </div>

    <div id="insufficientTip" style="display: none;" class="insufficient-tip">
        <i class="fa-solid fa-exclamation-circle"></i>
        <span>您的积分不足，还需 <span id="needPoints">0</span> 积分</span>
    </div>

    <div class="product-detail-section">
        <div class="section-title">商品详情</div>
        <div class="product-description" id="productDescription">
            精美书签套装，包含10款不同设计的书签，采用优质材料制作，适合阅读爱好者使用。每款书签都有独特的设计，让您的阅读时光更加美好。
        </div>
    </div>

    <div class="product-specs">
        <div class="section-title">商品规格</div>
        <div class="spec-item">
            <div class="spec-label">商品分类</div>
            <div class="spec-value" id="productCategory">文具用品</div>
        </div>
        <div class="spec-item">
            <div class="spec-label">配送方式</div>
            <div class="spec-value">快递配送</div>
        </div>
        <div class="spec-item">
            <div class="spec-label">预计发货</div>
            <div class="spec-value">3个工作日内</div>
        </div>
        <div class="spec-item">
            <div class="spec-label">售后服务</div>
            <div class="spec-value">7天无理由退换</div>
        </div>
    </div>

    <div class="action-bar">
        <div class="points-info">
            <div class="points-label">需要积分</div>
            <div class="points-value" id="requiredPoints">500</div>
        </div>
        <button class="exchange-btn" id="exchangeBtn" onclick="startExchange()">
            立即兑换
        </button>
    </div>

    <script src="../router.js"></script>
    <script>
        // 模拟商品数据
        const mockProducts = {
            1: {
                id: 1,
                name: '精美书签套装',
                points: 500,
                category: 'stationery',
                categoryName: '文具用品',
                stock: 120,
                sales: 856,
                description: '精美书签套装，包含10款不同设计的书签，采用优质材料制作，适合阅读爱好者使用。每款书签都有独特的设计，让您的阅读时光更加美好。',
                isTeacherExclusive: false
            },
            2: {
                id: 2,
                name: '高级钢笔礼盒',
                points: 800,
                category: 'stationery',
                categoryName: '文具用品',
                stock: 85,
                sales: 432,
                description: '高级钢笔礼盒，采用优质钢材制作，书写流畅，手感舒适。配有精美礼盒包装，适合自用或送礼。',
                isTeacherExclusive: true
            },
            3: {
                id: 3,
                name: '教学参考书籍',
                points: 1200,
                category: 'books',
                categoryName: '图书资料',
                stock: 50,
                sales: 268,
                description: '最新版教学参考书籍，涵盖各学科教学要点和方法，帮助教师提升教学质量。',
                isTeacherExclusive: true
            }
        };

        let currentProduct = null;
        let myPoints = 1520;

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            if (productId && mockProducts[productId]) {
                currentProduct = mockProducts[productId];
                loadProductDetail();
            } else {
                alert('商品不存在');
                Router.back();
            }
        });

        // 加载商品详情
        function loadProductDetail() {
            document.getElementById('productName').textContent = currentProduct.name;
            document.getElementById('productPoints').textContent = currentProduct.points;
            document.getElementById('stockCount').textContent = currentProduct.stock;
            document.getElementById('salesCount').textContent = currentProduct.sales;
            document.getElementById('myPoints').textContent = myPoints;
            document.getElementById('productDescription').textContent = currentProduct.description;
            document.getElementById('productCategory').textContent = currentProduct.categoryName;
            document.getElementById('requiredPoints').textContent = currentProduct.points;

            // 显示教师专属标签
            if (currentProduct.isTeacherExclusive) {
                document.getElementById('teacherBadge').style.display = 'block';
            }

            // 检查积分是否足够
            checkPointsSufficient();
        }

        // 检查积分是否足够
        function checkPointsSufficient() {
            const exchangeBtn = document.getElementById('exchangeBtn');
            const insufficientTip = document.getElementById('insufficientTip');
            const needPoints = document.getElementById('needPoints');

            if (myPoints < currentProduct.points) {
                exchangeBtn.disabled = true;
                insufficientTip.style.display = 'flex';
                needPoints.textContent = currentProduct.points - myPoints;
            } else {
                exchangeBtn.disabled = false;
                insufficientTip.style.display = 'none';
            }

            // 检查库存
            if (currentProduct.stock <= 0) {
                exchangeBtn.disabled = true;
                exchangeBtn.textContent = '已售罄';
            }
        }

        // 开始兑换
        function startExchange() {
            if (myPoints < currentProduct.points) {
                showToast('积分不足');
                return;
            }

            if (currentProduct.stock <= 0) {
                showToast('商品已售罄');
                return;
            }

            // 跳转到选择收货地址页面（复用学生端页面）
            window.location.href = `../学生端/30-选择收货地址.html?productId=${currentProduct.id}&userType=teacher`;
        }

        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000;';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</body>
</html>
