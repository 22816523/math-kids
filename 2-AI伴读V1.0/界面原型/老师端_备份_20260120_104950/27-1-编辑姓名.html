<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑姓名 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .save-btn { background: none; border: none; color: white; font-size: 15px; cursor: pointer; font-weight: 500; }
        .save-btn:hover { opacity: 0.8; }

        .form-section { background: white; margin: 12px 16px; border-radius: 8px; padding: 16px; }
        .form-label { font-size: 14px; color: #999999; margin-bottom: 12px; }
        .form-input { width: 100%; border: none; font-size: 16px; color: #333333; outline: none; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .form-input:focus { border-bottom-color: #2E5BFF; }
        .form-tip { font-size: 12px; color: #999999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">编辑姓名</div>
        <button class="save-btn" onclick="saveName()">保存</button>
    </div>

    <div class="form-section">
        <div class="form-label">姓名</div>
        <input type="text" class="form-input" id="nameInput" value="王老师" placeholder="请输入姓名" maxlength="20">
        <div class="form-tip">2-20个字符</div>
    </div>

    <script src="../router.js"></script>
    <script>
        function saveName() {
            const name = document.getElementById('nameInput').value.trim()

            if (!name) {
                alert('请输入姓名')
                return
            }

            if (name.length < 2 || name.length > 20) {
                alert('姓名长度应为2-20个字符')
                return
            }

            // 实际应该调用API保存
            alert('保存成功')
            Router.back()
        }
    </script>
</body>
</html>
