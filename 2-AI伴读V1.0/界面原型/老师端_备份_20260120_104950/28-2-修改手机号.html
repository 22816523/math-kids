<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修改手机号 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }

        .steps-container { background: white; padding: 24px 16px; margin-bottom: 12px; }
        .steps { display: flex; align-items: center; justify-content: space-between; position: relative; }
        .step-item { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; }
        .step-number { width: 32px; height: 32px; border-radius: 50%; background: #f0f0f0; color: #999999; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; margin-bottom: 8px; transition: all 0.3s; }
        .step-item.active .step-number { background: #2E5BFF; color: white; }
        .step-item.completed .step-number { background: #52c41a; color: white; }
        .step-text { font-size: 12px; color: #999999; }
        .step-item.active .step-text { color: #2E5BFF; font-weight: 600; }
        .step-item.completed .step-text { color: #52c41a; }
        .step-line { position: absolute; top: 16px; left: 0; right: 0; height: 2px; background: #f0f0f0; z-index: 1; }
        .step-line-progress { position: absolute; top: 16px; left: 0; height: 2px; background: #52c41a; z-index: 1; transition: width 0.3s; }

        .content-section { background: white; margin: 12px 16px; border-radius: 8px; padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 14px; color: #333333; margin-bottom: 8px; display: block; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999999; font-size: 16px; }
        .form-input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; color: #333333; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #2E5BFF; box-shadow: 0 0 0 3px rgba(46, 91, 255, 0.1); }
        .form-input::placeholder { color: #bfbfbf; }
        .form-input.error { border-color: #ff4d4f; }

        .error-tip { font-size: 12px; color: #ff4d4f; margin-top: 4px; display: none; }
        .error-tip.show { display: block; }

        .code-input-group { display: flex; gap: 8px; }
        .code-input-group .input-wrapper { flex: 1; }
        .get-code-btn { padding: 12px 16px; background: #2E5BFF; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
        .get-code-btn:hover { background: #1E4BEF; }
        .get-code-btn:disabled { background: #d9d9d9; cursor: not-allowed; }

        .action-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(46, 91, 255, 0.3); margin-top: 24px; }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(46, 91, 255, 0.4); }
        .action-btn:active { transform: translateY(0); }
        .action-btn:disabled { background: #d9d9d9; cursor: not-allowed; box-shadow: none; }

        .success-section { text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 64px; color: #52c41a; margin-bottom: 16px; }
        .success-title { font-size: 20px; font-weight: 600; color: #333333; margin-bottom: 8px; }
        .success-text { font-size: 14px; color: #666666; margin-bottom: 32px; }

        .step-content { display: none; }
        .step-content.active { display: block; }

        .info-tip { background: #f0f5ff; border-left: 3px solid #2E5BFF; padding: 12px 16px; margin-bottom: 20px; border-radius: 4px; }
        .info-tip-text { font-size: 13px; color: #666666; line-height: 1.6; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">修改手机号</div>
    </div>

    <div class="steps-container">
        <div class="steps">
            <div class="step-line"></div>
            <div class="step-line-progress" id="stepProgress" style="width: 0%;"></div>

            <div class="step-item active" id="step1">
                <div class="step-number">1</div>
                <div class="step-text">验证原手机</div>
            </div>
            <div class="step-item" id="step2">
                <div class="step-number">2</div>
                <div class="step-text">绑定新手机</div>
            </div>
            <div class="step-item" id="step3">
                <div class="step-number">3</div>
                <div class="step-text">完成</div>
            </div>
        </div>
    </div>

    <div class="content-section">
        <!-- 步骤1：验证原手机号 -->
        <div class="step-content active" id="content1">
            <div class="info-tip">
                <div class="info-tip-text">为了保护您的账号安全，请先验证原手机号</div>
            </div>

            <div class="form-group">
                <label class="form-label">原手机号</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-mobile-screen input-icon"></i>
                    <input type="tel" class="form-input" id="oldPhoneInput" value="138****8888" disabled>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div class="code-input-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="text" class="form-input" id="oldCodeInput" placeholder="请输入验证码" maxlength="6">
                        <div class="error-tip" id="oldCodeError">请输入6位验证码</div>
                    </div>
                    <button type="button" class="get-code-btn" id="getOldCodeBtn" onclick="getOldVerificationCode()">获取验证码</button>
                </div>
            </div>

            <button class="action-btn" onclick="nextStep(1)">下一步</button>
        </div>

        <!-- 步骤2：绑定新手机号 -->
        <div class="step-content" id="content2">
            <div class="info-tip">
                <div class="info-tip-text">请输入新的手机号并完成验证</div>
            </div>

            <div class="form-group">
                <label class="form-label">新手机号</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-mobile-screen input-icon"></i>
                    <input type="tel" class="form-input" id="newPhoneInput" placeholder="请输入新手机号" maxlength="11">
                    <div class="error-tip" id="newPhoneError">请输入正确的11位手机号</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div class="code-input-group">
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="text" class="form-input" id="newCodeInput" placeholder="请输入验证码" maxlength="6">
                        <div class="error-tip" id="newCodeError">请输入6位验证码</div>
                    </div>
                    <button type="button" class="get-code-btn" id="getNewCodeBtn" onclick="getNewVerificationCode()">获取验证码</button>
                </div>
            </div>

            <button class="action-btn" onclick="nextStep(2)">完成</button>
        </div>

        <!-- 步骤3：完成 -->
        <div class="step-content" id="content3">
            <div class="success-section">
                <div class="success-icon">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <div class="success-title">手机号修改成功</div>
                <div class="success-text">您的手机号已成功修改为新手机号</div>
                <button class="action-btn" onclick="goBack()">返回</button>
            </div>
        </div>
    </div>

    <script src="../router.js"></script>
    <script>
        // 获取URL参数，判断是否已绑定手机号
        const urlParams = new URLSearchParams(window.location.search)
        const hasPhone = urlParams.get('hasPhone') === 'true'

        let currentStep = hasPhone ? 1 : 2  // 如果已绑定从步骤1开始，否则从步骤2开始
        let totalSteps = hasPhone ? 3 : 2   // 总步骤数
        let oldCountdown = 0
        let newCountdown = 0
        let oldCountdownTimer = null
        let newCountdownTimer = null

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 更新页面标题
            document.querySelector('.navbar-title').textContent = hasPhone ? '修改手机号' : '绑定手机号'

            // 如果是首次绑定，隐藏步骤1，调整步骤显示
            if (!hasPhone) {
                // 隐藏步骤1
                document.getElementById('step1').style.display = 'none'
                document.getElementById('content1').style.display = 'none'

                // 重新编号步骤2和步骤3
                document.querySelector('#step2 .step-number').textContent = '1'
                document.querySelector('#step2 .step-text').textContent = '绑定手机号'
                document.querySelector('#step3 .step-number').textContent = '2'

                // 显示步骤2的内容
                document.getElementById('content2').classList.add('active')
                document.getElementById('step2').classList.add('active')

                // 更新提示文字
                document.querySelector('#content2 .info-tip-text').textContent = '请输入手机号并完成验证'
                document.querySelector('#content3 .success-title').textContent = '手机号绑定成功'
                document.querySelector('#content3 .success-text').textContent = '您的手机号已成功绑定'
            }
        })

        // 下一步
        function nextStep(step) {
            if (step === 1) {
                // 验证原手机号验证码
                if (!validateStep1()) return

                // 进入步骤2
                currentStep = 2
                updateSteps()
            } else if (step === 2) {
                // 验证新手机号和验证码
                if (!validateStep2()) return

                // 模拟修改/绑定手机号
                console.log(hasPhone ? '修改手机号成功' : '绑定手机号成功')

                // 进入步骤3（或步骤2，如果是首次绑定）
                currentStep = hasPhone ? 3 : 3
                updateSteps()
            }
        }

        // 更新步骤显示
        function updateSteps() {
            if (hasPhone) {
                // 修改场景：3步流程
                for (let i = 1; i <= 3; i++) {
                    const stepItem = document.getElementById(`step${i}`)
                    const content = document.getElementById(`content${i}`)

                    if (i < currentStep) {
                        stepItem.classList.add('completed')
                        stepItem.classList.remove('active')
                    } else if (i === currentStep) {
                        stepItem.classList.add('active')
                        stepItem.classList.remove('completed')
                    } else {
                        stepItem.classList.remove('active', 'completed')
                    }

                    content.classList.toggle('active', i === currentStep)
                }

                // 更新进度条
                const progress = ((currentStep - 1) / 2) * 100
                document.getElementById('stepProgress').style.width = `${progress}%`
            } else {
                // 首次绑定场景：2步流程（步骤2和步骤3）
                if (currentStep === 2) {
                    document.getElementById('step2').classList.add('active')
                    document.getElementById('step2').classList.remove('completed')
                    document.getElementById('step3').classList.remove('active', 'completed')
                    document.getElementById('content2').classList.add('active')
                    document.getElementById('content3').classList.remove('active')
                    document.getElementById('stepProgress').style.width = '0%'
                } else if (currentStep === 3) {
                    document.getElementById('step2').classList.add('completed')
                    document.getElementById('step2').classList.remove('active')
                    document.getElementById('step3').classList.add('active')
                    document.getElementById('content2').classList.remove('active')
                    document.getElementById('content3').classList.add('active')
                    document.getElementById('stepProgress').style.width = '100%'
                }
            }
        }

        // 验证步骤1
        function validateStep1() {
            const code = document.getElementById('oldCodeInput').value.trim()
            let isValid = true

            if (code.length !== 6) {
                showError('oldCodeInput', 'oldCodeError', '请输入6位验证码')
                isValid = false
            } else {
                hideError('oldCodeInput', 'oldCodeError')
            }

            return isValid
        }

        // 验证步骤2
        function validateStep2() {
            const newPhone = document.getElementById('newPhoneInput').value.trim()
            const code = document.getElementById('newCodeInput').value.trim()
            let isValid = true

            const phoneRegex = /^1[3-9]\d{9}$/
            if (!phoneRegex.test(newPhone)) {
                showError('newPhoneInput', 'newPhoneError', '请输入正确的11位手机号')
                isValid = false
            } else {
                hideError('newPhoneInput', 'newPhoneError')
            }

            if (code.length !== 6) {
                showError('newCodeInput', 'newCodeError', '请输入6位验证码')
                isValid = false
            } else {
                hideError('newCodeInput', 'newCodeError')
            }

            return isValid
        }

        // 获取原手机号验证码
        function getOldVerificationCode() {
            // 开始倒计时
            oldCountdown = 60
            updateOldCodeButton()

            oldCountdownTimer = setInterval(() => {
                oldCountdown--
                if (oldCountdown <= 0) {
                    clearInterval(oldCountdownTimer)
                    oldCountdown = 0
                }
                updateOldCodeButton()
            }, 1000)

            // 模拟发送验证码
            console.log('发送验证码到原手机号: 138****8888')
            alert('验证码已发送到原手机号，请注意查收')
        }

        // 更新原手机号验证码按钮状态
        function updateOldCodeButton() {
            const btn = document.getElementById('getOldCodeBtn')
            if (oldCountdown > 0) {
                btn.textContent = `${oldCountdown}秒后重试`
                btn.disabled = true
            } else {
                btn.textContent = '获取验证码'
                btn.disabled = false
            }
        }

        // 获取新手机号验证码
        function getNewVerificationCode() {
            const phone = document.getElementById('newPhoneInput').value.trim()
            const phoneRegex = /^1[3-9]\d{9}$/

            if (!phoneRegex.test(phone)) {
                showError('newPhoneInput', 'newPhoneError', '请输入正确的11位手机号')
                return
            }

            hideError('newPhoneInput', 'newPhoneError')

            // 开始倒计时
            newCountdown = 60
            updateNewCodeButton()

            newCountdownTimer = setInterval(() => {
                newCountdown--
                if (newCountdown <= 0) {
                    clearInterval(newCountdownTimer)
                    newCountdown = 0
                }
                updateNewCodeButton()
            }, 1000)

            // 模拟发送验证码
            console.log('发送验证码到新手机号:', phone)
            alert('验证码已发送到新手机号，请注意查收')
        }

        // 更新新手机号验证码按钮状态
        function updateNewCodeButton() {
            const btn = document.getElementById('getNewCodeBtn')
            if (newCountdown > 0) {
                btn.textContent = `${newCountdown}秒后重试`
                btn.disabled = true
            } else {
                btn.textContent = '获取验证码'
                btn.disabled = false
            }
        }

        // 返回
        function goBack() {
            Router.back()
        }

        // 显示错误
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.add('error')
            error.textContent = message
            error.classList.add('show')
        }

        // 隐藏错误
        function hideError(inputId, errorId) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.remove('error')
            error.classList.remove('show')
        }
    </script>
</body>
</html>
