<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>报名阅读计划 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; line-height: 1.4; font-weight: 600; margin-right: 28px; }

        .plan-summary { background: white; margin: 12px 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .plan-preview { background: linear-gradient(135deg, #52c41a, #73d13d); border-radius: 12px; padding: 20px; color: white; margin-bottom: 16px; }
        .plan-preview.spring { background: linear-gradient(135deg, #52c41a, #73d13d); }
        .plan-preview.summer { background: linear-gradient(135deg, #faad14, #ffc53d); }
        .plan-preview.autumn { background: linear-gradient(135deg, #fa8c16, #ffa940); }
        .plan-preview.winter { background: linear-gradient(135deg, #1890ff, #40a9ff); }
        .preview-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .preview-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 16px; }
        .preview-stats { display: flex; gap: 16px; font-size: 13px; }
        .preview-stat { display: flex; align-items: center; gap: 6px; }

        .section { background: white; margin: 12px 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .section-title { font-size: 15px; font-weight: 600; color: #333333; display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
        .section-title i { color: #2E5BFF; }
        .section-title .required { color: #ff4d4f; margin-left: 4px; }
        .select-all-btn { background: none; border: none; color: #2E5BFF; font-size: 14px; cursor: pointer; padding: 4px 8px; margin-left: auto; }

        .class-list { display: flex; flex-direction: column; gap: 12px; }
        .class-item { border: 2px solid #e8e8e8; border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.3s; }
        .class-item:active { background: #F5F7FA; }
        .class-item.selected { border-color: #2E5BFF; background: #e6f7ff; }
        .class-item.enrolled { opacity: 0.5; cursor: not-allowed; background: #fafafa; }
        .class-item.enrolled:active { background: #fafafa; }
        .class-checkbox { width: 20px; height: 20px; border: 2px solid #d9d9d9; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.3s; }
        .class-item.selected .class-checkbox { border-color: #2E5BFF; background: #2E5BFF; }
        .class-checkbox i { color: white; font-size: 12px; display: none; }
        .class-item.selected .class-checkbox i { display: block; }
        .class-info { flex: 1; min-width: 0; }
        .class-name { font-size: 14px; font-weight: 500; color: #333333; display: flex; align-items: center; gap: 8px; }
        .enrolled-badge { display: inline-block; padding: 2px 8px; background: #f0f0f0; color: #999999; font-size: 11px; border-radius: 12px; font-weight: 600; }

        .tips-box { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 12px; margin-top: 16px; }
        .tips-title { font-size: 13px; font-weight: 600; color: #faad14; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .tips-title i { font-size: 14px; }
        .tips-list { font-size: 12px; color: #595959; line-height: 1.6; }

        .settings-section { }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #333333; margin-bottom: 8px; }
        .form-input { width: 100%; border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px 12px; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #2E5BFF; }
        .help-text { font-size: 12px; color: #999999; margin-top: 4px; }

        .date-group { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
        .date-separator { color: #999999; font-size: 13px; text-align: center; }

        .switch-group { display: flex; justify-content: space-between; align-items: center; }
        .switch-label { font-size: 14px; color: #333333; }
        .switch { position: relative; width: 48px; height: 28px; background: #d9d9d9; border-radius: 14px; cursor: pointer; transition: all 0.3s; }
        .switch.active { background: #2E5BFF; }
        .switch-slider { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; background: white; border-radius: 50%; transition: all 0.3s; }
        .switch.active .switch-slider { left: 22px; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 12px 16px; max-width: 375px; margin: 0 auto; display: flex; gap: 12px; }
        .action-btn { flex: 1; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-preview { background: #F5F7FA; color: #595959; }
        .btn-enroll { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; }
        .btn-enroll:disabled { background: #d9d9d9; cursor: not-allowed; }
        .btn-enroll:active:not(:disabled) { opacity: 0.8; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">报名阅读计划</div>
    </div>

    <div class="plan-summary">
        <div class="plan-preview spring" id="planPreview">
            <div class="preview-title" id="planTitle">2026春季阅读计划</div>
            <div class="preview-stats">
                <div class="preview-stat">
                    <i class="fa-solid fa-book"></i>
                    <span id="bookCount">2本</span>
                </div>
                <div class="preview-stat">
                    <i class="fa-solid fa-calendar"></i>
                    <span id="levelCount">2026-02-15 至 2026-05-15</span>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">
            <i class="fa-solid fa-book-open"></i>
            <span>选择班级</span>
            <span class="required">*</span>
            <button class="select-all-btn" onclick="toggleSelectAll()">
                <span id="selectAllText">全选</span>
            </button>
        </div>

        <div class="class-list" id="classList">
            <!-- 班级列表将通过JavaScript动态生成 -->
        </div>

        <div class="tips-box">
            <div class="tips-title">
                <i class="fa-solid fa-lightbulb"></i>
                <span>温馨提示</span>
            </div>
            <div class="tips-list">报名后学生将立即看到该计划</div>
        </div>
    </div>

    <div class="section settings-section">
        <div class="form-group">
            <div class="switch-group">
                <div class="switch-label">立即通知学生</div>
                <div class="switch active" id="notifySwitch" onclick="toggleSwitch('notifySwitch')">
                    <div class="switch-slider"></div>
                </div>
            </div>
            <div class="help-text">开启后将立即向学生发送通知</div>
        </div>

        <div class="form-group">
            <div class="switch-group">
                <div class="switch-label">允许学生查看进度</div>
                <div class="switch active" id="progressSwitch" onclick="toggleSwitch('progressSwitch')">
                    <div class="switch-slider"></div>
                </div>
            </div>
            <div class="help-text">学生可以查看自己的阅读进度和排名</div>
        </div>
    </div>

    <div class="action-bar">
        <button class="action-btn btn-preview" onclick="previewPlan()">
            <i class="fa-solid fa-eye"></i> 预览
        </button>
        <button class="action-btn btn-enroll" id="enrollBtn" onclick="enrollPlan()" disabled>
            立即报名
        </button>
    </div>

    <script src="../router.js"></script>
    <script>
        // 模拟班级数据
        const mockClasses = [
            { id: 1, name: '初一(3)班', studentCount: 52 },
            { id: 2, name: '初一(4)班', studentCount: 50 },
            { id: 3, name: '初一(5)班', studentCount: 51 }
        ];

        // 模拟计划数据
        const mockPlans = {
            1: {
                id: 1,
                planId: 1,
                planName: '2026春季阅读计划',
                season: 'spring',
                seasonText: '春季',
                startDate: '2026-02-15',
                endDate: '2026-05-15',
                bookCount: 2,
                description: '精选适合春季阅读的经典文学作品，培养学生的文学素养和阅读兴趣'
            },
            2: {
                id: 2,
                planId: 2,
                planName: '2026寒假阅读计划',
                season: 'winter',
                seasonText: '寒假',
                startDate: '2026-01-15',
                endDate: '2026-02-10',
                bookCount: 2,
                description: '利用寒假时间，通过阅读经典名著提升学生的阅读能力和思维深度'
            },
            3: {
                id: 3,
                planId: 3,
                planName: '2025秋季阅读计划',
                season: 'autumn',
                seasonText: '秋季',
                startDate: '2025-09-01',
                endDate: '2026-01-31',
                bookCount: 2,
                description: '新学期开始，通过阅读帮助学生快速进入学习状态，培养良好的阅读习惯'
            }
        };

        // 模拟已报名班级数据（独立维护）
        const planEnrollments = {
            1: [],           // 计划1：没有班级报名
            2: [],           // 计划2：没有班级报名（首次报名场景）
            3: [1, 2]        // 计划3：班级1和2已报名（追加班级场景）
        };

        let currentPlan = null;
        let selectedClasses = new Set();

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const planId = parseInt(urlParams.get('planId'));

            if (planId) {
                loadPlanData(planId);
            }

            renderClasses();
        });

        // 加载计划数据
        function loadPlanData(planId) {
            currentPlan = mockPlans[planId];
            if (!currentPlan) return;

            document.getElementById('planTitle').textContent = currentPlan.planName;
            document.getElementById('bookCount').textContent = `${currentPlan.bookCount}本`;
            document.getElementById('levelCount').textContent = `${currentPlan.startDate} 至 ${currentPlan.endDate}`;

            const preview = document.getElementById('planPreview');
            preview.className = `plan-preview ${currentPlan.season}`;
        }

        // 渲染班级列表
        function renderClasses() {
            const classList = document.getElementById('classList');

            if (mockClasses.length === 0) {
                classList.innerHTML = `
                    <div class="empty-classes">
                        <div class="empty-icon">🏫</div>
                        <div>还没有创建班级</div>
                        <div style="font-size: 12px; margin-top: 8px;">请先创建班级</div>
                    </div>
                `;
                return;
            }

            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];

            classList.innerHTML = mockClasses.map(cls => {
                const isEnrolled = enrolledClasses.includes(cls.id);
                const isSelected = selectedClasses.has(cls.id);
                const classNames = ['class-item'];

                if (isEnrolled) {
                    classNames.push('enrolled');
                } else if (isSelected) {
                    classNames.push('selected');
                }

                return `
                    <div class="${classNames.join(' ')}" onclick="toggleClass(${cls.id})">
                        <div class="class-checkbox">
                            <i class="fa-solid fa-check"></i>
                        </div>
                        <div class="class-info">
                            <div class="class-name">
                                ${cls.name} · ${cls.studentCount}人
                                ${isEnrolled ? '<span class="enrolled-badge">已报名</span>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 切换班级选择
        function toggleClass(classId) {
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            if (enrolledClasses.includes(classId)) {
                return;
            }

            if (selectedClasses.has(classId)) {
                selectedClasses.delete(classId);
            } else {
                selectedClasses.add(classId);
            }

            renderClasses();
            updateSelectedCount();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const availableClasses = mockClasses.filter(cls => !enrolledClasses.includes(cls.id));

            if (selectedClasses.size === availableClasses.length) {
                selectedClasses.clear();
                document.getElementById('selectAllText').textContent = '全选';
            } else {
                availableClasses.forEach(cls => selectedClasses.add(cls.id));
                document.getElementById('selectAllText').textContent = '取消全选';
            }

            renderClasses();
            updateSelectedCount();
        }

        // 更新选中数量显示
        function updateSelectedCount() {
            const enrollBtn = document.getElementById('enrollBtn');
            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const availableClasses = mockClasses.filter(cls => !enrolledClasses.includes(cls.id));

            if (selectedClasses.size > 0) {
                enrollBtn.disabled = false;
                document.getElementById('selectAllText').textContent =
                    selectedClasses.size === availableClasses.length ? '取消全选' : '全选';
            } else {
                enrollBtn.disabled = true;
                document.getElementById('selectAllText').textContent = '全选';
            }
        }

        // 切换开关
        function toggleSwitch(switchId) {
            const switchEl = document.getElementById(switchId);
            switchEl.classList.toggle('active');
        }

        // 预览计划
        function previewPlan() {
            if (!currentPlan) return;
            window.location.href = `36-计划详情预览.html?id=${currentPlan.id}`;
        }

        // 报名计划
        function enrollPlan() {
            if (selectedClasses.size === 0) {
                alert('请至少选择一个班级');
                return;
            }

            const notifyEnabled = document.getElementById('notifySwitch').classList.contains('active');
            const progressEnabled = document.getElementById('progressSwitch').classList.contains('active');

            // 从 planEnrollments 获取已报名班级
            const enrolledClasses = currentPlan ? (planEnrollments[currentPlan.planId] || []) : [];
            const newClassIds = Array.from(selectedClasses).filter(id => !enrolledClasses.includes(id));

            const selectedClassNames = mockClasses
                .filter(cls => newClassIds.includes(cls.id))
                .map(cls => cls.name)
                .join('、');

            const enrollData = {
                planId: currentPlan.id,
                classIds: newClassIds,
                notifyStudents: notifyEnabled,
                showProgress: progressEnabled
            };

            // 实际应调用API报名
            console.log('报名数据：', enrollData);

            if (confirm(`确认将"${currentPlan.planName}"报名到以下班级吗？\n\n${selectedClassNames}\n\n报名后学生将立即看到该计划`)) {
                showToast('报名成功');

                setTimeout(() => {
                    Router.toTeacherPage('planList');
                }, 1500);
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 2000;';
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }
    </script>
</body>
</html>
