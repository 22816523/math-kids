<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修改密码 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .save-btn { background: none; border: none; color: white; font-size: 15px; cursor: pointer; padding: 0; font-weight: 600; }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .content-section { background: white; margin: 12px 16px; border-radius: 8px; padding: 24px; }

        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 14px; color: #333333; margin-bottom: 8px; display: block; }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999999; font-size: 16px; }
        .form-input { width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; color: #333333; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #2E5BFF; box-shadow: 0 0 0 3px rgba(46, 91, 255, 0.1); }
        .form-input::placeholder { color: #bfbfbf; }
        .form-input.error { border-color: #ff4d4f; }

        .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #999999; cursor: pointer; font-size: 16px; }
        .password-toggle:hover { color: #666666; }

        .error-tip { font-size: 12px; color: #ff4d4f; margin-top: 4px; display: none; }
        .error-tip.show { display: block; }

        .password-strength { margin-top: 8px; }
        .strength-bar { height: 4px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin-bottom: 4px; }
        .strength-bar-fill { height: 100%; transition: all 0.3s; }
        .strength-bar-fill.weak { width: 33%; background: #ff4d4f; }
        .strength-bar-fill.medium { width: 66%; background: #faad14; }
        .strength-bar-fill.strong { width: 100%; background: #52c41a; }
        .strength-text { font-size: 12px; }
        .strength-text.weak { color: #ff4d4f; }
        .strength-text.medium { color: #faad14; }
        .strength-text.strong { color: #52c41a; }

        .password-tips { font-size: 12px; color: #999999; margin-top: 8px; line-height: 1.6; }

        .tips-section { background: #f0f5ff; border-left: 3px solid #2E5BFF; padding: 12px 16px; margin-top: 24px; border-radius: 4px; }
        .tips-title { font-size: 13px; color: #2E5BFF; font-weight: 600; margin-bottom: 8px; }
        .tips-list { font-size: 12px; color: #666666; line-height: 1.8; padding-left: 16px; }
        .tips-list li { margin-bottom: 4px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">修改密码</div>
        <button class="save-btn" onclick="savePassword()">保存</button>
    </div>

    <div class="content-section">
        <div class="form-group">
            <label class="form-label">原密码</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" class="form-input" id="oldPasswordInput" placeholder="请输入原密码">
                <i class="fa-solid fa-eye password-toggle" id="oldPasswordToggle" onclick="togglePassword('oldPasswordInput', 'oldPasswordToggle')"></i>
                <div class="error-tip" id="oldPasswordError">请输入原密码</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">新密码</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" class="form-input" id="newPasswordInput" placeholder="请输入新密码" oninput="checkPasswordStrength()">
                <i class="fa-solid fa-eye password-toggle" id="newPasswordToggle" onclick="togglePassword('newPasswordInput', 'newPasswordToggle')"></i>
                <div class="error-tip" id="newPasswordError">请输入8-20位密码，包含字母和数字</div>
            </div>
            <div class="password-strength" id="passwordStrength" style="display: none;">
                <div class="strength-bar">
                    <div class="strength-bar-fill" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
            <div class="password-tips">密码长度8-20位，建议包含字母、数字和特殊字符</div>
        </div>

        <div class="form-group">
            <label class="form-label">确认新密码</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" class="form-input" id="confirmPasswordInput" placeholder="请再次输入新密码">
                <i class="fa-solid fa-eye password-toggle" id="confirmPasswordToggle" onclick="togglePassword('confirmPasswordInput', 'confirmPasswordToggle')"></i>
                <div class="error-tip" id="confirmPasswordError">两次输入的密码不一致</div>
            </div>
        </div>

        <div class="tips-section">
            <div class="tips-title">密码安全提示</div>
            <ul class="tips-list">
                <li>密码长度至少8位，建议使用12位以上</li>
                <li>建议使用字母、数字和特殊字符的组合</li>
                <li>不要使用过于简单的密码，如生日、电话号码等</li>
                <li>定期更换密码，提高账号安全性</li>
            </ul>
        </div>
    </div>

    <script src="../router.js"></script>
    <script>
        // 密码显示/隐藏切换
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId)
            const icon = document.getElementById(iconId)

            if (input.type === 'password') {
                input.type = 'text'
                icon.classList.remove('fa-eye')
                icon.classList.add('fa-eye-slash')
            } else {
                input.type = 'password'
                icon.classList.remove('fa-eye-slash')
                icon.classList.add('fa-eye')
            }
        }

        // 检查密码强度
        function checkPasswordStrength() {
            const password = document.getElementById('newPasswordInput').value
            const strengthContainer = document.getElementById('passwordStrength')
            const strengthBar = document.getElementById('strengthBar')
            const strengthText = document.getElementById('strengthText')

            if (!password) {
                strengthContainer.style.display = 'none'
                return
            }

            strengthContainer.style.display = 'block'

            let strength = 'weak'
            let text = '弱'

            // 判断强度
            if (password.length >= 12 && /[A-Za-z]/.test(password) && /\d/.test(password) && /[@$!%*#?&]/.test(password)) {
                strength = 'strong'
                text = '强'
            } else if (password.length >= 8 && /[A-Za-z]/.test(password) && /\d/.test(password)) {
                strength = 'medium'
                text = '中'
            }

            strengthBar.className = `strength-bar-fill ${strength}`
            strengthText.className = `strength-text ${strength}`
            strengthText.textContent = `密码强度：${text}`
        }

        // 保存密码
        function savePassword() {
            const oldPassword = document.getElementById('oldPasswordInput').value
            const newPassword = document.getElementById('newPasswordInput').value
            const confirmPassword = document.getElementById('confirmPasswordInput').value
            let isValid = true

            // 验证原密码
            if (!oldPassword) {
                showError('oldPasswordInput', 'oldPasswordError', '请输入原密码')
                isValid = false
            } else {
                hideError('oldPasswordInput', 'oldPasswordError')
            }

            // 验证新密码
            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d@$!%*#?&]{8,20}$/
            if (!passwordRegex.test(newPassword)) {
                showError('newPasswordInput', 'newPasswordError', '请输入8-20位密码，包含字母和数字')
                isValid = false
            } else {
                hideError('newPasswordInput', 'newPasswordError')
            }

            // 验证确认密码
            if (newPassword !== confirmPassword) {
                showError('confirmPasswordInput', 'confirmPasswordError', '两次输入的密码不一致')
                isValid = false
            } else {
                hideError('confirmPasswordInput', 'confirmPasswordError')
            }

            // 验证新密码不能与原密码相同
            if (isValid && oldPassword === newPassword) {
                showError('newPasswordInput', 'newPasswordError', '新密码不能与原密码相同')
                isValid = false
            }

            if (!isValid) return

            // 模拟保存密码
            console.log('修改密码成功')
            alert('密码修改成功！')

            // 返回账号安全页面
            Router.back()
        }

        // 显示错误
        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.add('error')
            error.textContent = message
            error.classList.add('show')
        }

        // 隐藏错误
        function hideError(inputId, errorId) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.remove('error')
            error.classList.remove('show')
        }
    </script>
</body>
</html>
