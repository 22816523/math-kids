<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教师积分明细 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 60px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; font-weight: 600; margin-right: 28px; }

        .points-header { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); padding: 24px 16px; color: white; }
        .points-balance { text-align: center; margin-bottom: 20px; }
        .balance-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
        .balance-value { font-size: 48px; font-weight: 700; margin-bottom: 4px; }
        .balance-tip { font-size: 12px; opacity: 0.8; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-card { background: rgba(255, 255, 255, 0.2); border-radius: 8px; padding: 12px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .stat-label { font-size: 11px; opacity: 0.9; }

        .filter-bar { background: white; padding: 12px 16px; display: flex; gap: 8px; overflow-x: auto; }
        .filter-btn { background: #F5F7FA; border: none; border-radius: 16px; padding: 6px 16px; font-size: 13px; color: #595959; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; }

        .records-list { padding: 12px 16px; }
        .date-group { margin-bottom: 16px; }
        .date-header { font-size: 13px; color: #999999; margin-bottom: 8px; padding-left: 4px; }

        .record-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 8px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
        .record-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .student-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; flex-shrink: 0; }
        .record-info { flex: 1; min-width: 0; }
        .record-title { font-size: 15px; font-weight: 600; color: #333333; margin-bottom: 2px; }
        .record-subtitle { font-size: 13px; color: #999999; }
        .record-points { font-size: 20px; font-weight: 700; color: #52c41a; flex-shrink: 0; }

        .record-detail { background: #fafafa; border-radius: 8px; padding: 12px; font-size: 13px; color: #595959; line-height: 1.6; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { color: #999999; }
        .detail-value { color: #333333; font-weight: 500; }

        .record-time { font-size: 12px; color: #999999; margin-top: 8px; text-align: right; }

        .reward-badge { display: inline-block; background: linear-gradient(135deg, #FFD700, #FFA500); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .empty-text { font-size: 15px; color: #999999; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">教师积分明细</div>
    </div>

    <div class="points-header">
        <div class="points-balance">
            <div class="balance-label">当前积分</div>
            <div class="balance-value" id="totalPoints">1520</div>
            <div class="balance-tip">学生完成任务时您将获得奖励积分</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="todayPoints">+12</div>
                <div class="stat-label">今日获得</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="weekPoints">+86</div>
                <div class="stat-label">本周获得</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="monthPoints">+320</div>
                <div class="stat-label">本月获得</div>
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterRecords('all', this)">全部</button>
        <button class="filter-btn" onclick="filterRecords('student_task', this)">学生任务</button>
        <button class="filter-btn" onclick="filterRecords('stage_reward', this)">阶段奖励</button>
        <button class="filter-btn" onclick="filterRecords('achievement', this)">成就奖励</button>
    </div>

    <div class="records-list" id="recordsList">
        <!-- 记录将通过JavaScript动态生成 -->
    </div>

    <script src="../router.js"></script>
    <script>
        // 模拟积分记录数据
        const mockRecords = [
            {
                id: 1,
                type: 'student_task',
                student_name: '张三',
                student_avatar: '张',
                class_name: '初一(1)班',
                task_type: '阅读任务',
                task_name: '完成《三体》第一章阅读',
                student_points: 10,
                teacher_points: 2,
                ratio: '5:1',
                balance: 1520,
                created_at: '2026-01-08 10:30:00',
                date: '2026-01-08'
            },
            {
                id: 2,
                type: 'student_task',
                student_name: '李四',
                student_avatar: '李',
                class_name: '初一(1)班',
                task_type: '测评任务',
                task_name: '完成《三体》理解测评',
                student_points: 15,
                teacher_points: 3,
                ratio: '5:1',
                balance: 1518,
                created_at: '2026-01-08 09:15:00',
                date: '2026-01-08'
            },
            {
                id: 3,
                type: 'student_task',
                student_name: '王五',
                student_avatar: '王',
                class_name: '初一(2)班',
                task_type: '打卡',
                task_name: '每日阅读打卡',
                student_points: 5,
                teacher_points: 1,
                ratio: '5:1',
                balance: 1515,
                created_at: '2026-01-08 08:00:00',
                date: '2026-01-08'
            },
            {
                id: 4,
                type: 'stage_reward',
                class_name: '初一(1)班',
                achievement: '周完成率达80%',
                completion_rate: 0.85,
                student_count: 48,
                completed_count: 41,
                teacher_points: 50,
                balance: 1514,
                created_at: '2026-01-07 23:59:59',
                date: '2026-01-07'
            },
            {
                id: 5,
                type: 'student_task',
                student_name: '赵六',
                student_avatar: '赵',
                class_name: '初一(1)班',
                task_type: '阅读任务',
                task_name: '完成《活着》第二章阅读',
                student_points: 10,
                teacher_points: 2,
                ratio: '5:1',
                balance: 1464,
                created_at: '2026-01-07 16:20:00',
                date: '2026-01-07'
            },
            {
                id: 6,
                type: 'achievement',
                achievement: '班级月度排名第一',
                class_name: '初一(1)班',
                rank: 1,
                total_classes: 12,
                teacher_points: 100,
                balance: 1462,
                created_at: '2026-01-01 00:00:00',
                date: '2026-01-01'
            }
        ];

        let currentFilter = 'all';
        let allRecords = mockRecords;

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadStatistics();
            renderRecords();
        });

        // 加载统计数据
        function loadStatistics() {
            // 实际应从后端加载
            const stats = {
                total: 1520,
                today: 12,
                week: 86,
                month: 320
            };

            document.getElementById('totalPoints').textContent = stats.total;
            document.getElementById('todayPoints').textContent = `+${stats.today}`;
            document.getElementById('weekPoints').textContent = `+${stats.week}`;
            document.getElementById('monthPoints').textContent = `+${stats.month}`;
        }

        // 筛选记录
        function filterRecords(type, element) {
            currentFilter = type;

            // 更新按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            element.classList.add('active');

            renderRecords();
        }

        // 渲染记录列表
        function renderRecords() {
            const recordsList = document.getElementById('recordsList');

            // 筛选数据
            let filteredRecords = allRecords;
            if (currentFilter !== 'all') {
                filteredRecords = allRecords.filter(r => r.type === currentFilter);
            }

            if (filteredRecords.length === 0) {
                recordsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💰</div>
                        <div class="empty-text">暂无积分记录</div>
                    </div>
                `;
                return;
            }

            // 按日期分组
            const groupedRecords = {};
            filteredRecords.forEach(record => {
                const date = record.date;
                if (!groupedRecords[date]) {
                    groupedRecords[date] = [];
                }
                groupedRecords[date].push(record);
            });

            // 渲染分组记录
            let html = '';
            Object.keys(groupedRecords).sort((a, b) => b.localeCompare(a)).forEach(date => {
                html += `<div class="date-group">`;
                html += `<div class="date-header">${formatDate(date)}</div>`;

                groupedRecords[date].forEach(record => {
                    html += renderRecordCard(record);
                });

                html += `</div>`;
            });

            recordsList.innerHTML = html;
        }

        // 渲染单条记录
        function renderRecordCard(record) {
            if (record.type === 'student_task') {
                return `
                    <div class="record-card">
                        <div class="record-header">
                            <div class="student-avatar">${record.student_avatar}</div>
                            <div class="record-info">
                                <div class="record-title">${record.student_name} · ${record.task_type}</div>
                                <div class="record-subtitle">${record.class_name}</div>
                            </div>
                            <div class="record-points">+${record.teacher_points}</div>
                        </div>
                        <div class="record-detail">
                            <div class="detail-row">
                                <span class="detail-label">任务内容</span>
                                <span class="detail-value">${record.task_name}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">学生获得</span>
                                <span class="detail-value">${record.student_points} 积分</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">奖励比例</span>
                                <span class="detail-value">${record.ratio}</span>
                            </div>
                        </div>
                        <div class="record-time">${formatTime(record.created_at)}</div>
                    </div>
                `;
            } else if (record.type === 'stage_reward') {
                return `
                    <div class="record-card">
                        <div class="record-header">
                            <div class="student-avatar">🏆</div>
                            <div class="record-info">
                                <div class="record-title">阶段奖励<span class="reward-badge">奖励</span></div>
                                <div class="record-subtitle">${record.class_name}</div>
                            </div>
                            <div class="record-points">+${record.teacher_points}</div>
                        </div>
                        <div class="record-detail">
                            <div class="detail-row">
                                <span class="detail-label">达成成就</span>
                                <span class="detail-value">${record.achievement}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">完成情况</span>
                                <span class="detail-value">${record.completed_count}/${record.student_count}人 (${(record.completion_rate * 100).toFixed(0)}%)</span>
                            </div>
                        </div>
                        <div class="record-time">${formatTime(record.created_at)}</div>
                    </div>
                `;
            } else if (record.type === 'achievement') {
                return `
                    <div class="record-card">
                        <div class="record-header">
                            <div class="student-avatar">🎖️</div>
                            <div class="record-info">
                                <div class="record-title">成就奖励<span class="reward-badge">特殊</span></div>
                                <div class="record-subtitle">${record.class_name}</div>
                            </div>
                            <div class="record-points">+${record.teacher_points}</div>
                        </div>
                        <div class="record-detail">
                            <div class="detail-row">
                                <span class="detail-label">成就内容</span>
                                <span class="detail-value">${record.achievement}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">班级排名</span>
                                <span class="detail-value">第${record.rank}名 / 共${record.total_classes}个班级</span>
                            </div>
                        </div>
                        <div class="record-time">${formatTime(record.created_at)}</div>
                    </div>
                `;
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (dateStr === today.toISOString().split('T')[0]) {
                return '今天';
            } else if (dateStr === yesterday.toISOString().split('T')[0]) {
                return '昨天';
            } else {
                return `${date.getMonth() + 1}月${date.getDate()}日`;
            }
        }

        // 格式化时间
        function formatTime(timeStr) {
            const date = new Date(timeStr);
            return `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
