<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>计划测评统计 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; padding-bottom: 20px; }
        .navbar { background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-back { font-size: 18px; cursor: pointer; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }

        /* 班级选择器 */
        .class-selector {
            background: white;
            margin: 12px 16px;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .class-selector-label {
            font-size: 13px;
            color: #666666;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .class-selector select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 15px;
            color: #333333;
            background: white;
            cursor: pointer;
        }
        .class-selector select:focus {
            outline: none;
            border-color: #2E5BFF;
        }

        /* 整体统计卡片 */
        .stats-card { background: white; margin: 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stats-title { font-size: 16px; font-weight: 600; color: #333333; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .stat-item { text-align: center; padding: 12px; background: #f5f5f5; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; color: #2E5BFF; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #999999; }

        /* 测评结果分析 */
        .analysis-card { background: white; margin: 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .analysis-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .analysis-title { font-size: 16px; font-weight: 600; color: #333333; display: flex; align-items: center; gap: 8px; }
        .analysis-refresh { font-size: 14px; color: #2E5BFF; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; transition: all 0.3s; }
        .analysis-refresh:active { background: rgba(46, 91, 255, 0.1); }
        .analysis-refresh.refreshing i { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .radar-container { display: flex; justify-content: center; margin-bottom: 12px; }
        .radar-canvas { max-width: 100%; }
        .analysis-summary { padding: 12px; background: #f8f9fc; border-radius: 8px; font-size: 13px; color: #666666; line-height: 1.6; }
        .analysis-summary .highlight { color: #2E5BFF; font-weight: 500; }
        .analysis-summary .weak-point { color: #ff4d4f; font-weight: 500; }

        /* 书籍对比列表 */
        .books-section { background: white; margin: 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .section-title { font-size: 16px; font-weight: 600; color: #333333; display: flex; align-items: center; gap: 8px; margin-bottom: 0; }
        .section-toggle { font-size: 12px; color: #999999; display: flex; align-items: center; gap: 4px; }
        .section-toggle i { font-size: 10px; transition: transform 0.3s; }
        .section-toggle.collapsed i { transform: rotate(180deg); }
        .section-content { margin-top: 16px; transition: all 0.3s; }
        .section-content.collapsed { display: none; }
        .book-compare-item { padding: 16px; margin-bottom: 12px; background: #fafafa; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .book-compare-item:last-child { margin-bottom: 0; }
        .book-compare-item:active { background: #f0f0f0; }
        .book-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .book-name { font-size: 15px; font-weight: 600; color: #333333; }
        .book-score { font-size: 18px; font-weight: 700; }
        .score-high { color: #52c41a; }
        .score-medium { color: #2E5BFF; }
        .score-low { color: #faad14; }
        .book-progress { margin-bottom: 8px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #666666; margin-bottom: 6px; }
        .progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
        .progress-high { background: linear-gradient(90deg, #52c41a, #73d13d); }
        .progress-medium { background: linear-gradient(90deg, #faad14, #ffc53d); }
        .progress-low { background: linear-gradient(90deg, #ff4d4f, #ff7875); }
        .book-stats { display: flex; gap: 16px; font-size: 12px; color: #999999; }

        /* 学生排名列表 */
        .ranking-section { background: white; margin: 16px; padding: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .student-rank-item { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; background: #fafafa; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .student-rank-item:last-child { margin-bottom: 0; }
        .student-rank-item:active { background: #f0f0f0; transform: scale(0.98); }
        .rank-number { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin-right: 12px; flex-shrink: 0; }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #fff; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #666; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #e8a87c); color: #fff; }
        .rank-other { background: #f0f0f0; color: #999999; }
        .student-info { flex: 1; }
        .student-name { font-size: 14px; font-weight: 600; color: #333333; margin-bottom: 4px; }
        .student-progress { font-size: 12px; color: #999999; }
        .student-score { font-size: 18px; font-weight: 700; }

        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        let currentClassId = 'all';  // 当前选中的班级ID
        let currentPlan = null;
        // 展开收起状态
        const sectionExpanded = {
            books: true,
            ranking: true
        };

        // 切换区块展开/收起
        function toggleSection(section) {
            sectionExpanded[section] = !sectionExpanded[section];
            const content = document.getElementById(`${section}-content`);
            const toggle = document.getElementById(`${section}-toggle`);

            if (sectionExpanded[section]) {
                content.classList.remove('collapsed');
                toggle.classList.remove('collapsed');
                toggle.innerHTML = '收起 <i class="fa-solid fa-chevron-up"></i>';
            } else {
                content.classList.add('collapsed');
                toggle.classList.add('collapsed');
                toggle.innerHTML = '展开 <i class="fa-solid fa-chevron-down"></i>';
            }
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const plan = mockPlans.find(p => p.id === planId);
            if (!plan) {
                alert('计划不存在');
                Router.back();
                return;
            }

            currentPlan = plan;

            // 从URL获取classId参数（可选）
            const urlClassId = urlParams.get('classId');
            if (urlClassId && urlClassId !== 'all') {
                currentClassId = parseInt(urlClassId);
            }

            // 设置标题
            document.getElementById('planTitle').textContent = plan.planName;

            // 渲染班级选择器
            renderClassSelector(plan.enrolledClasses);

            // 加载数据
            loadPlanData();
        });

        // 渲染班级选择器
        function renderClassSelector(enrolledClasses) {
            const selector = document.getElementById('classSelector');

            const options = [
                `<option value="all">全部班级（${enrolledClasses.length}个班级）</option>`,
                ...enrolledClasses.map(c =>
                    `<option value="${c.classId}">${c.className}</option>`
                )
            ].join('');

            selector.innerHTML = options;
            selector.value = currentClassId;
        }

        // 班级切换事件
        function onClassChange() {
            const selector = document.getElementById('classSelector');
            currentClassId = selector.value === 'all' ? 'all' : parseInt(selector.value);

            // 重新加载数据
            loadPlanData();
        }

        // 加载计划数据
        function loadPlanData() {
            let books;
            let students;
            let totalStudents;

            if (currentClassId === 'all') {
                // 全部班级模式：使用汇总数据
                books = currentPlan.books;
                totalStudents = currentPlan.enrolledClasses.reduce((sum, c) => sum + c.studentCount, 0);

                // 合并所有班级的学生数据
                students = [];
                currentPlan.enrolledClasses.forEach(classItem => {
                    if (classItem.students) {
                        const studentsWithClass = classItem.students.map(s => ({
                            ...s,
                            className: classItem.className
                        }));
                        students.push(...studentsWithClass);
                    }
                });
            } else {
                // 单个班级模式
                const classItem = currentPlan.enrolledClasses.find(c => c.classId === currentClassId);
                if (!classItem) {
                    alert('班级不存在');
                    return;
                }

                books = classItem.books;
                totalStudents = classItem.studentCount;
                students = classItem.students || [];
            }

            // 计算整体统计
            const totalSubmitted = books.reduce((sum, book) => sum + book.submitted, 0);
            const totalTests = books.length * totalStudents;
            const submitRate = Math.round((totalSubmitted / totalTests) * 100);
            const avgScore = (books.reduce((sum, book) => sum + book.avgScore, 0) / books.length).toFixed(1);

            document.getElementById('totalSubmitRate').textContent = submitRate + '%';
            document.getElementById('avgScore').textContent = avgScore;
            document.getElementById('totalSubmitted').textContent = totalSubmitted;
            document.getElementById('totalStudents').textContent = totalStudents;

            // 获取阅读能力分析数据
            let abilityScores;
            if (currentClassId === 'all') {
                abilityScores = currentPlan.abilityScores;
            } else {
                const classItem = currentPlan.enrolledClasses.find(c => c.classId === currentClassId);
                abilityScores = classItem?.abilityScores || currentPlan.abilityScores;
            }

            // 渲染书籍对比
            renderBooksCompare(books);

            // 渲染阅读能力分析
            renderAbilityAnalysis(abilityScores, avgScore);

            // 渲染学生排名
            renderStudentRanking(students);
        }

        // 将能力分数对象转换为数组
        function getAbilityData(abilityScores) {
            const abilityNames = ['信息提取', '理解推断', '整合分析', '评价鉴赏', '迁移运用'];
            return abilityNames.map(name => ({
                name,
                score: abilityScores[name] || 0
            }));
        }

        // 绘制雷达图
        function drawRadarChart(abilities) {
            const canvas = document.getElementById('radarChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + 10;
            const radius = 100;
            const levels = 5;
            const count = abilities.length;
            const angleStep = (Math.PI * 2) / count;
            const startAngle = -Math.PI / 2; // 从顶部开始

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景网格
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;

            for (let level = 1; level <= levels; level++) {
                const levelRadius = (radius / levels) * level;
                ctx.beginPath();
                for (let i = 0; i <= count; i++) {
                    const angle = startAngle + angleStep * i;
                    const x = centerX + Math.cos(angle) * levelRadius;
                    const y = centerY + Math.sin(angle) * levelRadius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.stroke();
            }

            // 绘制轴线
            ctx.strokeStyle = '#d0d0d0';
            for (let i = 0; i < count; i++) {
                const angle = startAngle + angleStep * i;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
            }

            // 绘制数据区域
            ctx.beginPath();
            ctx.fillStyle = 'rgba(46, 91, 255, 0.2)';
            ctx.strokeStyle = '#2E5BFF';
            ctx.lineWidth = 2;

            for (let i = 0; i <= count; i++) {
                const index = i % count;
                const angle = startAngle + angleStep * index;
                const value = abilities[index].score / 100;
                const x = centerX + Math.cos(angle) * radius * value;
                const y = centerY + Math.sin(angle) * radius * value;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 绘制数据点
            ctx.fillStyle = '#2E5BFF';
            for (let i = 0; i < count; i++) {
                const angle = startAngle + angleStep * i;
                const value = abilities[i].score / 100;
                const x = centerX + Math.cos(angle) * radius * value;
                const y = centerY + Math.sin(angle) * radius * value;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // 绘制标签和分数
            ctx.fillStyle = '#333333';
            ctx.font = '12px "Source Han Sans CN", sans-serif';
            ctx.textAlign = 'center';

            for (let i = 0; i < count; i++) {
                const angle = startAngle + angleStep * i;
                const labelRadius = radius + 28;
                const x = centerX + Math.cos(angle) * labelRadius;
                const y = centerY + Math.sin(angle) * labelRadius;

                // 调整标签位置
                let textX = x;
                let textY = y;

                // 顶部标签
                if (i === 0) {
                    textY = y - 5;
                }
                // 右侧标签
                else if (angle > -Math.PI / 2 && angle < Math.PI / 2) {
                    textX = x + 5;
                    ctx.textAlign = 'left';
                }
                // 左侧标签
                else {
                    textX = x - 5;
                    ctx.textAlign = 'right';
                }
                // 底部标签
                if (angle > Math.PI / 4 && angle < Math.PI * 3 / 4) {
                    textY = y + 5;
                }

                ctx.fillText(abilities[i].name, textX, textY);

                // 绘制分数
                ctx.fillStyle = '#2E5BFF';
                ctx.font = 'bold 11px "Source Han Sans CN", sans-serif';
                ctx.fillText(abilities[i].score + '分', textX, textY + 14);

                // 重置样式
                ctx.fillStyle = '#333333';
                ctx.font = '12px "Source Han Sans CN", sans-serif';
                ctx.textAlign = 'center';
            }
        }

        // 渲染阅读能力分析
        function renderAbilityAnalysis(abilityScores, avgScore) {
            const summaryContainer = document.getElementById('analysisSummary');
            const abilities = getAbilityData(abilityScores);

            // 绘制雷达图
            drawRadarChart(abilities);

            // 找出最强和最弱的能力
            const sortedAbilities = [...abilities].sort((a, b) => b.score - a.score);
            const strongest = sortedAbilities[0];
            const weakest = sortedAbilities[sortedAbilities.length - 1];

            // 生成分析总结
            const summaryHtml = `
                <strong>综合分析：</strong>学生整体阅读能力表现${parseFloat(avgScore) >= 85 ? '优秀' : parseFloat(avgScore) >= 75 ? '良好' : '一般'}。
                <span class="highlight">${strongest.name}</span>能力表现最佳（${strongest.score}分），
                <span class="weak-point">${weakest.name}</span>能力相对薄弱（${weakest.score}分），建议在后续教学中加强${weakest.name}方面的训练。
            `;

            summaryContainer.innerHTML = summaryHtml;
        }

        // 渲染书籍对比
        function renderBooksCompare(books) {
            const container = document.getElementById('booksCompare');

            const html = books.map(book => {
                const scoreClass = book.avgScore >= 90 ? 'score-high' : book.avgScore >= 80 ? 'score-medium' : 'score-low';
                const progressClass = book.submitRate >= 80 ? 'progress-high' : book.submitRate >= 60 ? 'progress-medium' : 'progress-low';

                // 计算提交人数和总人数
                const submitted = book.submitted;
                const total = book.total || (currentClassId === 'all'
                    ? currentPlan.enrolledClasses.reduce((sum, c) => sum + c.studentCount, 0)
                    : currentPlan.enrolledClasses.find(c => c.classId === currentClassId).studentCount);

                return `
                    <div class="book-compare-item" onclick="viewBookStats(${currentPlan.id}, ${book.id})">
                        <div class="book-header">
                            <div class="book-name">${book.name}</div>
                            <div class="book-score ${scoreClass}">${book.avgScore}分</div>
                        </div>
                        <div class="book-progress">
                            <div class="progress-info">
                                <span>提交进度</span>
                                <span>${submitted}/${total}人 (${book.submitRate}%)</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${progressClass}" style="width: ${book.submitRate}%"></div>
                            </div>
                        </div>
                        <div class="book-stats">
                            <span><i class="fa-solid fa-clipboard-question"></i> ${book.examCount}道题</span>
                            <span><i class="fa-solid fa-users"></i> ${submitted}人已提交</span>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        // 渲染学生排名
        function renderStudentRanking(students) {
            const container = document.getElementById('studentRanking');

            // 按分数排序
            const sortedStudents = [...students].sort((a, b) => b.score - a.score);

            const html = sortedStudents.map((student, index) => {
                const rank = index + 1;
                let rankClass = 'rank-other';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                const scoreClass = student.score >= 90 ? 'score-high' : student.score >= 80 ? 'score-medium' : 'score-low';

                // 在全部班级模式下显示班级标签
                const classTag = currentClassId === 'all' && student.className
                    ? ` (${student.className})`
                    : '';

                return `
                    <div class="student-rank-item" onclick="viewStudentDetail(${student.id})">
                        <div class="rank-number ${rankClass}">${rank}</div>
                        <div class="student-info">
                            <div class="student-name">${student.name}${classTag}</div>
                            <div class="student-progress">${student.progress}</div>
                        </div>
                        <div class="student-score ${scoreClass}">${student.score}</div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html || '<div style="text-align: center; padding: 20px; color: #999999;">暂无数据</div>';
        }

        // 刷新阅读能力分析
        function refreshAbilityAnalysis() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.classList.add('refreshing');

            // 模拟网络请求延迟
            setTimeout(() => {
                // 获取当前班级的能力分析数据
                let abilityScores;
                if (currentClassId === 'all') {
                    abilityScores = currentPlan.abilityScores;
                } else {
                    const classItem = currentPlan.enrolledClasses.find(c => c.classId === currentClassId);
                    abilityScores = classItem?.abilityScores || currentPlan.abilityScores;
                }

                // 计算平均分
                let books;
                if (currentClassId === 'all') {
                    books = currentPlan.books;
                } else {
                    const classItem = currentPlan.enrolledClasses.find(c => c.classId === currentClassId);
                    books = classItem?.books || currentPlan.books;
                }
                const avgScore = (books.reduce((sum, book) => sum + book.avgScore, 0) / books.length).toFixed(1);

                // 重新渲染阅读能力分析
                renderAbilityAnalysis(abilityScores, avgScore);
                refreshBtn.classList.remove('refreshing');
            }, 800);
        }

        // 查看书籍统计
        function viewBookStats(planId, bookId) {
            window.location.href = `19-书籍测评统计.html?planId=${planId}&bookId=${bookId}&classId=${currentClassId}`;
        }

        // 查看学生测评详情
        function viewStudentDetail(studentId) {
            window.location.href = `09-测评详情.html?planId=${planId}&bookId=1&studentId=${studentId}`;
        }
    </script>
