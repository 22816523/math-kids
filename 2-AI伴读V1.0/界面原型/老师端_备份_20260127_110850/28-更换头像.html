<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>更换头像 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }

        .avatar-preview { text-align: center; padding: 40px 16px; }
        .preview-image { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 700; overflow: hidden; }
        .preview-image img { width: 100%; height: 100%; object-fit: cover; }
        .preview-tip { font-size: 12px; color: #999999; margin-top: 16px; }

        .action-section { background: white; margin: 12px 16px; border-radius: 8px; overflow: hidden; }
        .action-item { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; cursor: pointer; }
        .action-item:last-child { border-bottom: none; }
        .action-item:active { background: #f5f5f5; }
        .action-icon { width: 24px; height: 24px; margin-right: 12px; color: #2E5BFF; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .action-text { flex: 1; font-size: 16px; color: #333333; }

        .tip-section { padding: 16px; margin: 0 16px; }
        .tip-title { font-size: 14px; color: #333333; font-weight: 500; margin-bottom: 8px; }
        .tip-list { font-size: 12px; color: #999999; line-height: 1.8; }
        .tip-list li { margin-bottom: 4px; }

        .save-btn { margin: 24px 16px; padding: 14px; background: linear-gradient(135deg, #2E5BFF, #1E4BEF); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; width: calc(100% - 32px); box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3); }
        .save-btn:hover { opacity: 0.9; }
        .save-btn:active { transform: scale(0.98); }
        .save-btn:disabled { background: #d9d9d9; box-shadow: none; cursor: not-allowed; }

        /* 隐藏的文件输入 */
        .hidden-input { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">更换头像</div>
    </div>

    <div class="avatar-preview">
        <div class="preview-image" id="previewImage">
            王
        </div>
        <div class="preview-tip">支持JPG、PNG格式，文件大小不超过5MB</div>
    </div>

    <div class="action-section">
        <div class="action-item" onclick="takePhoto()">
            <div class="action-icon">
                <i class="fa-solid fa-camera"></i>
            </div>
            <div class="action-text">拍照</div>
        </div>
        <div class="action-item" onclick="chooseFromAlbum()">
            <div class="action-icon">
                <i class="fa-solid fa-image"></i>
            </div>
            <div class="action-text">从相册选择</div>
        </div>
    </div>

    <div class="tip-section">
        <div class="tip-title">温馨提示</div>
        <ul class="tip-list">
            <li>建议上传清晰的正面照片</li>
            <li>头像将显示在个人中心和班级管理中</li>
            <li>请勿上传违规或不当图片</li>
        </ul>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveAvatar()" disabled>保存头像</button>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" class="hidden-input" accept="image/jpeg,image/png" onchange="handleFileSelect(event)">

    <script src="./router.js"></script>
    <script>
        let selectedFile = null
        let previewUrl = null

        function takePhoto() {
            // 在移动端，可以使用 capture 属性直接调用相机
            const input = document.getElementById('fileInput')
            input.setAttribute('capture', 'camera')
            input.click()
        }

        function chooseFromAlbum() {
            // 从相册选择
            const input = document.getElementById('fileInput')
            input.removeAttribute('capture')
            input.click()
        }

        function handleFileSelect(event) {
            const file = event.target.files[0]
            if (!file) return

            // 验证文件类型
            if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                alert('只支持JPG和PNG格式的图片')
                return
            }

            // 验证文件大小（5MB）
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过5MB')
                return
            }

            selectedFile = file

            // 预览图片
            const reader = new FileReader()
            reader.onload = function(e) {
                previewUrl = e.target.result
                const previewImage = document.getElementById('previewImage')
                previewImage.innerHTML = `<img src="${previewUrl}" alt="头像预览">`

                // 启用保存按钮
                document.getElementById('saveBtn').disabled = false
            }
            reader.readAsDataURL(file)
        }

        function saveAvatar() {
            if (!selectedFile) {
                alert('请先选择图片')
                return
            }

            // 实际应该调用API上传图片
            // const formData = new FormData()
            // formData.append('avatar', selectedFile)
            // fetch('/api/upload-avatar', { method: 'POST', body: formData })

            alert('头像上传成功')
            Router.back()
        }
    </script>
</body>
</html>
