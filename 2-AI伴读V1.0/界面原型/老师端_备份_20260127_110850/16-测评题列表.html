<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测评题列表 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 20px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 4px; }
        .navbar-title { flex: 1; text-align: center; font-size: 18px; line-height: 1.4; font-weight: 600; margin-right: 28px; }

        .page-header { background: linear-gradient(135deg, #52c41a, #73d13d); padding: 20px 16px; color: white; }
        .header-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .header-subtitle { font-size: 13px; opacity: 0.9; }
        .header-stats { display: flex; gap: 16px; margin-top: 12px; font-size: 12px; }
        .header-stat { display: flex; align-items: center; gap: 4px; }

        /* 阅读能力分布统计 */
        .ability-stats { background: rgba(255, 255, 255, 0.15); border-radius: 8px; padding: 12px; margin-top: 12px; }
        .ability-stats-title { font-size: 12px; opacity: 0.9; margin-bottom: 8px; }
        .ability-stats-list { display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; }
        .ability-stat-item { background: rgba(255, 255, 255, 0.2); padding: 4px 8px; border-radius: 12px; white-space: nowrap; }

        .questions-container { padding: 16px; }
        .question-type-section { margin-bottom: 20px; }
        .type-header { font-size: 15px; font-weight: 600; color: #333333; margin-bottom: 12px; padding-left: 8px; border-left: 3px solid #52c41a; }

        .question-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); position: relative; }
        .question-number { display: inline-block; width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #52c41a, #73d13d); color: white; text-align: center; line-height: 24px; font-size: 12px; font-weight: 600; margin-right: 8px; }
        .question-content { font-size: 14px; color: #333333; line-height: 1.8; margin-bottom: 8px; }

        /* 阅读能力标签 */
        .ability-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-left: 8px; vertical-align: middle; }
        .ability-tag i { font-size: 10px; }
        .ability-tag.information { background: rgba(24, 144, 255, 0.1); color: #1890ff; }
        .ability-tag.comprehension { background: rgba(82, 196, 26, 0.1); color: #52c41a; }
        .ability-tag.inference { background: rgba(114, 46, 209, 0.1); color: #722ed1; }
        .ability-tag.evaluation { background: rgba(250, 173, 20, 0.1); color: #faad14; }
        .ability-tag.integration { background: rgba(19, 194, 194, 0.1); color: #13c2c2; }
        .ability-tag.literary { background: rgba(235, 47, 150, 0.1); color: #eb2f96; }

        .question-options { margin-left: 32px; margin-top: 12px; }
        .option-item { padding: 8px 12px; margin-bottom: 8px; background: #f5f5f5; border-radius: 8px; font-size: 13px; color: #666666; line-height: 1.6; }
        .option-label { font-weight: 600; color: #333333; margin-right: 6px; }

        /* 答案区域样式 */
        .answer-section { margin-top: 12px; padding: 12px; background: rgba(82, 196, 26, 0.08); border-left: 3px solid #52c41a; border-radius: 8px; }
        .answer-label { font-size: 13px; font-weight: 600; color: #52c41a; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .answer-label i { font-size: 12px; }
        .answer-content { font-size: 13px; color: #333333; line-height: 1.8; }

        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">测评题列表</div>
    </div>

    <div class="page-header">
        <div class="header-title" id="bookTitle">三体</div>
        <div class="header-subtitle">阅读理解测评题</div>
        <div class="header-stats">
            <div class="header-stat">
                <i class="fa-solid fa-clipboard-question"></i>
                <span>共 <span id="totalCount">20</span> 道题</span>
            </div>
            <div class="header-stat">
                <i class="fa-solid fa-clock"></i>
                <span>建议用时 30 分钟</span>
            </div>
        </div>

        <!-- 阅读能力分布统计 -->
        <div class="ability-stats">
            <div class="ability-stats-title">考察能力分布</div>
            <div class="ability-stats-list" id="abilityStatsList">
                <!-- 能力统计将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <div class="questions-container" id="questionsContainer">
        <!-- 题目列表将通过JavaScript动态生成 -->
    </div>

    <script src="./router.js"></script>
    <script>
        // 阅读能力定义
        const readingAbilities = {
            information: { name: '信息提取', icon: 'fa-search', color: '#1890ff' },
            comprehension: { name: '理解分析', icon: 'fa-book-open', color: '#52c41a' },
            inference: { name: '推理判断', icon: 'fa-brain', color: '#722ed1' },
            evaluation: { name: '评价鉴赏', icon: 'fa-star', color: '#faad14' },
            integration: { name: '综合运用', icon: 'fa-puzzle-piece', color: '#13c2c2' },
            literary: { name: '文学感悟', icon: 'fa-heart', color: '#eb2f96' }
        };

        // 模拟测评题数据
        const mockExamData = {
            1: { // bookId
                bookTitle: '三体',
                totalCount: 20,
                questions: [
                    // 选择题 (12道)
                    {
                        id: 1,
                        type: 'choice',
                        question: '《三体》的作者是谁',
                        options: [
                            { label: 'A', text: '刘慈欣' },
                            { label: 'B', text: '王晋康' },
                            { label: 'C', text: '韩松' },
                            { label: 'D', text: '何夕' }
                        ],
                        answer: 'A',
                        readingAbility: 'information'
                    },
                    {
                        id: 2,
                        type: 'choice',
                        question: '叶文洁第一次接收到三体文明的信息是在哪里',
                        options: [
                            { label: 'A', text: '红岸基地' },
                            { label: 'B', text: '北京天文台' },
                            { label: 'C', text: '上海天文台' },
                            { label: 'D', text: '紫金山天文台' }
                        ],
                        answer: 'A',
                        readingAbility: 'information'
                    },
                    {
                        id: 3,
                        type: 'choice',
                        question: '三体世界有几颗太阳',
                        options: [
                            { label: 'A', text: '一颗' },
                            { label: 'B', text: '两颗' },
                            { label: 'C', text: '三颗' },
                            { label: 'D', text: '四颗' }
                        ],
                        answer: 'C',
                        readingAbility: 'information'
                    },
                    {
                        id: 4,
                        type: 'choice',
                        question: '汪淼在视网膜上看到的倒计时数字代表什么',
                        options: [
                            { label: 'A', text: '地球毁灭倒计时' },
                            { label: 'B', text: '三体舰队到达时间' },
                            { label: 'C', text: '宇宙微波背景辐射的闪烁' },
                            { label: 'D', text: '他的生命倒计时' }
                        ],
                        answer: 'C',
                        readingAbility: 'comprehension'
                    },
                    {
                        id: 5,
                        type: 'choice',
                        question: '智子是什么',
                        options: [
                            { label: 'A', text: '三体人的名字' },
                            { label: 'B', text: '一种超级计算机' },
                            { label: 'C', text: '二维展开的质子' },
                            { label: 'D', text: '一种武器' }
                        ],
                        answer: 'C',
                        readingAbility: 'comprehension'
                    },
                    {
                        id: 6,
                        type: 'choice',
                        question: '地球三体组织的最高统帅是谁',
                        options: [
                            { label: 'A', text: '叶文洁' },
                            { label: 'B', text: '伊文斯' },
                            { label: 'C', text: '潘寒' },
                            { label: 'D', text: '申玉菲' }
                        ],
                        answer: 'A',
                        readingAbility: 'information'
                    },
                    {
                        id: 7,
                        type: 'choice',
                        question: '三体游戏中，秦始皇用什么方法来进行计算',
                        options: [
                            { label: 'A', text: '算盘' },
                            { label: 'B', text: '人列计算机' },
                            { label: 'C', text: '竹简' },
                            { label: 'D', text: '石板' }
                        ],
                        answer: 'B',
                        readingAbility: 'comprehension'
                    },
                    {
                        id: 8,
                        type: 'choice',
                        question: '罗辑在《三体》系列中的职业身份是什么',
                        options: [
                            { label: 'A', text: '物理学家' },
                            { label: 'B', text: '社会学家' },
                            { label: 'C', text: '天文学家' },
                            { label: 'D', text: '军事战略家' }
                        ],
                        answer: 'B',
                        readingAbility: 'information'
                    },
                    {
                        id: 9,
                        type: 'choice',
                        question: '三体文明距离地球多远',
                        options: [
                            { label: 'A', text: '1光年' },
                            { label: 'B', text: '4光年' },
                            { label: 'C', text: '10光年' },
                            { label: 'D', text: '100光年' }
                        ],
                        answer: 'B',
                        readingAbility: 'information'
                    },
                    {
                        id: 10,
                        type: 'choice',
                        question: '汪淼是什么职业',
                        options: [
                            { label: 'A', text: '物理学家' },
                            { label: 'B', text: '纳米材料科学家' },
                            { label: 'C', text: '天文学家' },
                            { label: 'D', text: '生物学家' }
                        ],
                        answer: 'B',
                        readingAbility: 'information'
                    },
                    {
                        id: 11,
                        type: 'choice',
                        question: '红岸基地的主要任务是什么',
                        options: [
                            { label: 'A', text: '军事通讯' },
                            { label: 'B', text: '寻找外星文明' },
                            { label: 'C', text: '气象观测' },
                            { label: 'D', text: '导弹预警' }
                        ],
                        answer: 'B',
                        readingAbility: 'comprehension'
                    },
                    {
                        id: 12,
                        type: 'choice',
                        question: '三体舰队到达地球需要多长时间',
                        options: [
                            { label: 'A', text: '100年' },
                            { label: 'B', text: '200年' },
                            { label: 'C', text: '400年' },
                            { label: 'D', text: '1000年' }
                        ],
                        answer: 'C',
                        readingAbility: 'information'
                    },
                    // 判断题 (5道)
                    {
                        id: 13,
                        type: 'judge',
                        question: '三体文明的科技水平远超地球文明',
                        answer: true,
                        readingAbility: 'inference'
                    },
                    {
                        id: 14,
                        type: 'judge',
                        question: '叶文洁最终后悔向三体文明发送了地球坐标',
                        answer: true,
                        readingAbility: 'literary'
                    },
                    {
                        id: 15,
                        type: 'judge',
                        question: '三体世界的恒纪元和乱纪元是可以预测的',
                        answer: false,
                        readingAbility: 'inference'
                    },
                    {
                        id: 16,
                        type: 'judge',
                        question: '智子可以锁死地球的基础科学研究',
                        answer: true,
                        readingAbility: 'inference'
                    },
                    {
                        id: 17,
                        type: 'judge',
                        question: '地球三体组织的所有成员都希望三体文明毁灭人类',
                        answer: false,
                        readingAbility: 'inference'
                    },
                    // 填空题 (2道)
                    {
                        id: 18,
                        type: 'fill',
                        question: '叶文洁在红岸基地向宇宙发送的第一条信息内容是："_____"',
                        answer: '不要回答！不要回答！不要回答！',
                        readingAbility: 'evaluation'
                    },
                    {
                        id: 19,
                        type: 'fill',
                        question: '三体游戏中，玩家需要帮助三体文明预测_____和_____的出现规律',
                        answer: '恒纪元、乱纪元',
                        readingAbility: 'evaluation'
                    },
                    // 问答题 (1道)
                    {
                        id: 20,
                        type: 'essay',
                        question: '请简述"黑暗森林法则"的核心内容，并分析它在小说中的意义',
                        answer: '黑暗森林法则认为宇宙就像一座黑暗森林，每个文明都是带枪的猎人，潜行在林间。由于宇宙资源有限、文明之间存在猜疑链和技术爆炸的可能性，任何暴露自己位置的文明都可能被其他文明视为威胁而消灭。这一法则揭示了宇宙文明之间残酷的生存竞争关系，解释了费米悖论（为什么人类至今未发现外星文明），是《三体》系列的核心理论基础，也是人类与三体文明博弈的关键所在。',
                        readingAbility: 'integration'
                    }
                ]
            }
        };

        let currentExamData = null;

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = parseInt(urlParams.get('bookId')) || 1;

            loadExamData(bookId);
        });

        // 加载测评题数据
        function loadExamData(bookId) {
            currentExamData = mockExamData[bookId];
            if (!currentExamData) return;

            document.getElementById('bookTitle').textContent = currentExamData.bookTitle;
            document.getElementById('totalCount').textContent = currentExamData.totalCount;

            renderQuestions();
        }

        // 渲染题目列表
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');

            // 统计阅读能力分布
            const abilityStats = {};
            currentExamData.questions.forEach(q => {
                const ability = q.readingAbility;
                abilityStats[ability] = (abilityStats[ability] || 0) + 1;
            });

            // 渲染能力统计
            const statsHtml = Object.keys(abilityStats).map(key => {
                const ability = readingAbilities[key];
                return `<div class="ability-stat-item">${ability.name} ${abilityStats[key]}题</div>`;
            }).join('');
            document.getElementById('abilityStatsList').innerHTML = statsHtml;

            // 按题型分组
            const choiceQuestions = currentExamData.questions.filter(q => q.type === 'choice');
            const judgeQuestions = currentExamData.questions.filter(q => q.type === 'judge');
            const fillQuestions = currentExamData.questions.filter(q => q.type === 'fill');
            const essayQuestions = currentExamData.questions.filter(q => q.type === 'essay');

            let html = '';

            // 选择题
            if (choiceQuestions.length > 0) {
                html += `
                    <div class="question-type-section">
                        <div class="type-header">一、选择题（共${choiceQuestions.length}题）</div>
                        ${choiceQuestions.map(q => {
                            const ability = readingAbilities[q.readingAbility];
                            const correctOption = q.options.find(opt => opt.label === q.answer);
                            return `
                            <div class="question-card">
                                <div class="question-content">
                                    <span class="question-number">${q.id}</span>
                                    ${q.question}
                                    <span class="ability-tag ${q.readingAbility}">
                                        <i class="fa-solid ${ability.icon}"></i>
                                        ${ability.name}
                                    </span>
                                </div>
                                <div class="question-options">
                                    ${q.options.map(opt => `
                                        <div class="option-item">
                                            <span class="option-label">${opt.label}.</span>${opt.text}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="answer-section">
                                    <div class="answer-label">
                                        <i class="fa-solid fa-circle-check"></i>
                                        标准答案
                                    </div>
                                    <div class="answer-content">${q.answer}. ${correctOption ? correctOption.text : ''}</div>
                                </div>
                            </div>
                        `;
                        }).join('')}
                    </div>
                `;
            }

            // 判断题
            if (judgeQuestions.length > 0) {
                html += `
                    <div class="question-type-section">
                        <div class="type-header">二、判断题（共${judgeQuestions.length}题）</div>
                        ${judgeQuestions.map(q => {
                            const ability = readingAbilities[q.readingAbility];
                            return `
                            <div class="question-card">
                                <div class="question-content">
                                    <span class="question-number">${q.id}</span>
                                    ${q.question}
                                    <span class="ability-tag ${q.readingAbility}">
                                        <i class="fa-solid ${ability.icon}"></i>
                                        ${ability.name}
                                    </span>
                                </div>
                                <div class="answer-section">
                                    <div class="answer-label">
                                        <i class="fa-solid fa-circle-check"></i>
                                        标准答案
                                    </div>
                                    <div class="answer-content">${q.answer ? '正确' : '错误'}</div>
                                </div>
                            </div>
                        `;
                        }).join('')}
                    </div>
                `;
            }

            // 填空题
            if (fillQuestions.length > 0) {
                html += `
                    <div class="question-type-section">
                        <div class="type-header">三、填空题（共${fillQuestions.length}题）</div>
                        ${fillQuestions.map(q => {
                            const ability = readingAbilities[q.readingAbility];
                            return `
                            <div class="question-card">
                                <div class="question-content">
                                    <span class="question-number">${q.id}</span>
                                    ${q.question}
                                    <span class="ability-tag ${q.readingAbility}">
                                        <i class="fa-solid ${ability.icon}"></i>
                                        ${ability.name}
                                    </span>
                                </div>
                                <div class="answer-section">
                                    <div class="answer-label">
                                        <i class="fa-solid fa-circle-check"></i>
                                        标准答案
                                    </div>
                                    <div class="answer-content">${q.answer}</div>
                                </div>
                            </div>
                        `;
                        }).join('')}
                    </div>
                `;
            }

            // 问答题
            if (essayQuestions.length > 0) {
                html += `
                    <div class="question-type-section">
                        <div class="type-header">四、问答题（共${essayQuestions.length}题）</div>
                        ${essayQuestions.map(q => {
                            const ability = readingAbilities[q.readingAbility];
                            return `
                            <div class="question-card">
                                <div class="question-content">
                                    <span class="question-number">${q.id}</span>
                                    ${q.question}
                                    <span class="ability-tag ${q.readingAbility}">
                                        <i class="fa-solid ${ability.icon}"></i>
                                        ${ability.name}
                                    </span>
                                </div>
                                <div class="answer-section">
                                    <div class="answer-label">
                                        <i class="fa-solid fa-circle-check"></i>
                                        参考答案
                                    </div>
                                    <div class="answer-content">${q.answer}</div>
                                </div>
                            </div>
                        `;
                        }).join('')}
                    </div>
                `;
            }

            container.innerHTML = html;
        }
    </script>
</body>
</html>
