<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 校校读吧小管家（教师端）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; padding-bottom: 80px; }

        .navbar { background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; line-height: 1.4; font-weight: 600; }

        .product-image-section { background: white; padding: 40px 16px; text-align: center; }
        .product-image-large { font-size: 120px; color: #2E5BFF; margin-bottom: 16px; }

        .product-info-section { background: white; margin-top: 12px; padding: 20px 16px; }
        .product-title { font-size: 20px; line-height: 1.4; font-weight: 600; color: #333333; margin-bottom: 12px; }
        .product-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .product-points { font-size: 24px; line-height: 1.2; font-weight: 700; color: #FFB800; }
        .product-type { font-size: 14px; line-height: 1.6; color: #8c8c8c; padding: 4px 12px; background: #f5f5f5; border-radius: 4px; }
        .product-stock { font-size: 14px; line-height: 1.6; color: #8c8c8c; }
        .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }
        .section-title { font-size: 16px; line-height: 1.4; font-weight: 600; color: #333333; margin-bottom: 12px; }
        .product-desc { font-size: 14px; line-height: 1.8; color: #666666; }

        .current-points-section { background: white; margin-top: 12px; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .current-points-label { font-size: 14px; line-height: 1.6; color: #666666; }
        .current-points-value { font-size: 18px; line-height: 1.2; font-weight: 700; color: #FFB800; }

        .shortage-hint { background: #fff7e6; border-left: 3px solid #fa8c16; padding: 12px 16px; margin-top: 12px; }
        .shortage-text { font-size: 14px; line-height: 1.6; color: #fa8c16; }

        .action-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; background: white; padding: 12px 16px; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); display: flex; gap: 12px; }
        .action-btn { flex: 1; height: 44px; border: none; border-radius: 8px; font-size: 16px; line-height: 1.4; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #FFB800, #FF8C00); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { background: #d9d9d9; cursor: not-allowed; }
        .btn-secondary { background: white; color: #2E5BFF; border: 1px solid #2E5BFF; }
        .btn-secondary:hover { background: #f0f5ff; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }

        /* 导航栏和标题中的图标保持原色 */
        .navbar .fa-solid,
        .section-title .fa-solid,
        .task-title .fa-solid {
            color: inherit;
            opacity: 1;
        }

        /* 商品图标特殊样式 */
        .product-image-large .fa-solid {
            color: #2E5BFF;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()">←</button>
        <div class="navbar-title">商品详情</div>
    </div>

    <div class="product-image-section">
        <div class="product-image-large" id="productIcon">
            <i class="fa-solid fa-gift"></i>
        </div>
    </div>

    <div class="product-info-section">
        <div class="product-title" id="productName">商品名称</div>
        <div class="product-meta">
            <div class="product-points" id="productPoints">100积分</div>
            <div class="product-type" id="productType">虚拟奖品</div>
            <div class="product-stock" id="productStock">库存：10件</div>
        </div>
        <div class="divider"></div>
        <div class="section-title">商品介绍</div>
        <div class="product-desc" id="productDesc">
            商品详细介绍
        </div>
    </div>

    <div class="current-points-section">
        <div class="current-points-label">我的积分</div>
        <div class="current-points-value"><i class="fa-solid fa-coins"></i> 220</div>
    </div>

    <div id="shortageHint"></div>

    <div class="action-bar">
        <button class="action-btn btn-secondary" onclick="Router.back()">返回</button>
        <button class="action-btn btn-primary" id="exchangeBtn" onclick="handleExchange()">立即兑换</button>
    </div>

    <script src="./router.js"></script>
    <script>
        const currentPoints = 220;

        // 商品数据
        const products = {
            1: {
                name: '教学参考书籍',
                points: 800,
                icon: 'fa-book',
                type: '实物商品',
                stock: '库存：10件',
                desc: '精选教学参考书籍，涵盖语文教学的各个方面，包括教学方法、课程设计、学生评估等内容。帮助教师提升教学水平，丰富教学资源。'
            },
            2: {
                name: '定制保温杯',
                points: 500,
                icon: 'fa-mug-hot',
                type: '实物商品',
                stock: '库存：15件',
                desc: '高品质不锈钢保温杯，印有"校校读吧"专属标识。保温效果持久，容量适中，是教师日常工作的贴心伴侣。'
            },
            3: {
                name: '高级钢笔套装',
                points: 1200,
                icon: 'fa-pen-fancy',
                type: '实物商品',
                stock: '库存：5件',
                desc: '精美钢笔套装，包含钢笔、墨水、笔盒等配件。书写流畅，手感舒适，适合批改作业、书写评语等日常教学工作。'
            },
            4: {
                name: '无线鼠标',
                points: 600,
                icon: 'fa-laptop',
                type: '实物商品',
                stock: '库存：8件',
                desc: '人体工学设计无线鼠标，操作灵敏，续航持久。适合教师备课、制作课件等电脑办公场景，提升工作效率。'
            },
            5: {
                name: '专属称号：优秀教师',
                points: 300,
                icon: 'fa-crown',
                type: '虚拟奖品',
                stock: '虚拟奖品',
                desc: '兑换后将在个人主页显示"优秀教师"专属称号，彰显您在阅读教育中的卓越贡献。称号将永久保留，展示您的教学成就。'
            },
            6: {
                name: '专属头像框',
                points: 100,
                icon: 'fa-gift',
                type: '虚拟奖品',
                stock: '虚拟奖品',
                desc: '精美金色头像框，兑换后可在个人设置中启用。让您的头像在平台上更加醒目，展现您的活跃度和贡献度。'
            }
        };

        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('productId');

        // 加载商品信息
        function loadProductInfo() {
            const product = products[productId];

            if (!product) {
                alert('商品不存在');
                Router.back();
                return;
            }

            // 更新页面内容
            document.getElementById('productIcon').innerHTML = `<i class="fa-solid ${product.icon}"></i>`;
            document.getElementById('productName').textContent = product.name;
            document.getElementById('productPoints').textContent = `${product.points}积分`;
            document.getElementById('productType').textContent = product.type;
            document.getElementById('productStock').textContent = product.stock;
            document.getElementById('productDesc').textContent = product.desc;

            // 检查积分是否足够
            const shortage = product.points - currentPoints;
            const exchangeBtn = document.getElementById('exchangeBtn');

            if (shortage > 0) {
                // 积分不足
                exchangeBtn.disabled = true;
                exchangeBtn.textContent = '积分不足';

                // 显示积分不足提示
                const shortageHint = document.getElementById('shortageHint');
                shortageHint.className = 'shortage-hint';
                shortageHint.innerHTML = `<div class="shortage-text">还差 ${shortage} 积分即可兑换，继续努力吧！</div>`;
            }
        }

        // 处理兑换
        function handleExchange() {
            const product = products[productId];

            if (!product) {
                alert('商品不存在');
                return;
            }

            // 检查积分是否足够
            if (currentPoints < product.points) {
                alert('积分不足，无法兑换');
                return;
            }

            // 确认兑换
            if (confirm(`确认使用 ${product.points} 积分兑换「${product.name}」吗？`)) {
                // 模拟兑换成功
                alert('兑换成功！\n\n您的兑换记录已保存，请在"商品兑换记录"中查看详情。');

                // 实际应用中应该：
                // 1. 调用后端API扣除积分
                // 2. 创建兑换记录
                // 3. 更新页面显示的积分数
                // 4. 如果是实物奖品，提示填写收货地址

                // 返回商城页面
                window.location.href = '41-积分商城.html';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadProductInfo();
        });
    </script>
</body>
</html>
