<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建季度计划 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header { background: white; border-bottom: 1px solid #e8e8e8; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
        .back-btn { background: none; border: none; color: #595959; font-size: 20px; cursor: pointer; padding: 4px; }
        .back-btn:hover { color: #1890FF; }
        .header-title { font-size: 20px; font-weight: 600; color: #262626; }

        .container { max-width: 900px; margin: 0 auto; padding: 24px; }

        .form-card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); margin-bottom: 20px; }
        .section-title { font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }

        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #262626; margin-bottom: 8px; }
        .form-label .required { color: #ff4d4f; margin-left: 4px; }
        .form-input { width: 100%; border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px 12px; font-size: 14px; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #1890FF; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1); }
        .form-textarea { width: 100%; border: 1px solid #d9d9d9; border-radius: 6px; padding: 10px 12px; font-size: 14px; min-height: 100px; resize: vertical; font-family: inherit; }
        .form-textarea:focus { outline: none; border-color: #1890FF; box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1); }

        .date-group { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
        .date-separator { color: #8c8c8c; font-size: 14px; }

        .quarter-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .quarter-btn { border: 2px solid #d9d9d9; background: white; border-radius: 8px; padding: 16px; font-size: 14px; font-weight: 500; color: #595959; cursor: pointer; transition: all 0.3s; text-align: center; }
        .quarter-btn:hover { border-color: #1890FF; color: #1890FF; }
        .quarter-btn.active { border-color: #1890FF; background: #e6f7ff; color: #1890FF; }
        .quarter-icon { font-size: 24px; margin-bottom: 8px; }

        .grade-selector { display: flex; flex-wrap: wrap; gap: 12px; }
        .grade-checkbox { display: none; }
        .grade-label { border: 2px solid #d9d9d9; background: white; border-radius: 6px; padding: 8px 16px; font-size: 14px; color: #595959; cursor: pointer; transition: all 0.3s; }
        .grade-checkbox:checked + .grade-label { border-color: #1890FF; background: #e6f7ff; color: #1890FF; }

        .upload-area { border: 2px dashed #d9d9d9; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #1890FF; background: #fafafa; }
        .upload-icon { font-size: 48px; color: #d9d9d9; margin-bottom: 12px; }
        .upload-text { font-size: 14px; color: #595959; margin-bottom: 4px; }
        .upload-hint { font-size: 12px; color: #8c8c8c; }

        .form-actions { display: flex; gap: 12px; justify-content: flex-end; padding-top: 24px; border-top: 1px solid #f0f0f0; }
        .btn { border: none; border-radius: 6px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-cancel { background: white; color: #595959; border: 1px solid #d9d9d9; }
        .btn-cancel:hover { border-color: #1890FF; color: #1890FF; }
        .btn-draft { background: #f5f5f5; color: #595959; }
        .btn-draft:hover { background: #e8e8e8; }
        .btn-primary { background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%); color: white; }
        .btn-primary:hover { opacity: 0.9; }

        .help-text { font-size: 12px; color: #8c8c8c; margin-top: 4px; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="header-title" id="pageTitle">创建季度阅读计划</div>
    </div>

    <div class="container">
        <form id="planForm">
            <!-- 基本信息 -->
            <div class="form-card">
                <div class="section-title">基本信息</div>

                <div class="form-group">
                    <label class="form-label">
                        计划名称<span class="required">*</span>
                    </label>
                    <input type="text" class="form-input" id="planName" placeholder="例如：2026年春季阅读计划" required>
                </div>

                <div class="form-group">
                    <label class="form-label">季度选择</label>
                    <div class="quarter-selector">
                        <button type="button" class="quarter-btn" data-quarter="spring" onclick="selectQuarter('spring')">
                            <div class="quarter-icon">🌸</div>
                            <div>春季</div>
                        </button>
                        <button type="button" class="quarter-btn" data-quarter="summer" onclick="selectQuarter('summer')">
                            <div class="quarter-icon">☀️</div>
                            <div>夏季</div>
                        </button>
                        <button type="button" class="quarter-btn" data-quarter="autumn" onclick="selectQuarter('autumn')">
                            <div class="quarter-icon">🍂</div>
                            <div>秋季</div>
                        </button>
                        <button type="button" class="quarter-btn" data-quarter="winter" onclick="selectQuarter('winter')">
                            <div class="quarter-icon">❄️</div>
                            <div>冬季</div>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        计划时间<span class="required">*</span>
                    </label>
                    <div class="date-group">
                        <input type="date" class="form-input" id="startDate" required>
                        <span class="date-separator">至</span>
                        <input type="date" class="form-input" id="endDate" required>
                    </div>
                    <div class="help-text">建议设置为一个季度（约3个月）的时间范围</div>
                </div>

                <div class="form-group">
                    <label class="form-label">计划描述</label>
                    <textarea class="form-textarea" id="planDesc" placeholder="简要描述本季度阅读计划的目标和特色"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        封面图片<span class="required">*</span>
                    </label>
                    <div class="upload-area" id="uploadArea" onclick="document.getElementById('coverImageInput').click()">
                        <div id="uploadPlaceholder">
                            <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                            <div class="upload-text">点击上传封面图片</div>
                            <div class="upload-hint">支持 JPG、PNG 格式，建议尺寸 750x400px</div>
                        </div>
                        <div id="imagePreview" style="display: none;">
                            <img id="previewImg" style="max-width: 100%; max-height: 300px; border-radius: 8px;" alt="封面预览">
                            <div style="margin-top: 12px;">
                                <button type="button" class="btn btn-cancel" onclick="event.stopPropagation(); removeImage()">
                                    <i class="fa-solid fa-trash"></i> 删除图片
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="coverImageInput" accept="image/jpeg,image/png,image/jpg" style="display: none;" onchange="handleImageUpload(event)">
                    <div class="help-text">封面图片将在教师端和学生端展示，建议使用与季节主题相关的图片</div>
                </div>
            </div>

            <!-- 目标设置 -->
            <div class="form-card">
                <div class="section-title">目标设置</div>

                <div class="form-group">
                    <label class="form-label">预期完成书籍数</label>
                    <input type="number" class="form-input" id="booksTarget" placeholder="例如：5" min="1">
                    <div class="help-text">建议根据学生年级和阅读能力合理设置</div>
                </div>

                <div class="form-group">
                    <label class="form-label">预期总阅读时长（小时）</label>
                    <input type="number" class="form-input" id="hoursTarget" placeholder="例如：30" min="1">
                </div>

                <div class="form-group">
                    <label class="form-label">适用年级</label>
                    <div class="grade-selector">
                        <input type="checkbox" class="grade-checkbox" id="grade1" value="1">
                        <label class="grade-label" for="grade1">小学一年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade2" value="2">
                        <label class="grade-label" for="grade2">小学二年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade3" value="3">
                        <label class="grade-label" for="grade3">小学三年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade4" value="4">
                        <label class="grade-label" for="grade4">小学四年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade5" value="5">
                        <label class="grade-label" for="grade5">小学五年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade6" value="6">
                        <label class="grade-label" for="grade6">小学六年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade7" value="7">
                        <label class="grade-label" for="grade7">初中一年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade8" value="8">
                        <label class="grade-label" for="grade8">初中二年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade9" value="9">
                        <label class="grade-label" for="grade9">初中三年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade10" value="10">
                        <label class="grade-label" for="grade10">高中一年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade11" value="11">
                        <label class="grade-label" for="grade11">高中二年级</label>

                        <input type="checkbox" class="grade-checkbox" id="grade12" value="12">
                        <label class="grade-label" for="grade12">高中三年级</label>
                    </div>
                </div>
            </div>

            <!-- 封面图片 -->
            <div class="form-card">
                <div class="section-title">封面图片（可选）</div>

                <div class="upload-area" onclick="document.getElementById('coverInput').click()">
                    <div class="upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                    <div class="upload-text">点击上传封面图片</div>
                    <div class="upload-hint">支持 JPG、PNG 格式，建议尺寸 1200x600</div>
                    <input type="file" id="coverInput" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="form-card">
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="goBack()">取消</button>
                    <button type="button" class="btn btn-draft" onclick="saveDraft()">保存草稿</button>
                    <button type="submit" class="btn btn-primary">下一步：添加书籍</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        let selectedQuarter = null;
        let isEditMode = false;
        let currentPlanId = null;
        let coverImageFile = null;
        let coverImageUrl = null;

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            // 检查是否为编辑模式
            const urlParams = new URLSearchParams(window.location.search);
            currentPlanId = urlParams.get('id');

            if (currentPlanId) {
                isEditMode = true;
                document.getElementById('pageTitle').textContent = '编辑季度阅读计划';
                loadPlanData(currentPlanId);
            }

            // 设置默认日期
            setDefaultDates();
        });

        // 设置默认日期（当前日期后的一个季度）
        function setDefaultDates() {
            const today = new Date();
            const startDate = new Date(today);
            startDate.setDate(1); // 设置为月初
            startDate.setMonth(startDate.getMonth() + 1); // 下个月开始

            const endDate = new Date(startDate);
            endDate.setMonth(endDate.getMonth() + 3); // 3个月后
            endDate.setDate(0); // 设置为月末

            document.getElementById('startDate').valueAsDate = startDate;
            document.getElementById('endDate').valueAsDate = endDate;
        }

        // 加载计划数据（编辑模式）
        function loadPlanData(id) {
            // 实际应从后端加载数据
            // 这里使用模拟数据
            const mockData = {
                name: '2026年春季阅读计划',
                quarter: 'spring',
                startDate: '2026-03-01',
                endDate: '2026-05-31',
                description: '春季学期阅读计划，重点培养学生的阅读兴趣',
                booksTarget: 5,
                hoursTarget: 30,
                grades: [7, 8, 9]
            };

            document.getElementById('planName').value = mockData.name;
            document.getElementById('startDate').value = mockData.startDate;
            document.getElementById('endDate').value = mockData.endDate;
            document.getElementById('planDesc').value = mockData.description;
            document.getElementById('booksTarget').value = mockData.booksTarget;
            document.getElementById('hoursTarget').value = mockData.hoursTarget;

            selectQuarter(mockData.quarter);

            mockData.grades.forEach(grade => {
                const checkbox = document.getElementById(`grade${grade}`);
                if (checkbox) checkbox.checked = true;
            });
        }

        // 选择季度
        function selectQuarter(quarter) {
            // 移除所有active类
            document.querySelectorAll('.quarter-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 添加active类到选中的按钮
            const selectedBtn = document.querySelector(`[data-quarter="${quarter}"]`);
            if (selectedBtn) {
                selectedBtn.classList.add('active');
                selectedQuarter = quarter;
            }
        }

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                // 实际应上传到服务器
                alert(`已选择文件：${file.name}`);
            }
        }

        // 保存草稿
        function saveDraft() {
            const formData = collectFormData();
            if (!formData) return;

            // 实际应调用API保存
            alert('草稿保存成功');
            window.location.href = '01-季度计划列表.html';
        }

        // 收集表单数据
        function collectFormData() {
            const planName = document.getElementById('planName').value.trim();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!planName) {
                alert('请输入计划名称');
                return null;
            }

            if (!startDate || !endDate) {
                alert('请选择计划时间');
                return null;
            }

            if (new Date(startDate) >= new Date(endDate)) {
                alert('结束日期必须晚于开始日期');
                return null;
            }

            const selectedGrades = [];
            document.querySelectorAll('.grade-checkbox:checked').forEach(checkbox => {
                selectedGrades.push(parseInt(checkbox.value));
            });

            return {
                name: planName,
                quarter: selectedQuarter,
                startDate: startDate,
                endDate: endDate,
                description: document.getElementById('planDesc').value.trim(),
                booksTarget: document.getElementById('booksTarget').value,
                hoursTarget: document.getElementById('hoursTarget').value,
                grades: selectedGrades
            };
        }

        // 表单提交
        document.getElementById('planForm').addEventListener('submit', (e) => {
            e.preventDefault();

            // 验证封面图片
            if (!coverImageFile && !coverImageUrl) {
                alert('请上传封面图片');
                return;
            }

            const formData = collectFormData();
            if (!formData) return;

            // 添加封面图片数据
            formData.coverImage = coverImageUrl;
            formData.coverImageFile = coverImageFile;

            // 实际应调用API保存
            console.log('表单数据：', formData);

            // 跳转到书籍管理页面
            if (isEditMode) {
                window.location.href = `03-书籍管理.html?planId=${currentPlanId}`;
            } else {
                // 新建模式，使用临时ID
                window.location.href = '03-书籍管理.html?planId=new';
            }
        });

        // 返回
        // 处理图片上传
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 验证文件类型
            if (!file.type.match('image/(jpeg|jpg|png)')) {
                alert('请上传 JPG 或 PNG 格式的图片');
                return;
            }

            // 验证文件大小（限制5MB）
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB');
                return;
            }

            coverImageFile = file;

            // 预览图片
            const reader = new FileReader();
            reader.onload = function(e) {
                coverImageUrl = e.target.result;
                document.getElementById('previewImg').src = coverImageUrl;
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('imagePreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 删除图片
        function removeImage() {
            coverImageFile = null;
            coverImageUrl = null;
            document.getElementById('coverImageInput').value = '';
            document.getElementById('uploadPlaceholder').style.display = 'block';
            document.getElementById('imagePreview').style.display = 'none';
        }

        function goBack() {
            if (confirm('确定要离开吗？未保存的更改将丢失')) {
                window.location.href = '01-季度计划列表.html';
            }
        }
    </script>
</body>
</html>
