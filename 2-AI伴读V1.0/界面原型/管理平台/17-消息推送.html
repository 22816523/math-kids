<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息推送 - 校校读吧小管家管理平台</title>
    <link rel="stylesheet" href="common/admin-common.css">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <div class="sidebar-header"></div>
            <div class="sidebar-menu"></div>
        </div>

        <div class="admin-main">
            <div class="admin-header"></div>

            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">消息推送</h1>
                    <p class="page-description">向学生和教师推送通知消息</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">创建推送</h3>
                    </div>
                    <div class="card-body">
                        <form id="pushForm">
                            <div class="form-group">
                                <label class="form-label">推送类型 <span class="required">*</span></label>
                                <select class="form-select" required>
                                    <option value="">请选择推送类型</option>
                                    <option>系统通知</option>
                                    <option>活动公告</option>
                                    <option>阅读提醒</option>
                                    <option>成绩通知</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">推送对象 <span class="required">*</span></label>
                                <div style="display: flex; gap: 16px; margin-bottom: 12px;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="target" value="all" checked>
                                        <span>全部用户</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="target" value="school">
                                        <span>指定学校</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="target" value="class">
                                        <span>指定班级</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="target" value="user">
                                        <span>指定用户</span>
                                    </label>
                                </div>
                                <select class="form-select">
                                    <option value="">请选择目标</option>
                                    <option>示范中学</option>
                                    <option>实验小学</option>
                                    <option>第一中学</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">消息标题 <span class="required">*</span></label>
                                <input type="text" class="form-input" placeholder="请输入消息标题" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">消息内容 <span class="required">*</span></label>
                                <textarea class="form-textarea" placeholder="请输入消息内容" rows="6" required></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">推送时间 <span class="required">*</span></label>
                                <div style="display: flex; gap: 16px; margin-bottom: 12px;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="time" value="now" checked>
                                        <span>立即推送</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="radio" name="time" value="schedule">
                                        <span>定时推送</span>
                                    </label>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                    <input type="date" class="form-input">
                                    <input type="time" class="form-input">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">推送渠道</label>
                                <div style="display: flex; gap: 16px;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" checked>
                                        <span>应用内通知</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>短信通知</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>邮件通知</span>
                                    </label>
                                </div>
                            </div>

                            <div style="display: flex; gap: 12px;">
                                <button type="submit" class="btn btn-primary">发送推送</button>
                                <button type="button" class="btn btn-secondary">保存草稿</button>
                                <button type="button" class="btn btn-secondary">预览</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">快速模板</h3>
                    </div>
                    <div class="card-body">
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(1)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-book"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">阅读打卡提醒</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">提醒学生完成今日阅读打卡</div>
                            </div>

                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(2)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-circle-check"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">测评完成通知</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">通知学生测评成绩已发布</div>
                            </div>

                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(3)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-face-smile"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">活动通知</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">发布阅读活动和比赛信息</div>
                            </div>

                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(4)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-trophy"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">成就获得</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">通知学生获得新勋章或等级</div>
                            </div>

                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(5)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-bullhorn"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">系统公告</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">发布系统更新和维护通知</div>
                            </div>

                            <div class="card" style="padding: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #f0f0f0;" onmouseover="this.style.borderColor='#1890FF'" onmouseout="this.style.borderColor='#f0f0f0'" onclick="useTemplate(6)">
                                <div style="font-size: 32px; text-align: center; margin-bottom: 12px;"><i class="fa-solid fa-star"></i></div>
                                <div style="font-size: 16px; font-weight: 600; color: #262626; text-align: center; margin-bottom: 8px;">积分变动</div>
                                <div style="font-size: 13px; color: #8c8c8c; text-align: center;">通知学生积分获得或消耗</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="common/admin-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            pageManager.renderHeader(['消息通知', '消息推送']);
        });

        document.getElementById('pushForm').addEventListener('submit', function(e) {
            e.preventDefault();
            showToast('消息推送成功');
            this.reset();
        });

        function useTemplate(id) {
            showToast('已应用模板', 'info');
        }
    </script>
</body>
</html>
