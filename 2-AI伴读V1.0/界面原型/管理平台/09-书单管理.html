                            </div>
                            <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 12px;">创建时间：2026-01-02</div>
                            <div style="display: flex; gap: 8px;">

                        <div style="position: relative; width: 100%; height: 200px; background: linear-gradient(135deg, #722ed1, #9254de); border-radius: 8px; padding: 24px; margin-bottom: 16px; overflow: hidden;">

                            </div>
                        </div>
                    </div>
                </div>

                <div class="pagination">
                    <div class="pagination-item disabled">上一页</div>

                    <div class="pagination-item">2</div>
                    <div class="pagination-item">下一页</div>
                </div>
            </div>

    <div class="modal-overlay" id="addBooklistModal" style="display: none;">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title">创建书单</h3>
                <span class="modal-close" onclick="hideModal('addBooklistModal')">×</span>
            </div>
            <div class="modal-body">
                <form id="addBooklistForm">
                    <div class="form-group">
                        <label class="form-label">书单名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="请输入书单名称" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">书单描述 <span class="required">*</span></label>
                        <textarea class="form-textarea" placeholder="请输入书单描述" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">学科分类 <span class="required">*</span></label>
                        <select class="form-select" required>
                            <option value="">请选择学科</option>
                            <option>语文</option>
                            <option>数学</option>
                            <option>英语</option>
                            <option>科学</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">适用年级</label>
                        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">
                                <span>一年级</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">
                                <span>二年级</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">
                                <span>三年级</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">
                                <span>四年级</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">
                                <span>五年级</span>
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                <input type="checkbox">

                            </label>
                        </div>

    <script src="common/admin-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            pageManager.renderHeader(['内容管理', '推荐书单']);
        });

        function viewBooklist(id) {
            showToast('查看书单详情功能开发中', 'info');
        }

        function editBooklist(id) {
            showToast('编辑书单功能开发中', 'info');
        }

        function deleteBooklist(id) {
            showConfirm('确定要删除这个书单吗？', () => {
                showToast('删除成功');
            });
        }

        function saveDraft() {
            hideModal('addBooklistModal');
            showToast('草稿保存成功');
        }

        function submitAddBooklist() {
            const form = document.getElementById('addBooklistForm');
            if (form.checkValidity()) {
                hideModal('addBooklistModal');
                showToast('书单发布成功');
                form.reset();
            } else {
                form.reportValidity();
            }
        }
    </script>
