<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>季度阅读计划 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header { background: white; border-bottom: 1px solid #e8e8e8; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 20px; font-weight: 600; color: #262626; }
        .create-btn { background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%); color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .create-btn:hover { opacity: 0.9; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .filter-bar { background: white; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 16px; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-label { font-size: 14px; color: #595959; }
        .filter-select { border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px 12px; font-size: 14px; color: #262626; cursor: pointer; }
        .search-box { flex: 1; max-width: 300px; }
        .search-input { width: 100%; border: 1px solid #d9d9d9; border-radius: 4px; padding: 6px 12px; font-size: 14px; }

        .plans-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }

        .plan-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); transition: all 0.3s; cursor: pointer; }
        .plan-card:hover { box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12); transform: translateY(-2px); }

        .plan-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .plan-title { font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 8px; }
        .plan-status { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-draft { background: #f0f0f0; color: #595959; }
        .status-published { background: #e6f7ff; color: #1890FF; }
        .status-ended { background: #f5f5f5; color: #8c8c8c; }

        .plan-date { font-size: 14px; color: #8c8c8c; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

        .plan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; padding: 12px; background: #fafafa; border-radius: 8px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 600; color: #1890FF; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: #8c8c8c; }

        .plan-actions { display: flex; gap: 8px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
        .action-btn { flex: 1; border: 1px solid #d9d9d9; background: white; border-radius: 6px; padding: 8px; font-size: 13px; color: #595959; cursor: pointer; transition: all 0.2s; }
        .action-btn:hover { border-color: #1890FF; color: #1890FF; }
        .action-btn.primary { background: #1890FF; color: white; border-color: #1890FF; }
        .action-btn.primary:hover { background: #096DD9; }
        .action-btn.danger { color: #ff4d4f; }
        .action-btn.danger:hover { border-color: #ff4d4f; background: #fff1f0; }

        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.3; }
        .empty-text { font-size: 16px; color: #8c8c8c; margin-bottom: 24px; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="header-title">季度阅读计划管理</div>
        <button class="create-btn" onclick="createPlan()">
            <i class="fa-solid fa-plus"></i> 创建新计划
        </button>
    </div>

    <div class="container">
        <div class="filter-bar">
            <div class="filter-group">
                <span class="filter-label">状态</span>
                <select class="filter-select" id="statusFilter" onchange="filterPlans()">
                    <option value="all">全部</option>
                    <option value="draft">草稿</option>
                    <option value="published">已发布</option>
                    <option value="ended">已结束</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">年份</span>
                <select class="filter-select" id="yearFilter" onchange="filterPlans()">
                    <option value="all">全部</option>
                    <option value="2024">2024年</option>
                    <option value="2025">2025年</option>
                    <option value="2026" selected>2026年</option>
                </select>
            </div>
            <div class="search-box">
                <input type="text" class="search-input" placeholder="搜索计划名称" id="searchInput" oninput="filterPlans()">
            </div>
        </div>

        <div class="plans-grid" id="plansGrid">
            <!-- 计划卡片将通过JavaScript动态生成 -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📚</div>
            <div class="empty-text">还没有创建任何季度阅读计划</div>
            <button class="create-btn" onclick="createPlan()">
                <i class="fa-solid fa-plus"></i> 创建第一个计划
            </button>
        </div>
    </div>

    <script>
        // 模拟数据
        const mockPlans = [
            {
                id: 1,
                name: '2026年春季阅读计划',
                startDate: '2026-03-01',
                endDate: '2026-05-31',
                status: 'published',
                booksCount: 5,
                levelsCount: 25,
                classesCount: 12
            },
            {
                id: 2,
                name: '2026年夏季阅读计划',
                startDate: '2026-06-01',
                endDate: '2026-08-31',
                status: 'draft',
                booksCount: 4,
                levelsCount: 20,
                classesCount: 0
            },
            {
                id: 3,
                name: '2025年秋季阅读计划',
                startDate: '2025-09-01',
                endDate: '2025-11-30',
                status: 'ended',
                booksCount: 6,
                levelsCount: 30,
                classesCount: 15
            },
            {
                id: 4,
                name: '2026年秋季阅读计划',
                startDate: '2026-09-01',
                endDate: '2026-11-30',
                status: 'draft',
                booksCount: 3,
                levelsCount: 15,
                classesCount: 0
            }
        ];

        let allPlans = [...mockPlans];

        // 初始化页面
        function initPage() {
            renderPlans(allPlans);
        }

        // 渲染计划列表
        function renderPlans(plans) {
            const grid = document.getElementById('plansGrid');
            const emptyState = document.getElementById('emptyState');

            if (plans.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = plans.map(plan => `
                <div class="plan-card" onclick="viewPlan(${plan.id})">
                    <div class="plan-header">
                        <div>
                            <div class="plan-title">${plan.name}</div>
                            <div class="plan-date">
                                <i class="fa-solid fa-calendar"></i>
                                ${plan.startDate} 至 ${plan.endDate}
                            </div>
                        </div>
                        <span class="plan-status ${getStatusClass(plan.status)}">
                            ${getStatusText(plan.status)}
                        </span>
                    </div>

                    <div class="plan-stats">
                        <div class="stat-item">
                            <div class="stat-value">${plan.booksCount}</div>
                            <div class="stat-label">书籍数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${plan.levelsCount}</div>
                            <div class="stat-label">关卡数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${plan.classesCount}</div>
                            <div class="stat-label">班级数</div>
                        </div>
                    </div>

                    <div class="plan-actions" onclick="event.stopPropagation()">
                        <button class="action-btn primary" onclick="editPlan(${plan.id})">
                            <i class="fa-solid fa-edit"></i> 编辑
                        </button>
                        ${plan.status === 'draft' ? `
                            <button class="action-btn" onclick="publishPlan(${plan.id})">
                                <i class="fa-solid fa-paper-plane"></i> 发布
                            </button>
                        ` : ''}
                        ${plan.status === 'published' ? `
                            <button class="action-btn" onclick="unpublishPlan(${plan.id})">
                                <i class="fa-solid fa-ban"></i> 取消发布
                            </button>
                        ` : ''}
                        <button class="action-btn" onclick="copyPlan(${plan.id})">
                            <i class="fa-solid fa-copy"></i> 复制
                        </button>
                        <button class="action-btn danger" onclick="deletePlan(${plan.id})">
                            <i class="fa-solid fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const classMap = {
                draft: 'status-draft',
                published: 'status-published',
                ended: 'status-ended'
            };
            return classMap[status] || 'status-draft';
        }

        // 获取状态文本
        function getStatusText(status) {
            const textMap = {
                draft: '草稿',
                published: '已发布',
                ended: '已结束'
            };
            return textMap[status] || '未知';
        }

        // 筛选计划
        function filterPlans() {
            const statusFilter = document.getElementById('statusFilter').value;
            const yearFilter = document.getElementById('yearFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allPlans.filter(plan => {
                // 状态筛选
                if (statusFilter !== 'all' && plan.status !== statusFilter) {
                    return false;
                }

                // 年份筛选
                if (yearFilter !== 'all') {
                    const planYear = plan.startDate.substring(0, 4);
                    if (planYear !== yearFilter) {
                        return false;
                    }
                }

                // 搜索筛选
                if (searchText && !plan.name.toLowerCase().includes(searchText)) {
                    return false;
                }

                return true;
            });

            renderPlans(filtered);
        }

        // 创建新计划
        function createPlan() {
            window.location.href = '02-创建季度计划.html';
        }

        // 查看计划详情
        function viewPlan(id) {
            window.location.href = `03-书籍管理.html?planId=${id}`;
        }

        // 编辑计划
        function editPlan(id) {
            window.location.href = `02-创建季度计划.html?id=${id}`;
        }

        // 发布计划
        function publishPlan(id) {
            if (confirm('确定要发布这个计划吗？发布后学生将可以看到')) {
                alert('计划发布成功');
                // 实际应调用API
                const plan = allPlans.find(p => p.id === id);
                if (plan) {
                    plan.status = 'published';
                    renderPlans(allPlans);
                }
            }
        }

        // 取消发布
        function unpublishPlan(id) {
            if (confirm('确定要取消发布吗？学生将无法继续访问')) {
                alert('已取消发布');
                const plan = allPlans.find(p => p.id === id);
                if (plan) {
                    plan.status = 'draft';
                    renderPlans(allPlans);
                }
            }
        }

        // 复制计划
        function copyPlan(id) {
            if (confirm('确定要复制这个计划吗')) {
                alert('计划复制成功');
                // 实际应调用API创建副本
            }
        }

        // 删除计划
        function deletePlan(id) {
            if (confirm('确定要删除这个计划吗？此操作不可恢复')) {
                alert('计划已删除');
                allPlans = allPlans.filter(p => p.id !== id);
                renderPlans(allPlans);
            }
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
