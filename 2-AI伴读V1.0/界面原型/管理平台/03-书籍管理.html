<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍管理 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }

        .header { background: white; border-bottom: 1px solid #e8e8e8; padding: 16px 24px; }
        .header-top { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
        .back-btn { background: none; border: none; color: #595959; font-size: 20px; cursor: pointer; padding: 4px; }
        .back-btn:hover { color: #1890FF; }
        .header-title { font-size: 20px; font-weight: 600; color: #262626; }
        .breadcrumb { font-size: 14px; color: #8c8c8c; }
        .breadcrumb-link { color: #1890FF; text-decoration: none; cursor: pointer; }
        .breadcrumb-link:hover { text-decoration: underline; }

        .container { display: grid; grid-template-columns: 400px 1fr; gap: 20px; padding: 24px; max-width: 1600px; margin: 0 auto; height: calc(100vh - 120px); }

        /* 左侧：已添加书籍列表 */
        .left-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); display: flex; flex-direction: column; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .panel-title { font-size: 16px; font-weight: 600; color: #262626; }
        .book-count { font-size: 14px; color: #8c8c8c; }

        .books-list { flex: 1; overflow-y: auto; }
        .book-item { border: 2px solid #f0f0f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; cursor: move; transition: all 0.3s; }
        .book-item:hover { border-color: #1890FF; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15); }
        .book-item.dragging { opacity: 0.5; }

        .book-header { display: flex; gap: 12px; margin-bottom: 8px; }
        .book-order { width: 32px; height: 32px; background: linear-gradient(135deg, #1890FF, #096DD9); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
        .book-cover { width: 48px; height: 64px; border-radius: 4px; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        .book-info { flex: 1; min-width: 0; }
        .book-title { font-size: 14px; font-weight: 600; color: #262626; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .book-author { font-size: 12px; color: #8c8c8c; }

        .book-meta { display: flex; gap: 12px; margin-bottom: 8px; font-size: 12px; color: #595959; }
        .book-meta-item { display: flex; align-items: center; gap: 4px; }

        .book-actions { display: flex; gap: 8px; }
        .book-action-btn { flex: 1; border: 1px solid #d9d9d9; background: white; border-radius: 4px; padding: 6px; font-size: 12px; color: #595959; cursor: pointer; transition: all 0.2s; }
        .book-action-btn:hover { border-color: #1890FF; color: #1890FF; }
        .book-action-btn.danger:hover { border-color: #ff4d4f; color: #ff4d4f; }

        .empty-books { text-align: center; padding: 60px 20px; color: #8c8c8c; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

        /* 右侧：书籍库 */
        .right-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); display: flex; flex-direction: column; }

        .search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .search-input { flex: 1; border: 1px solid #d9d9d9; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
        .search-btn { background: #1890FF; color: white; border: none; border-radius: 6px; padding: 8px 20px; font-size: 14px; cursor: pointer; }
        .search-btn:hover { opacity: 0.9; }

        .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-tab { border: 1px solid #d9d9d9; background: white; border-radius: 6px; padding: 6px 16px; font-size: 13px; color: #595959; cursor: pointer; transition: all 0.2s; }
        .filter-tab:hover { border-color: #1890FF; color: #1890FF; }
        .filter-tab.active { border-color: #1890FF; background: #e6f7ff; color: #1890FF; }

        .library-list { flex: 1; overflow-y: auto; }
        .library-item { border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; display: flex; gap: 16px; transition: all 0.3s; }
        .library-item:hover { border-color: #1890FF; box-shadow: 0 2px 8px rgba(24, 144, 255, 0.1); }

        .library-cover { width: 80px; height: 106px; border-radius: 6px; object-fit: cover; background: #f0f0f0; flex-shrink: 0; }
        .library-info { flex: 1; min-width: 0; }
        .library-title { font-size: 16px; font-weight: 600; color: #262626; margin-bottom: 6px; }
        .library-author { font-size: 14px; color: #595959; margin-bottom: 8px; }
        .library-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .library-tag { background: #f0f0f0; color: #595959; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .library-desc { font-size: 13px; color: #8c8c8c; line-height: 1.6; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .library-action { display: flex; align-items: center; }
        .add-btn { background: #1890FF; color: white; border: none; border-radius: 6px; padding: 8px 20px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .add-btn:hover { opacity: 0.9; }
        .add-btn:disabled { background: #d9d9d9; cursor: not-allowed; }

        /* 底部操作栏 */
        .footer-actions { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e8e8e8; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
        .footer-info { font-size: 14px; color: #595959; }
        .footer-buttons { display: flex; gap: 12px; }
        .btn { border: none; border-radius: 6px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-cancel { background: white; color: #595959; border: 1px solid #d9d9d9; }
        .btn-cancel:hover { border-color: #1890FF; color: #1890FF; }
        .btn-primary { background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%); color: white; }
        .btn-primary:hover { opacity: 0.9; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="goBack()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-title">书籍管理</div>
        </div>
        <div class="breadcrumb">
            <a class="breadcrumb-link" onclick="goBack()">季度计划</a>
            <span> / </span>
            <span id="planName">2026年春季阅读计划</span>
            <span> / </span>
            <span>书籍管理</span>
        </div>
    </div>

    <div class="container">
        <!-- 左侧：已添加书籍列表 -->
        <div class="left-panel">
            <div class="panel-header">
                <div class="panel-title">已添加书籍</div>
                <div class="book-count">共 <span id="bookCount">0</span> 本</div>
            </div>

            <div class="books-list" id="booksList">
                <div class="empty-books">
                    <div class="empty-icon">📚</div>
                    <div>还没有添加书籍</div>
                    <div style="font-size: 12px; margin-top: 8px;">从右侧书籍库中选择添加</div>
                </div>
            </div>
        </div>

        <!-- 右侧：书籍库 -->
        <div class="right-panel">
            <div class="panel-header">
                <div class="panel-title">书籍库</div>
            </div>

            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索书名、作者、ISBN" oninput="searchBooks()">
                <button class="search-btn" onclick="searchBooks()">
                    <i class="fa-solid fa-search"></i> 搜索
                </button>
            </div>

            <div class="filter-tabs">
                <button class="filter-tab active" data-grade="all" onclick="filterByGrade('all')">全部</button>
                <button class="filter-tab" data-grade="primary" onclick="filterByGrade('primary')">小学</button>
                <button class="filter-tab" data-grade="middle" onclick="filterByGrade('middle')">初中</button>
                <button class="filter-tab" data-grade="high" onclick="filterByGrade('high')">高中</button>
            </div>

            <div class="library-list" id="libraryList">
                <!-- 书籍列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <div class="footer-actions">
        <div class="footer-info">
            提示：拖拽左侧书籍可调整阅读顺序
        </div>
        <div class="footer-buttons">
            <button class="btn btn-cancel" onclick="goBack()">上一步</button>
            <button class="btn btn-primary" onclick="nextStep()">保存并继续</button>
        </div>
    </div>

    <script>
        // 模拟书籍库数据
        const mockLibrary = [
            { id: 1, title: '三体', author: '刘慈欣', grade: 'high', pages: 302, category: '科幻', desc: '地球文明向宇宙发出第一声啼鸣，取得了文明的联系，但也暴露了地球的位置', cover: '' },
            { id: 2, title: '活着', author: '余华', grade: 'high', pages: 191, category: '文学', desc: '讲述了一个人和他命运之间的友谊，这是最为感人的友谊', cover: '' },
            { id: 3, title: '平凡的世界', author: '路遥', grade: 'high', pages: 1068, category: '文学', desc: '全景式地表现了改革时代中国城乡的社会生活和人们思想情感的巨大变迁', cover: '' },
            { id: 4, title: '西游记', author: '吴承恩', grade: 'middle', pages: 856, category: '古典名著', desc: '中国古代第一部浪漫主义章回体长篇神魔小说', cover: '' },
            { id: 5, title: '骆驼祥子', author: '老舍', grade: 'middle', pages: 224, category: '文学', desc: '描写了20年代军阀混战时期人力车夫的悲惨命运', cover: '' },
            { id: 6, title: '小王子', author: '圣埃克苏佩里', grade: 'primary', pages: 96, category: '童话', desc: '一个永恒的童话，讲述了小王子从自己星球出发前往地球的过程中', cover: '' },
            { id: 7, title: '夏洛的网', author: 'E·B·怀特', grade: 'primary', pages: 171, category: '童话', desc: '一个关于友谊的故事，讲述了小猪威尔伯和蜘蛛夏洛之间真挚的友谊', cover: '' },
            { id: 8, title: '草房子', author: '曹文轩', grade: 'primary', pages: 308, category: '儿童文学', desc: '讲述了男孩桑桑刻骨铭心、终身难忘的六年小学生活', cover: '' }
        ];

        let addedBooks = [];
        let filteredLibrary = [...mockLibrary];
        let currentFilter = 'all';

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const planId = urlParams.get('planId');

            if (planId && planId !== 'new') {
                // 加载已有计划的书籍
                loadPlanBooks(planId);
            }

            renderLibrary();
            initDragAndDrop();
        });

        // 加载计划的书籍
        function loadPlanBooks(planId) {
            // 实际应从后端加载
            // 这里使用模拟数据
            addedBooks = [
                { ...mockLibrary[0], order: 1, levelsCount: 5 },
                { ...mockLibrary[1], order: 2, levelsCount: 4 }
            ];
            renderAddedBooks();
        }

        // 渲染已添加书籍列表
        function renderAddedBooks() {
            const booksList = document.getElementById('booksList');
            document.getElementById('bookCount').textContent = addedBooks.length;

            if (addedBooks.length === 0) {
                booksList.innerHTML = `
                    <div class="empty-books">
                        <div class="empty-icon">📚</div>
                        <div>还没有添加书籍</div>
                        <div style="font-size: 12px; margin-top: 8px;">从右侧书籍库中选择添加</div>
                    </div>
                `;
                return;
            }

            booksList.innerHTML = addedBooks.map((book, index) => `
                <div class="book-item" draggable="true" data-id="${book.id}">
                    <div class="book-header">
                        <div class="book-order">${index + 1}</div>
                        <div class="book-cover"></div>
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-author">${book.author}</div>
                        </div>
                    </div>
                    <div class="book-meta">
                        <div class="book-meta-item">
                            <i class="fa-solid fa-book"></i>
                            <span>${book.pages}页</span>
                        </div>
                        <div class="book-meta-item">
                            <i class="fa-solid fa-gamepad"></i>
                            <span>${book.levelsCount || 0}个关卡</span>
                        </div>
                    </div>
                    <div class="book-actions">
                        <button class="book-action-btn" onclick="designLevels(${book.id})">
                            <i class="fa-solid fa-gamepad"></i> 设计关卡
                        </button>
                        <button class="book-action-btn danger" onclick="removeBook(${book.id})">
                            <i class="fa-solid fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `).join('');

            initDragAndDrop();
        }

        // 渲染书籍库
        function renderLibrary() {
            const libraryList = document.getElementById('libraryList');

            libraryList.innerHTML = filteredLibrary.map(book => {
                const isAdded = addedBooks.some(b => b.id === book.id);

                return `
                    <div class="library-item">
                        <div class="library-cover"></div>
                        <div class="library-info">
                            <div class="library-title">${book.title}</div>
                            <div class="library-author">${book.author}</div>
                            <div class="library-tags">
                                <span class="library-tag">${book.category}</span>
                                <span class="library-tag">${book.pages}页</span>
                            </div>
                            <div class="library-desc">${book.desc}</div>
                        </div>
                        <div class="library-action">
                            <button class="add-btn" onclick="addBook(${book.id})" ${isAdded ? 'disabled' : ''}>
                                ${isAdded ? '已添加' : '+ 添加'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 添加书籍
        function addBook(bookId) {
            const book = mockLibrary.find(b => b.id === bookId);
            if (!book) return;

            if (addedBooks.some(b => b.id === bookId)) {
                alert('该书籍已添加');
                return;
            }

            addedBooks.push({
                ...book,
                order: addedBooks.length + 1,
                levelsCount: 0
            });

            renderAddedBooks();
            renderLibrary();
        }

        // 删除书籍
        function removeBook(bookId) {
            if (confirm('确定要删除这本书吗？关卡配置也将被删除')) {
                addedBooks = addedBooks.filter(b => b.id !== bookId);
                renderAddedBooks();
                renderLibrary();
            }
        }

        // 设计关卡
        function designLevels(bookId) {
            const book = addedBooks.find(b => b.id === bookId);
            if (!book) return;

            window.location.href = `04-关卡设计器.html?bookId=${bookId}`;
        }

        // 按年级筛选
        function filterByGrade(grade) {
            currentFilter = grade;

            // 更新tab样式
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-grade="${grade}"]`).classList.add('active');

            // 筛选书籍
            if (grade === 'all') {
                filteredLibrary = [...mockLibrary];
            } else {
                filteredLibrary = mockLibrary.filter(book => book.grade === grade);
            }

            renderLibrary();
        }

        // 搜索书籍
        function searchBooks() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();

            if (!searchText) {
                filterByGrade(currentFilter);
                return;
            }

            filteredLibrary = mockLibrary.filter(book => {
                return book.title.toLowerCase().includes(searchText) ||
                       book.author.toLowerCase().includes(searchText);
            });

            renderLibrary();
        }

        // 初始化拖拽功能
        function initDragAndDrop() {
            const bookItems = document.querySelectorAll('.book-item');
            let draggedElement = null;

            bookItems.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', (e) => {
                    item.classList.remove('dragging');
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const afterElement = getDragAfterElement(e.clientY);
                    const booksList = document.getElementById('booksList');

                    if (afterElement == null) {
                        booksList.appendChild(draggedElement);
                    } else {
                        booksList.insertBefore(draggedElement, afterElement);
                    }
                });
            });
        }

        function getDragAfterElement(y) {
            const draggableElements = [...document.querySelectorAll('.book-item:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;

                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 下一步
        function nextStep() {
            if (addedBooks.length === 0) {
                alert('请至少添加一本书籍');
                return;
            }

            // 保存书籍顺序
            const booksList = document.getElementById('booksList');
            const bookElements = booksList.querySelectorAll('.book-item');
            const newOrder = [];

            bookElements.forEach((element, index) => {
                const bookId = parseInt(element.dataset.id);
                const book = addedBooks.find(b => b.id === bookId);
                if (book) {
                    book.order = index + 1;
                    newOrder.push(book);
                }
            });

            addedBooks = newOrder;

            // 实际应调用API保存
            alert('书籍保存成功！接下来可以为每本书设计关卡');

            // 跳转到第一本书的关卡设计器
            if (addedBooks.length > 0) {
                designLevels(addedBooks[0].id);
            }
        }

        // 返回
        function goBack() {
            if (confirm('确定要返回吗？未保存的更改将丢失')) {
                window.location.href = '01-季度计划列表.html';
            }
        }
    </script>
</body>
</html>
