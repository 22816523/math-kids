<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理 - 校校读吧小管家管理平台</title>
    <link rel="stylesheet" href="common/admin-common.css">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <div class="admin-sidebar">
            <div class="sidebar-header"></div>
            <div class="sidebar-menu"></div>
        </div>

        <!-- 主内容区域 -->
        <div class="admin-main">
            <!-- 顶部导航栏 -->
            <div class="admin-header"></div>

            <!-- 内容区域 -->
            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">班级管理</h1>
                    <p class="page-description">管理系统中的所有班级和阅读计划</p>
                </div>

                <!-- 操作栏 -->
                <div class="action-bar">
                    <div class="action-left">
                        <button class="btn btn-primary" onclick="showModal('addClassModal')">
                            <span><i class="fa-solid fa-plus"></i></span>
                            <span>创建班级</span>
                        </button>
                        <button class="btn btn-secondary">
                            <span><i class="fa-solid fa-upload"></i></span>
                            <span>导出数据</span>
                        </button>
                    </div>
                    <div class="action-right">
                        <div class="search-bar">
                            <input type="text" class="form-input search-input" placeholder="搜索班级名称..." id="searchInput">
                            <button class="btn btn-primary">搜索</button>
                        </div>
                    </div>
                </div>

                <!-- 筛选栏 -->
                <div class="card">
                    <div class="card-body">
                        <div style="display: flex; gap: 16px; align-items: center;">
                            <div style="font-size: 14px; color: #595959;">筛选条件：</div>
                            <select class="form-select" style="width: 150px;">
                                <option>全部学校</option>
                                <option>示范中学</option>
                                <option>实验小学</option>
                                <option>第一中学</option>
                            </select>
                            <select class="form-select" style="width: 150px;">
                                <option>全部年级</option>
                                <option>初一</option>
                                <option>初二</option>
                                <option>初三</option>
                            </select>
                            <select class="form-select" style="width: 150px;">
                                <option>全部状态</option>
                                <option>活跃</option>
                                <option>归档</option>
                            </select>
                            <button class="btn btn-text" onclick="resetFilters()">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 班级卡片列表 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;">
                    <!-- 班级卡片 1 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #1890FF, #096DD9); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;">3</div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">初一(3)班</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">示范中学</p>
                                </div>
                            </div>
                            <span class="tag tag-green">活跃</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">52</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">3</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">阅读计划</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">92%</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">打卡率</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">班主任</div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #1890FF, #096DD9); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;">张</div>
                                    <span style="font-size: 14px; color: #262626;">张老师</span>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewClass(1)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editClass(1)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteClass(1)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 班级卡片 2 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #52c41a, #73d13d); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;">1</div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">初二(1)班</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">示范中学</p>
                                </div>
                            </div>
                            <span class="tag tag-green">活跃</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">48</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">5</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">阅读计划</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">88%</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">打卡率</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">班主任</div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #52c41a, #73d13d); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;">李</div>
                                    <span style="font-size: 14px; color: #262626;">李老师</span>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewClass(2)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editClass(2)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteClass(2)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 班级卡片 3 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #fa8c16, #ffa940); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;">2</div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">五年级(2)班</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">实验小学</p>
                                </div>
                            </div>
                            <span class="tag tag-green">活跃</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">45</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">2</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">阅读计划</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">85%</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">打卡率</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">班主任</div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #fa8c16, #ffa940); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;">王</div>
                                    <span style="font-size: 14px; color: #262626;">王老师</span>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewClass(3)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editClass(3)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteClass(3)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 班级卡片 4 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #722ed1, #9254de); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;">5</div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">初三(5)班</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">第一中学</p>
                                </div>
                            </div>
                            <span class="tag tag-gray">归档</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">50</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">8</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">阅读计划</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">95%</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">打卡率</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">班主任</div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <div style="width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #722ed1, #9254de); color: white; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600;">赵</div>
                                    <span style="font-size: 14px; color: #262626;">赵老师</span>
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewClass(4)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editClass(4)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteClass(4)">删除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="pagination">
                    <div class="pagination-item disabled">上一页</div>
                    <div class="pagination-item active">1</div>
                    <div class="pagination-item">2</div>
                    <div class="pagination-item">3</div>
                    <div class="pagination-item">4</div>
                    <div class="pagination-item">5</div>
                    <div class="pagination-item">...</div>
                    <div class="pagination-item">43</div>
                    <div class="pagination-item">下一页</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建班级模态框 -->
    <div class="modal-overlay" id="addClassModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">创建班级</h3>
                <span class="modal-close" onclick="hideModal('addClassModal')">×</span>
            </div>
            <div class="modal-body">
                <form id="addClassForm">
                    <div class="form-group">
                        <label class="form-label">班级名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="例如：初一(3)班" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">所属学校 <span class="required">*</span></label>
                        <select class="form-select" required>
                            <option value="">请选择学校</option>
                            <option>示范中学</option>
                            <option>实验小学</option>
                            <option>第一中学</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">年级 <span class="required">*</span></label>
                        <select class="form-select" required>
                            <option value="">请选择年级</option>
                            <option>初一</option>
                            <option>初二</option>
                            <option>初三</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">班主任 <span class="required">*</span></label>
                        <select class="form-select" required>
                            <option value="">请选择班主任</option>
                            <option>张老师</option>
                            <option>李老师</option>
                            <option>王老师</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">班级描述</label>
                        <textarea class="form-textarea" placeholder="请输入班级描述"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal('addClassModal')">取消</button>
                <button class="btn btn-primary" onclick="submitAddClass()">确定</button>
            </div>
        </div>
    </div>

    <script src="common/admin-common.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            pageManager.renderHeader(['用户管理', '班级管理']);
        });

        // 重置筛选条件
        function resetFilters() {
            const selects = document.querySelectorAll('.form-select');
            selects.forEach(select => select.selectedIndex = 0);
            showToast('筛选条件已重置');
        }

        // 查看班级详情
        function viewClass(id) {
            showToast('查看班级详情功能开发中', 'info');
        }

        // 编辑班级
        function editClass(id) {
            showToast('编辑班级功能开发中', 'info');
        }

        // 删除班级
        function deleteClass(id) {
            showConfirm('确定要删除这个班级吗？', () => {
                showToast('删除成功');
            });
        }

        // 提交创建班级
        function submitAddClass() {
            const form = document.getElementById('addClassForm');
            if (form.checkValidity()) {
                hideModal('addClassModal');
                showToast('创建班级成功');
                form.reset();
            } else {
                form.reportValidity();
            }
        }
    </script>
</body>
</html>
