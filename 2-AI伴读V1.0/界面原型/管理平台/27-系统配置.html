<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统参数 - 校校读吧小管家管理平台</title>
    <link rel="stylesheet" href="common/admin-common.css">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-sidebar">
            <div class="sidebar-header"></div>
            <div class="sidebar-menu"></div>
        </div>

        <div class="admin-main">
            <div class="admin-header"></div>

            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">系统参数</h1>
                    <p class="page-description">配置系统的全局参数和设置</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">基础设置</h3>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label class="form-label">系统名称</label>
                                <input type="text" class="form-input" value="校校读吧小管家" style="max-width: 400px;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">系统版本</label>
                                <input type="text" class="form-input" value="v1.0.0" style="max-width: 400px;" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">系统Logo</label>
                                <div style="display: flex; align-items: center; gap: 16px;">
                                    <div style="width: 80px; height: 80px; border-radius: 8px; background: linear-gradient(135deg, #1890FF, #096DD9); color: white; display: flex; align-items: center; justify-content: center; font-size: 32px;"><i class="fa-solid fa-book"></i></div>
                                    <button type="button" class="btn btn-secondary btn-sm">更换Logo</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">系统描述</label>
                                <textarea class="form-textarea" rows="3" style="max-width: 600px;">专为中小学生打造的智能阅读管理平台，让阅读更有趣</textarea>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">阅读设置</h3>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label class="form-label">每日打卡时间段</label>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 400px;">
                                    <input type="time" class="form-input" value="06:00">
                                    <input type="time" class="form-input" value="22:00">
                                </div>
                                <p class="form-help">学生可在此时间段内完成打卡</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">最低阅读时长（分钟）</label>
                                <input type="number" class="form-input" value="15" style="max-width: 200px;">
                                <p class="form-help">每次打卡要求的最低阅读时长</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">测评及格分数</label>
                                <input type="number" class="form-input" value="60" style="max-width: 200px;">
                                <p class="form-help">测评的及格分数线</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">允许补打卡</label>
                                <div style="display: flex; align-items: center; gap: 16px;">
                                    <div class="option-switch" onclick="toggleSwitch(this)"></div>
                                    <span style="font-size: 14px; color: #595959;">开启后学生可以补打卡前一天的记录</span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">安全设置</h3>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label class="form-label">密码最小长度</label>
                                <input type="number" class="form-input" value="6" style="max-width: 200px;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">登录失败锁定次数</label>
                                <input type="number" class="form-input" value="5" style="max-width: 200px;">
                                <p class="form-help">连续登录失败达到此次数后锁定账号</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">会话超时时间（分钟）</label>
                                <input type="number" class="form-input" value="30" style="max-width: 200px;">
                                <p class="form-help">用户无操作后自动退出登录的时间</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">启用内容审核</label>
                                <div style="display: flex; align-items: center; gap: 16px;">
                                    <div class="option-switch" onclick="toggleSwitch(this)"></div>
                                    <span style="font-size: 14px; color: #595959;">开启后用户发布的内容需要审核后才能显示</span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">通知设置</h3>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label class="form-label">默认通知方式</label>
                                <div style="display: flex; gap: 16px;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" checked>
                                        <span>应用内通知</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>短信通知</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>邮件通知</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">打卡提醒时间</label>
                                <input type="time" class="form-input" value="20:00" style="max-width: 200px;">
                                <p class="form-help">每天定时提醒学生完成打卡</p>
                            </div>
                            <div class="form-group">
                                <label class="form-label">启用打卡提醒</label>
                                <div style="display: flex; align-items: center; gap: 16px;">
                                    <div class="option-switch" onclick="toggleSwitch(this)"></div>
                                    <span style="font-size: 14px; color: #595959;">开启后系统会自动发送打卡提醒</span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">存储设置</h3>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="form-group">
                                <label class="form-label">文件上传大小限制（MB）</label>
                                <input type="number" class="form-input" value="10" style="max-width: 200px;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">允许上传的文件类型</label>
                                <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" checked>
                                        <span>图片（jpg, png, gif）</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox" checked>
                                        <span>文档（pdf, doc, docx）</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>视频（mp4, avi）</span>
                                    </label>
                                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                                        <input type="checkbox">
                                        <span>音频（mp3, wav）</span>
                                    </label>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">数据保留期限（天）</label>
                                <input type="number" class="form-input" value="365" style="max-width: 200px;">
                                <p class="form-help">超过此期限的数据将被自动清理</p>
                            </div>
                        </form>
                    </div>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button class="btn btn-primary">保存所有设置</button>
                    <button class="btn btn-secondary">恢复默认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="common/admin-common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            pageManager.renderHeader(['系统配置', '系统参数']);
        });

        function toggleSwitch(element) {
            element.classList.toggle('off');
        }
    </script>
</body>
</html>
