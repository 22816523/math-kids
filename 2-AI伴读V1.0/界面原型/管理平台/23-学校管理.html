<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校管理 - 校校读吧小管家管理平台</title>
    <link rel="stylesheet" href="common/admin-common.css">    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <div class="admin-sidebar">
            <div class="sidebar-header"></div>
            <div class="sidebar-menu"></div>
        </div>

        <!-- 主内容区域 -->
        <div class="admin-main">
            <!-- 顶部导航栏 -->
            <div class="admin-header"></div>

            <!-- 内容区域 -->
            <div class="admin-content">
                <div class="page-header">
                    <h1 class="page-title">学校管理</h1>
                    <p class="page-description">管理系统中的所有学校信息</p>
                </div>

                <!-- 操作栏 -->
                <div class="action-bar">
                    <div class="action-left">
                        <button class="btn btn-primary" onclick="showModal('addSchoolModal')">
                            <span><i class="fa-solid fa-plus"></i></span>
                            <span>添加学校</span>
                        </button>
                        <button class="btn btn-secondary">
                            <span><i class="fa-solid fa-upload"></i></span>
                            <span>导出数据</span>
                        </button>
                    </div>
                    <div class="action-right">
                        <div class="search-bar">
                            <input type="text" class="form-input search-input" placeholder="搜索学校名称..." id="searchInput">
                            <button class="btn btn-primary">搜索</button>
                        </div>
                    </div>
                </div>

                <!-- 学校卡片列表 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px;">
                    <!-- 学校卡片 1 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #1890FF, #096DD9); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px;"><i class="fa-solid fa-graduation-cap"></i></div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">示范中学</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">ID: SCH001</p>
                                </div>
                            </div>
                            <span class="tag tag-green">正常</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">45</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">教师数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">1,234</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">28</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">班级数</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">联系方式</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-phone"></i> 0571-12345678</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-location-dot"></i> 杭州市西湖区文一路123号</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewSchool(1)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editSchool(1)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteSchool(1)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 学校卡片 2 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #52c41a, #73d13d); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px;"><i class="fa-solid fa-graduation-cap"></i></div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">实验小学</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">ID: SCH002</p>
                                </div>
                            </div>
                            <span class="tag tag-green">正常</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">38</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">教师数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">956</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">24</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">班级数</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">联系方式</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-phone"></i> 0571-87654321</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-location-dot"></i> 杭州市拱墅区莫干山路456号</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewSchool(2)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editSchool(2)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteSchool(2)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 学校卡片 3 -->
                    <div class="card" style="cursor: pointer; transition: all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.1)'" onmouseout="this.style.transform=''; this.style.boxShadow=''">
                        <div class="card-header" style="border-bottom: none; padding-bottom: 0;">
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <div style="width: 48px; height: 48px; border-radius: 8px; background: linear-gradient(135deg, #fa8c16, #ffa940); color: white; display: flex; align-items: center; justify-content: center; font-size: 20px;"><i class="fa-solid fa-graduation-cap"></i></div>
                                <div>
                                    <h3 style="font-size: 18px; font-weight: 600; color: #262626; margin-bottom: 4px;">第一中学</h3>
                                    <p style="font-size: 12px; color: #8c8c8c;">ID: SCH003</p>
                                </div>
                            </div>
                            <span class="tag tag-green">正常</span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px;">
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #1890FF; margin-bottom: 4px;">52</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">教师数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #52c41a; margin-bottom: 4px;">1,567</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">学生数</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 24px; font-weight: 700; color: #fa8c16; margin-bottom: 4px;">36</div>
                                    <div style="font-size: 12px; color: #8c8c8c;">班级数</div>
                                </div>
                            </div>
                            <div style="padding: 12px; background: #fafafa; border-radius: 4px; margin-bottom: 12px;">
                                <div style="font-size: 12px; color: #8c8c8c; margin-bottom: 4px;">联系方式</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-phone"></i> 0571-23456789</div>
                                <div style="font-size: 14px; color: #262626;"><i class="fa-solid fa-location-dot"></i> 杭州市滨江区江南大道789号</div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-primary btn-sm" style="flex: 1;" onclick="viewSchool(3)">查看详情</button>
                                <button class="btn btn-secondary btn-sm" onclick="editSchool(3)">编辑</button>
                                <button class="btn btn-secondary btn-sm" style="color: #ff4d4f;" onclick="deleteSchool(3)">删除</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="pagination">
                    <div class="pagination-item disabled">上一页</div>
                    <div class="pagination-item active">1</div>
                    <div class="pagination-item">2</div>
                    <div class="pagination-item">3</div>
                    <div class="pagination-item">下一页</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加学校模态框 -->
    <div class="modal-overlay" id="addSchoolModal" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加学校</h3>
                <span class="modal-close" onclick="hideModal('addSchoolModal')">×</span>
            </div>
            <div class="modal-body">
                <form id="addSchoolForm">
                    <div class="form-group">
                        <label class="form-label">学校名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="请输入学校名称" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">学校类型 <span class="required">*</span></label>
                        <select class="form-select" required>
                            <option value="">请选择学校类型</option>
                            <option>小学</option>
                            <option>初中</option>
                            <option>高中</option>
                            <option>九年一贯制</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">联系电话 <span class="required">*</span></label>
                        <input type="tel" class="form-input" placeholder="请输入联系电话" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">学校地址 <span class="required">*</span></label>
                        <input type="text" class="form-input" placeholder="请输入学校地址" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">管理员姓名</label>
                        <input type="text" class="form-input" placeholder="请输入管理员姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">管理员手机</label>
                        <input type="tel" class="form-input" placeholder="请输入管理员手机">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="hideModal('addSchoolModal')">取消</button>
                <button class="btn btn-primary" onclick="submitAddSchool()">确定</button>
            </div>
        </div>
    </div>

    <script src="common/admin-common.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            pageManager.renderHeader(['学校管理', '学校列表']);
        });

        // 查看学校详情
        function viewSchool(id) {
            showToast('查看学校详情功能开发中', 'info');
        }

        // 编辑学校
        function editSchool(id) {
            showToast('编辑学校功能开发中', 'info');
        }

        // 删除学校
        function deleteSchool(id) {
            showConfirm('确定要删除这所学校吗？', () => {
                showToast('删除成功');
            });
        }

        // 提交添加学校
        function submitAddSchool() {
            const form = document.getElementById('addSchoolForm');
            if (form.checkValidity()) {
                hideModal('addSchoolModal');
                showToast('添加学校成功');
                form.reset();
            } else {
                form.reportValidity();
            }
        }
    </script>
</body>
</html>
