<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            width: 812px;
            height: 375px;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 横屏容器 */
        .player-wrapper {
            width: 812px;
            height: 375px;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 视频区域 */
        .video-area {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-placeholder-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        /* 顶部栏 */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            z-index: 10;
        }

        .top-back {
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-right: 12px;
            padding: 4px;
        }

        .top-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        /* 底部控制栏 */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 16px 12px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
            z-index: 10;
        }

        /* 进度条区域 */
        .progress-wrapper {
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
            overflow: visible;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            border-radius: 2px;
            width: 35%;
            transition: width 0.3s linear;
            position: relative;
        }

        .progress-thumb {
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }


        /* 时间和控制 */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .time-display {
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* 不可拖动提示 */
        .progress-track::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 0;
            right: 0;
            bottom: -12px;
            cursor: not-allowed;
            z-index: 1;
        }

        /* ========== 弹窗通用 ========== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 300px;
            overflow: hidden;
            animation: modalIn 0.25s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-body {
            padding: 28px 24px 20px;
            text-align: center;
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
        }

        .modal-desc {
            font-size: 13px;
            color: #8c8c8c;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            border-top: 1px solid #f0f0f0;
        }

        .modal-btn {
            flex: 1;
            height: 48px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            background: white;
            transition: background 0.2s;
        }

        .modal-btn:hover {
            background: #f9f9f9;
        }

        .modal-btn+.modal-btn {
            border-left: 1px solid #f0f0f0;
        }

        .modal-btn.primary {
            color: var(--color-primary);
            font-weight: 600;
        }

        .modal-btn.cancel {
            color: #999;
        }

        .modal-btn.danger {
            color: #ff4d4f;
        }

        /* 完成弹窗特殊样式 */
        .modal-complete .modal-icon {
            color: #52c41a;
        }

        .modal-complete .modal-footer {
            border-top: none;
            padding: 0 24px 20px;
        }

        .modal-complete .modal-btn-full {
            width: 100%;
            height: 44px;
            border-radius: 22px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            transition: all 0.2s;
        }

        .modal-complete .modal-btn-full:hover {
            opacity: 0.9;
        }

        .modal-complete .stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 16px 0 4px;
        }

        .modal-complete .stat-item {
            text-align: center;
        }

        .modal-complete .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-primary);
        }

        .modal-complete .stat-label {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }


        /* Font Awesome */
        .fa-solid,
        .fa-regular {
            font-weight: 400;
        }

        .top-back .fa-solid,
        .play-btn .fa-solid,
        .modal-icon .fa-solid {
            color: inherit;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="player-wrapper">
        <div class="video-area">
            <span class="video-placeholder-text">AI导读视频播放中...</span>
        </div>

        <!-- 顶部栏 -->
        <div class="top-bar">
            <div class="top-back" onclick="showExitModal()"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="top-title">《三体》AI导读视频</div>
        </div>

        <!-- 底部控制栏 -->
        <div class="bottom-bar">
            <div class="progress-wrapper">
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill">
                        <div class="progress-thumb"></div>
                    </div>

                </div>
            </div>
            <div class="controls-row">
                <span class="time-display">03:28 / 10:15</span>
                <div class="play-btn" onclick="togglePlay(this)">
                    <i class="fa-solid fa-pause"></i>
                </div>
                <span class="time-display" style="opacity: 0;">03:28 / 10:15</span>
            </div>
        </div>
    </div>



    <!-- 播放结束弹窗 -->
    <div class="modal-overlay show" id="completeModal">
        <div class="modal modal-complete">
            <div class="modal-body">
                <div class="modal-icon"><i class="fa-solid fa-circle-check"></i></div>
                <div class="modal-title">视频观看完成</div>
                <div class="modal-desc">恭喜你完成了本次AI导读视频的观看</div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value">+15</div>
                        <div class="stat-label">获得积分</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn-full" onclick="location.href='07-AI导语.html'">返回任务列表</button>
            </div>
        </div>
    </div>

    <!-- 中途退出弹窗 -->
    <div class="modal-overlay" id="exitModal">
        <div class="modal">
            <div class="modal-body">
                <div class="modal-icon" style="color: #faad14;"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="modal-title">确定退出吗？</div>
                <div class="modal-desc">退出后不会保存当前播放进度，下次需要从头观看</div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeModal('exitModal')">继续观看</button>
                <button class="modal-btn danger" onclick="confirmExit()">退出</button>
            </div>
        </div>
    </div>
    </div>

    <script src="./router.js"></script>
    <script>
        // 播放/暂停
        function togglePlay(btn) {
            const icon = btn.querySelector('i');
            if (icon.classList.contains('fa-pause')) {
                icon.className = 'fa-solid fa-play';
                icon.style.marginLeft = '2px';
            } else {
                icon.className = 'fa-solid fa-pause';
                icon.style.marginLeft = '0';
            }
        }

        // 弹窗控制
        function showCompleteModal() {
            document.getElementById('completeModal').classList.add('show');
        }
        function showExitModal() {
            document.getElementById('exitModal').classList.add('show');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }
        function confirmExit() {
            closeModal('exitModal');
            history.back();
        }

        // 模拟：5秒后弹出完成弹窗（演示用）
        // setTimeout(showCompleteModal, 5000);


    </script>
</body>

</html>
