<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            padding: 48px 24px 24px;
            text-align: center;
        }

        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: 16px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(0, 200, 167, 0.3);
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 13px;
            color: #999999;
        }

        .login-content {
            flex: 1;
            padding: 20px;
        }

        .tab-bar {
            display: flex;
            background: white;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .tab-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
            color: #666666;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .tab-item.active {
            background: var(--color-primary);
            color: white;
            font-weight: 500;
        }

        .login-hint {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 16px;
            padding: 12px 14px;
            background: #fff7e6;
            border: 1px solid #ffe7ba;
            border-radius: 10px;
            color: #8c5a00;
            font-size: 12px;
            line-height: 1.6;
        }

        .login-hint i {
            margin-top: 2px;
            color: #fa8c16;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .wechat-section,
        .phone-section {
            background: white;
            border-radius: 12px;
            padding: 24px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .wechat-section { text-align: center; }

        .wechat-icon {
            width: 56px;
            height: 56px;
            background: #07c160;
            border-radius: 50%;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wechat-icon i {
            font-size: 28px;
            color: white;
        }

        .wechat-title {
            font-size: 15px;
            color: #333333;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .wechat-desc {
            font-size: 12px;
            color: #999999;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .wechat-btn,
        .login-btn {
            width: 100%;
            padding: 13px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-wrapper { position: relative; }
        .form-group { margin-bottom: 14px; }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999999;
            font-size: 15px;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 12px 0 40px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .form-input.error { border-color: #ff4d4f; }

        .code-input-group {
            display: grid;
            grid-template-columns: 1fr 108px;
            gap: 10px;
            align-items: start;
        }

        .get-code-btn {
            height: 44px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 8px;
            font-size: 13px;
            color: var(--color-primary);
            cursor: pointer;
        }

        .get-code-btn:disabled {
            color: #bfbfbf;
            cursor: not-allowed;
        }

        .error-tip {
            display: none;
            font-size: 12px;
            color: #ff4d4f;
            margin-top: 6px;
            padding-left: 4px;
        }

        .error-tip.show { display: block; }

        .agreement {
            padding: 0 20px 24px;
            font-size: 12px;
            color: #8c8c8c;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.7;
        }

        .agreement a {
            color: var(--color-primary);
            text-decoration: none;
        }

        .agreement-checkbox {
            margin-top: 3px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="login-header">
        <div class="logo">阅</div>
        <div class="app-title">校校读吧</div>
        <div class="app-subtitle">学生端</div>
    </div>

    <div class="login-content">
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('wechat')">微信登录</div>
            <div class="tab-item" onclick="switchTab('phone')">手机号登录</div>
        </div>

        <div class="login-hint">
            <i class="fa-solid fa-circle-info"></i>
            <div>若当前账号绑定了多个孩子，登录后将在首页弹出切换面板，请先选择要查看的孩子。</div>
        </div>

        <div class="tab-content active" id="wechat-tab">
            <div class="wechat-section">
                <div class="wechat-icon">
                    <i class="fa-brands fa-weixin"></i>
                </div>
                <div class="wechat-title">微信快捷登录</div>
                <div class="wechat-desc">授权后即可快速登录，无需输入账号密码。</div>
                <button class="wechat-btn" onclick="wechatLogin()">微信一键登录</button>
            </div>
        </div>

        <div class="tab-content" id="phone-tab">
            <div class="phone-section">
                <form onsubmit="return handleCodeLogin(event)">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i class="fa-solid fa-mobile-screen input-icon"></i>
                            <input type="tel" class="form-input" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                            <div class="error-tip" id="phoneError">请输入正确的11位手机号</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="code-input-group">
                            <div class="input-wrapper">
                                <i class="fa-solid fa-shield-halved input-icon"></i>
                                <input type="text" class="form-input" id="codeInput" placeholder="请输入验证码" maxlength="6">
                                <div class="error-tip" id="codeError">请输入6位验证码</div>
                            </div>
                            <button type="button" class="get-code-btn" id="getCodeBtn" onclick="getVerificationCode()">获取验证码</button>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">登录</button>
                </form>
            </div>
        </div>
    </div>

    <div class="agreement">
        <input type="checkbox" class="agreement-checkbox" id="agreementCheck">
        <span>我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私政策</a></span>
    </div>

    <script src="./router.js"></script>
    <script>
        let countdown = 0
        let countdownTimer = null

        function initializeLoginSession() {
            localStorage.setItem('isLoggedIn', 'true')
            StudentChildStore.clearPendingChild()
            const children = StudentChildStore.ensureDemoChildren()

            if (children.length > 1) {
                localStorage.setItem('showChildSelectorOnHome', 'true')
            }

            alert('登录成功')
            Router.toStudentPage('home', {}, 'redirectTo')
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach((item, index) => {
                item.classList.toggle('active', (tab === 'wechat' && index === 0) || (tab === 'phone' && index === 1))
            })

            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'))
            document.getElementById(`${tab}-tab`).classList.add('active')
            clearAllForms()
        }

        function clearAllForms() {
            document.querySelectorAll('.form-input').forEach(input => {
                input.value = ''
                input.classList.remove('error')
            })
            document.querySelectorAll('.error-tip').forEach(tip => tip.classList.remove('show'))
        }

        function wechatLogin() {
            if (!document.getElementById('agreementCheck').checked) {
                alert('请先阅读并同意用户协议和隐私政策')
                return
            }

            initializeLoginSession()
        }

        function handleCodeLogin(event) {
            event.preventDefault()

            if (!document.getElementById('agreementCheck').checked) {
                alert('请先阅读并同意用户协议和隐私政策')
                return false
            }

            const phone = document.getElementById('phoneInput').value.trim()
            const code = document.getElementById('codeInput').value.trim()
            const phoneRegex = /^1[3-9]\d{9}$/
            let isValid = true

            if (!phoneRegex.test(phone)) {
                showError('phoneInput', 'phoneError', '请输入正确的11位手机号')
                isValid = false
            } else {
                hideError('phoneInput', 'phoneError')
            }

            if (code.length !== 6) {
                showError('codeInput', 'codeError', '请输入6位验证码')
                isValid = false
            } else {
                hideError('codeInput', 'codeError')
            }

            if (!isValid) return false

            initializeLoginSession()
            return false
        }

        function getVerificationCode() {
            const phone = document.getElementById('phoneInput').value.trim()
            const phoneRegex = /^1[3-9]\d{9}$/

            if (!phoneRegex.test(phone)) {
                showError('phoneInput', 'phoneError', '请输入正确的11位手机号')
                return
            }

            hideError('phoneInput', 'phoneError')
            countdown = 60
            updateCodeButton()

            countdownTimer = setInterval(() => {
                countdown--
                if (countdown <= 0) {
                    clearInterval(countdownTimer)
                    countdown = 0
                }
                updateCodeButton()
            }, 1000)

            alert('验证码已发送，请注意查收')
        }

        function updateCodeButton() {
            const btn = document.getElementById('getCodeBtn')
            if (countdown > 0) {
                btn.textContent = `${countdown}秒后重试`
                btn.disabled = true
            } else {
                btn.textContent = '获取验证码'
                btn.disabled = false
            }
        }

        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.add('error')
            error.textContent = message
            error.classList.add('show')
        }

        function hideError(inputId, errorId) {
            const input = document.getElementById(inputId)
            const error = document.getElementById(errorId)
            input.classList.remove('error')
            error.classList.remove('show')
        }
    </script>
</body>
</html>
