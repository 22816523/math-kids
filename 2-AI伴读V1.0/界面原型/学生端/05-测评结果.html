<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评结果 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #e8f5e9 0%, #fff8e1 100%);
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 100px;
            opacity: 0;
        }

        /* 顶部导航栏 */
        .navbar {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            border-radius: 0 0 20px 20px;
        }

        .back-btn {
            font-size: 22px;
            cursor: pointer;
            margin-right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            flex: 1;
        }

        /* 成绩卡片 */
        .result-card {
            background: white;
            margin: 16px;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .result-header {
            margin-bottom: 20px;
        }

        .result-emoji {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .result-subtitle {
            font-size: 14px;
            color: #8c8c8c;
        }

        /* 分数圆环 */
        .score-section {
            margin-bottom: 20px;
        }

        .score-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.3);
        }

        .score-number {
            font-size: 36px;
            font-weight: 800;
            line-height: 1;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 统计数据 - 更紧凑 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            color: #8c8c8c;
        }

        /* 阅读完成奖状 */
        .certificate-card {
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cd 100%);
            margin: 0 16px 16px;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(255, 193, 7, 0.2);
            border: 2px solid #ffd54f;
            position: relative;
            overflow: hidden;
        }

        .certificate-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .certificate-badge {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .certificate-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .certificate-date {
            font-size: 12px;
            color: #999;
            margin-bottom: 16px;
        }

        .certificate-btn {
            background: linear-gradient(135deg, #ffd54f, #ffb300);
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            color: #5d4037;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 8px rgba(255, 179, 0, 0.3);
        }

        /* 题目列表 */
        .questions-section {
            background: white;
            margin: 0 16px 16px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #4CAF50;
        }

        .questions-summary {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 12px;
        }

        .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #666;
        }

        .summary-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .summary-dot.correct {
            background: #4CAF50;
        }

        .summary-dot.wrong {
            background: #FF5252;
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .question-item {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: 3px solid transparent;
            position: relative;
        }

        .question-item.correct {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #4CAF50;
            border-color: #4CAF50;
        }

        .question-item.wrong {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            color: #FF5252;
            border-color: #FF5252;
        }

        .question-item .status-icon {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        .question-item.correct .status-icon {
            background: #4CAF50;
        }

        .question-item.wrong .status-icon {
            background: #FF5252;
        }

        .question-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .question-modal.show {
            display: flex;
        }

        .question-modal-sheet {
            width: 375px;
            max-height: 82vh;
            background: #fff;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.16);
            animation: slideUp 0.22s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(24px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-handle {
            width: 48px;
            height: 5px;
            border-radius: 999px;
            background: #d9d9d9;
            margin: 10px auto 0;
        }

        .question-modal-body {
            padding: 18px 16px 20px;
            max-height: calc(82vh - 15px);
            overflow-y: auto;
        }

        .question-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .question-modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .question-modal-close {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #f5f5f5;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-result-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .question-result-badge.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .question-result-badge.wrong {
            background: #ffebee;
            color: #c62828;
        }

        .question-stem {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.7;
            color: #333;
            margin-bottom: 12px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .option-row {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f8f9fa;
            border: 1px solid #edf0f2;
        }

        .option-row.user-correct {
            background: #eef7ff;
            border-color: #bbdefb;
        }

        .option-row.user-wrong {
            background: #fff1f0;
            border-color: #ffcdd2;
        }

        .option-row.correct-answer {
            background: #f1f8e9;
            border-color: #c5e1a5;
        }

        .option-row-tag {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #eceff1;
            color: #666;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .option-row-content {
            flex: 1;
            min-width: 0;
        }

        .option-row-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }

        .option-row-desc {
            margin-top: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .option-row-desc.correct {
            color: #2e7d32;
        }

        .option-row-desc.wrong {
            color: #c62828;
        }

        .analysis-card {
            background: #fff8e1;
            border-radius: 16px;
            padding: 14px;
            border: 1px solid #ffe082;
        }

        .analysis-title {
            font-size: 14px;
            font-weight: 700;
            color: #8d6e63;
            margin-bottom: 8px;
        }

        .analysis-text {
            font-size: 13px;
            color: #6d4c41;
            line-height: 1.7;
        }

        /* 底部操作栏 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            background: white;
            padding: 16px;
            display: flex;
            gap: 12px;
            box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.1);
            border-radius: 20px 20px 0 0;
        }

        .btn {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #8BC34A);
            color: white;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        /* Font Awesome图标样式优化 */
        .fa-solid,
        .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }

        .navbar .fa-solid {
            color: inherit;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

    <script>
        const questionDetails = {
            1: {
                stem: '《三体》中，最先把汪淼卷入“三体”事件的人是谁？',
                options: { A: '叶文洁', B: '史强', C: '常伟思', D: '丁仪' },
                userAnswer: 'B',
                correctAnswer: 'B',
                analysis: '史强最早以刑警身份接触汪淼，并引导他参与与三体相关事件的调查。'
            },
            2: {
                stem: '“科学边界”成员频繁提到的核心危机是什么？',
                options: { A: '资源枯竭', B: '宇宙战争', C: '物理学不存在了', D: '人类失去记忆' },
                userAnswer: 'C',
                correctAnswer: 'C',
                analysis: '小说前期通过高能物理实验异常，反复强化“物理学不存在了”这一危机感。'
            },
            3: {
                stem: '汪淼在游戏中进入的虚拟世界名称是？',
                options: { A: '红岸', B: '三体', C: '面壁', D: '古筝' },
                userAnswer: 'B',
                correctAnswer: 'B',
                analysis: '“三体”游戏是ETO传播思想和筛选成员的重要媒介。'
            },
            4: {
                stem: '叶文洁在红岸基地做出的关键行为是？',
                options: { A: '摧毁天线', B: '向宇宙发送地球文明信息', C: '关闭接收系统', D: '组织古筝行动' },
                userAnswer: 'D',
                correctAnswer: 'B',
                analysis: '叶文洁利用红岸基地向宇宙发送信号，成为三体文明发现地球的重要起点。'
            },
            5: {
                stem: 'ETO 的中文名称更准确的是哪一项？',
                options: { A: '地球守护组织', B: '地球三体组织', C: '宇宙科学联盟', D: '文明拯救计划' },
                userAnswer: 'B',
                correctAnswer: 'B',
                analysis: 'ETO 即 Earth-Trisolaris Organization，中文通常译为“地球三体组织”。'
            },
            6: {
                stem: '“古筝行动”主要针对的目标是？',
                options: { A: '红岸基地', B: '三体舰队', C: '审判日号', D: '科学边界总部' },
                userAnswer: 'C',
                correctAnswer: 'C',
                analysis: '古筝行动利用纳米丝切割“审判日”号，目标是获取被隐藏的重要数据。'
            },
            7: {
                stem: '汪淼的专业领域是？',
                options: { A: '纳米材料', B: '天体物理', C: '考古学', D: '量子通信' },
                userAnswer: 'A',
                correctAnswer: 'A',
                analysis: '汪淼是纳米材料专家，他的技术成果也是推动剧情的重要线索。'
            },
            8: {
                stem: '“倒计时”最先出现在哪位人物的视野中？',
                options: { A: '叶文洁', B: '史强', C: '汪淼', D: '丁仪' },
                userAnswer: 'C',
                correctAnswer: 'C',

        function viewQuestion(num) {
            const detail = questionDetails[num];
            if (!detail) return;

            const isCorrect = detail.userAnswer === detail.correctAnswer;
            document.getElementById('modalQuestionTitle').textContent = '第 ' + num + ' 题';
            document.getElementById('modalQuestionStem').textContent = detail.stem;
            document.getElementById('modalQuestionAnalysis').textContent = detail.analysis;

            const resultEl = document.getElementById('modalQuestionResult');
            resultEl.className = 'question-result-badge ' + (isCorrect ? 'correct' : 'wrong');
            resultEl.innerHTML = isCorrect
                ? '<i class="fa-solid fa-check"></i><span>回答正确</span>'
                : '<i class="fa-solid fa-xmark"></i><span>回答错误</span>';
            document.getElementById('modalQuestionOptions').innerHTML = Object.entries(detail.options).map(([key, value]) => {
                let rowClass = 'option-row';
                let desc = '';

                if (detail.userAnswer === key && detail.correctAnswer === key) {
                    rowClass += ' user-correct';
                    desc = '<div class="option-row-desc correct">你的答案</div>';
                } else if (detail.userAnswer === key) {
                    rowClass += ' user-wrong';
                    desc = '<div class="option-row-desc wrong">你的答案</div>';
                } else if (detail.correctAnswer === key) {
                    rowClass += ' correct-answer';
                    desc = '<div class="option-row-desc correct">正确答案</div>';
                }

                return `
                    <div class="${rowClass}">
                        <div class="option-row-tag">${key}</div>
                        <div class="option-row-content">
                            <div class="option-row-text">${value}</div>
                            ${desc}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('questionModal').classList.add('show');
        }

        function closeQuestionModal() {
            document.getElementById('questionModal').classList.remove('show');
        }
