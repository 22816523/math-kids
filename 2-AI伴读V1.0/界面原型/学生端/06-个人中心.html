<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding-bottom: 60px;
            opacity: 0;
        }

        /* 顶部头部区域 */
        .header {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            padding: var(--spacing-xxl) var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        /* 右上角消息图标 */
        .header-message {
            position: absolute;
            top: 16px;
            right: 16px;
            cursor: pointer;
            font-size: 20px;
            color: white;
        }

        .header-message .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ff4d4f;
            color: white;
            font-size: 10px;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: white;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            line-height: 1.2;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .user-class {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* 统计网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            background: rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .stat-item:hover {
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.9;
        }

        /* 菜单区块 */
        .menu-section {
            background: white;
            margin: 12px 16px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: #fafafa;
        }

        .menu-icon {
            width: 40px;
            height: 44px;
            background: linear-gradient(135deg, #e6f7ff, #f0f5ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            line-height: 1.2;
            margin-right: 12px;
        }

        .menu-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.6;
            color: #262626;
        }

        .menu-arrow {
            color: #8c8c8c;
            font-size: 14px;
            line-height: 1.6;
        }

        /* 底部Tab栏 */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            height: 50px;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-item:hover {
            background: #fafafa;
        }

        .tab-icon {
            font-size: 20px;
            line-height: 1.2;
        }

        .tab-label {
            font-size: 10px;
            line-height: 1.4;
            color: #8c8c8c;
        }

        .tab-item.active .tab-label {
            color: #00C9A7;
        }

        .tab-item.active .tab-icon {
            transform: scale(1.1);
        }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }

        /* 导航栏和标题中的图标保持原色 */
        .navbar .fa-solid,
        .section-title .fa-solid,
        .task-title .fa-solid {
            color: inherit;
            opacity: 1;
        }

        /* 选中状态图标颜色优化 */
        .tab-item.active .tab-icon .fa-solid,
        .tab-item.active .fa-solid {
            color: #00C9A7;
            opacity: 1;
        }

        /* 其他选中状态 */
        .menu-item.active .menu-icon .fa-solid,
        .nav-item.active .fa-solid,
        .list-item.selected .fa-solid,
        .card.active .fa-solid,
        .btn.active .fa-solid,
        .filter-btn.active .fa-solid {
            color: #00C9A7;
            opacity: 1;
        }

        /* header内图标白色 */
        .header .fa-solid {
            color: white;
            opacity: 1;
        }

        /* 联系我们弹窗样式 */
        .contact-modal-overlay {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            height: 100vh;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .contact-modal-overlay.show {
            display: flex;
        }
        .contact-modal {
            width: 300px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .contact-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .contact-modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
        }
        .contact-modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: #666666;
        }
        .contact-modal-body {
            padding: 24px 16px;
            text-align: center;
        }
        .qrcode-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 16px;
            background: #f5f5f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e8e8e8;
        }
        .qrcode-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #999999;
        }
        .qrcode-placeholder i {
            font-size: 48px;
            color: var(--color-primary);
        }
        .qrcode-placeholder span {
            font-size: 12px;
        }
        .contact-tip {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
        }
        .contact-tip strong {
            color: var(--color-primary);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="header">
        <!-- 右上角消息图标 -->
        <div class="header-message" onclick="Router.toStudentPage('notification')">
            <i class="fa-solid fa-bell"></i>
            <span class="badge">3</span>
        </div>

        <div class="user-card">
            <div class="avatar" onclick="Router.toStudentPage('profileEdit')"><i class="fa-solid fa-user" style="color: var(--color-primary);"></i></div>
            <div class="user-info" onclick="Router.toStudentPage('profileEdit')" style="cursor: pointer;">
                <div class="user-name">小* <i class="fa-solid fa-chevron-right" style="font-size: 12px; opacity: 0.8;"></i></div>
                <div class="user-class">阳光小学 · 三年级一班</div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-item" onclick="Router.toStudentPage('points')">
                <div class="stat-value">520</div>
                <div class="stat-label">积分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">15</div>
                <div class="stat-label">打卡次数</div>
            </div>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-item" onclick="Router.toStudentPage('readingStats')">
            <div class="menu-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);"><i class="fa-solid fa-chart-line" style="color: white;"></i></div>
            <div class="menu-text">我的阅读</div>
            <div style="font-size: 13px; color: #8c8c8c; margin-right: 8px;">已读15本</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item" onclick="Router.toStudentPage('abilityProfile')">
            <div class="menu-icon" style="background: linear-gradient(135deg, #52c41a, #73d13d);"><i class="fa-solid fa-radar" style="color: white;"></i></div>
            <div class="menu-text">阅读能力图谱</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item" onclick="Router.toStudentPage('certificates')">
            <div class="menu-icon" style="background: linear-gradient(135deg, #ffd700, #ffaa00);"><i class="fa-solid fa-award" style="color: white;"></i></div>
            <div class="menu-text">我的奖状</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item" onclick="Router.toStudentPage('security')">
            <div class="menu-icon" style="background: linear-gradient(135deg, #ff6b6b, #ee5a5a);"><i class="fa-solid fa-lock" style="color: white;"></i></div>
            <div class="menu-text">账号安全</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item" onclick="openContactModal()">
            <div class="menu-icon" style="background: linear-gradient(135deg, #36cfc9, #13c2c2);"><i class="fa-solid fa-headset" style="color: white;"></i></div>
            <div class="menu-text">联系我们</div>
            <div class="menu-arrow">→</div>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-item" onclick="logout()" style="justify-content: center;">
            <div class="menu-text" style="color: #ff4d4f; text-align: center;">退出登录</div>
        </div>
    </div>

    <!-- 联系我们弹窗 -->
    <div class="contact-modal-overlay" id="contactModal" onclick="closeContactModal(event)">
        <div class="contact-modal" onclick="event.stopPropagation()">
            <div class="contact-modal-header">
                <div class="contact-modal-title">联系我们</div>
                <button class="contact-modal-close" onclick="closeContactModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="contact-modal-body">
                <div class="qrcode-container">
                    <div class="qrcode-placeholder">
                        <i class="fa-brands fa-weixin"></i>
                        <span>企业微信二维码</span>
                    </div>
                </div>
                <div class="contact-tip">
                    扫描上方二维码<br>
                    添加<strong>校校读吧客服</strong>咨询
                </div>
            </div>
        </div>
    </div>

    <div class="tabbar">
        <div class="tab-item" onclick="Router.toStudentPage('home')">
            <div class="tab-icon"><i class="fa-solid fa-house"></i></div>
            <div class="tab-label">首页</div>
        </div>
        <div class="tab-item" onclick="Router.toStudentPage('bookshelf')">
            <div class="tab-icon"><i class="fa-solid fa-book"></i></div>
            <div class="tab-label">书架</div>
        </div>
        <div class="tab-item active" onclick="Router.toStudentPage('profile')">
            <div class="tab-icon"><i class="fa-solid fa-user"></i></div>
            <div class="tab-label">我的</div>
        </div>
    </div>

    <!-- 引入路由管理脚本 -->
    <script src="./router.js"></script>
    <script>
        // 打开联系我们弹窗
        function openContactModal() {
            const modal = document.getElementById('contactModal');
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 关闭联系我们弹窗
        function closeContactModal(event) {
            if (event && event.target !== event.currentTarget) return;
            const modal = document.getElementById('contactModal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 清除登录状态
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userInfo');
                // 跳转到登录页
                window.location.href = '00-登录.html';
            }
        }
    </script>
</body>
</html>
