<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户反馈 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Source Han Sans CN", "Noto Sans CJK SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; width: 375px; margin: 0 auto; padding-bottom: 100px; opacity: 0; }

        .navbar { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; }
        .navbar-back { font-size: 18px; cursor: pointer; margin-right: 12px; }
        .navbar-title { font-size: 18px; font-weight: 600; flex: 1; }
        .navbar-right { font-size: 14px; cursor: pointer; padding: 6px 12px; background: rgba(255,255,255,0.2); border-radius: 4px; }
        .navbar-right:active { background: rgba(255,255,255,0.3); }

        .form-section { background: white; margin: 16px; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

        /* 反馈类型选择 */
        .type-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .type-tag { padding: 8px 16px; border-radius: 20px; font-size: 13px; color: #666; background: #f5f5f5; cursor: pointer; transition: all 0.3s; border: 1px solid transparent; }
        .type-tag:active { transform: scale(0.96); }
        .type-tag.active { color: var(--color-primary); background: rgba(0, 200, 167, 0.1); border-color: rgba(0, 200, 167, 0.3); font-weight: 500; }

        /* 反馈内容输入 */
        .feedback-textarea { width: 100%; height: 150px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; font-size: 14px; color: #333; resize: none; line-height: 1.6; }
        .feedback-textarea:focus { outline: none; border-color: var(--color-primary); }
        .feedback-textarea::placeholder { color: #bfbfbf; }
        .char-count { text-align: right; font-size: 12px; color: #999; margin-top: 8px; }

        /* 图片上传 */
        .upload-section { margin-top: 16px; }
        .upload-tip { font-size: 12px; color: #999; margin-bottom: 10px; }
        .upload-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .upload-item { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; position: relative; }
        .upload-item img { width: 100%; height: 100%; object-fit: cover; }
        .upload-item .delete-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .upload-add { width: 80px; height: 80px; border: 1px dashed #d9d9d9; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
        .upload-add:hover { border-color: var(--color-primary); }
        .upload-add:active { background: #f5f5f5; }
        .upload-add span { font-size: 11px; color: #999; }

        /* 联系方式 */
        .contact-input { width: 100%; height: 44px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0 12px; font-size: 14px; color: #333; }
        .contact-input:focus { outline: none; border-color: var(--color-primary); }
        .contact-input::placeholder { color: #bfbfbf; }
        .contact-tip { font-size: 12px; color: #999; margin-top: 8px; }

        /* 提交按钮 */
        .submit-section { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; padding: 16px; background: white; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
        .submit-btn { width: 100%; height: 48px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; border: none; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .submit-btn:active { transform: scale(0.98); opacity: 0.9; }
        .submit-btn:disabled { background: #d9d9d9; cursor: not-allowed; }

        /* 隐藏的文件输入 */
        .hidden-input { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-back" onclick="history.back()">←</div>
        <div class="navbar-title">用户反馈</div>
        <div class="navbar-right" onclick="window.location.href='32-反馈记录.html'">反馈记录</div>
    </div>

    <!-- 反馈类型 -->
    <div class="form-section">
        <div class="section-title">反馈类型</div>
        <div class="type-selector">
            <div class="type-tag active" onclick="selectType(this)">功能建议</div>
            <div class="type-tag" onclick="selectType(this)">问题反馈</div>
            <div class="type-tag" onclick="selectType(this)">使用疑问</div>
            <div class="type-tag" onclick="selectType(this)">其他</div>
        </div>
    </div>

    <!-- 反馈内容 -->
    <div class="form-section">
        <div class="section-title">反馈内容</div>
        <textarea class="feedback-textarea" id="feedbackContent" placeholder="请详细描述您的问题或建议，以便我们更好地为您服务..." maxlength="500" oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="charCount">0</span>/500</div>

        <div class="upload-section">
            <div class="upload-tip">上传截图（选填，最多3张）</div>
            <div class="upload-grid" id="uploadGrid">
                <div class="upload-add" onclick="triggerUpload()">
                    <span style="font-size: 24px; color: #d9d9d9;">+</span>
                    <span>添加图片</span>
                </div>
            </div>
        </div>
        <input type="file" class="hidden-input" id="imageInput" accept="image/*" multiple onchange="handleImageUpload(event)">
    </div>

    <!-- 联系方式 -->
    <div class="form-section">
        <div class="section-title">联系方式（选填）</div>
        <input type="text" class="contact-input" id="contactInfo" placeholder="请输入手机号或微信号">
        <div class="contact-tip">留下联系方式，方便我们与您沟通反馈处理进度</div>
    </div>

    <!-- 提交按钮 -->
    <div class="submit-section">
        <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">提交反馈</button>
    </div>

    <script src="./router.js"></script>
    <script>
        let selectedType = '功能建议';
        let uploadedImages = [];
        const maxImages = 3;

        // 选择反馈类型
        function selectType(el) {
            document.querySelectorAll('.type-tag').forEach(tag => tag.classList.remove('active'));
            el.classList.add('active');
            selectedType = el.textContent;
        }

        // 更新字数统计
        function updateCharCount() {
            const content = document.getElementById('feedbackContent').value;
            document.getElementById('charCount').textContent = content.length;
        }

        // 触发图片上传
        function triggerUpload() {
            if (uploadedImages.length >= maxImages) {
                alert('最多只能上传3张图片');
                return;
            }
            document.getElementById('imageInput').click();
        }

        // 处理图片上传
        function handleImageUpload(event) {
            const files = event.target.files;
            const remaining = maxImages - uploadedImages.length;

            for (let i = 0; i < Math.min(files.length, remaining); i++) {
                const file = files[i];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedImages.push(e.target.result);
                        renderUploadGrid();
                    };
                    reader.readAsDataURL(file);
                }
            }

            // 清空input以便重复选择同一文件
            event.target.value = '';
        }

        // 渲染图片网格
        function renderUploadGrid() {
            const grid = document.getElementById('uploadGrid');
            let html = '';

            uploadedImages.forEach((img, index) => {
                html += `
                    <div class="upload-item">
                        <img src="${img}" alt="上传图片">
                        <div class="delete-btn" onclick="deleteImage(${index})">
                            <span style="color: white; font-size: 10px;">×</span>
                        </div>
                    </div>
                `;
            });

            if (uploadedImages.length < maxImages) {
                html += `
                    <div class="upload-add" onclick="triggerUpload()">
                        <span style="font-size: 24px; color: #d9d9d9;">+</span>
                        <span>添加图片</span>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        // 删除图片
        function deleteImage(index) {
            uploadedImages.splice(index, 1);
            renderUploadGrid();
        }

        // 提交反馈
        function submitFeedback() {
            const content = document.getElementById('feedbackContent').value.trim();
            const contact = document.getElementById('contactInfo').value.trim();

            if (!content) {
                alert('请输入反馈内容');
                return;
            }

            if (content.length < 10) {
                alert('反馈内容至少10个字');
                return;
            }

            // 模拟提交
            const feedbackData = {
                type: selectedType,
                content: content,
                images: uploadedImages,
                contact: contact,
                submitTime: new Date().toLocaleString()
            };

            console.log('提交反馈:', feedbackData);

            alert('感谢您的反馈！我们会尽快处理');
            history.back();
        }
    </script>
</body>
</html>
