<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>历史活动 - 校校读吧学生端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F5F7FA;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 20px;
            color: #1f2937;
        }

        .navbar {
            background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%);
            color: white;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15);
        }

        .navbar-back {
            font-size: 18px;
            cursor: pointer;
            margin-right: 12px;
        }

        .navbar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .plans-list {
            padding: 12px 16px;
        }

        .plan-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .plan-card:active {
            transform: scale(0.98);
        }

        .plan-cover {
            width: 80px;
            height: 96px;
            border-radius: 8px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .plan-cover.spring { background: linear-gradient(135deg, #52c41a, #73d13d); }
        .plan-cover.summer { background: linear-gradient(135deg, #faad14, #ffc53d); }
        .plan-cover.autumn { background: linear-gradient(135deg, #fa8c16, #ffa940); }
        .plan-cover.winter { background: linear-gradient(135deg, #1890ff, #40a9ff); }
        .plan-cover.default { background: linear-gradient(135deg, #667eea, #764ba2); }

        .plan-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .plan-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .plan-name {
            font-size: 15px;
            font-weight: 600;
            color: #333333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .plan-status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(140, 140, 140, 0.1);
            color: #999999;
            flex-shrink: 0;
        }

        .plan-time {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #999999;
            margin-top: 4px;
        }

        .plan-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #999999;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .plan-stats span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-text {
            font-size: 15px;
            color: #999999;
        }

        .fa-solid, .fa-regular { font-weight: 400; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-back" onclick="Router.back()">←</div>
        <div class="navbar-title">历史活动</div>
    </div>

    <div class="plans-list" id="plansList"></div>

    <script src="./router.js"></script>
    <script>
        const historyPlans = [
            {
                id: 4,
                name: '2025暑期阅读计划',
                season: 'summer',
                startDate: '2025-07-01',
                endDate: '2025-08-31',
                statusText: '已结束',
                bookCount: 4
            },
            {
                id: 5,
                name: '2025秋季名著共读计划',
                season: 'autumn',
                startDate: '2025-09-10',
                endDate: '2025-12-20',
                statusText: '已结束',
                bookCount: 3
            }
        ];

        function renderPlans() {
            const plansList = document.getElementById('plansList');

            if (!historyPlans.length) {
                plansList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📚</div>
                        <div class="empty-text">暂无历史活动</div>
                    </div>
                `;
                return;
            }

            plansList.innerHTML = historyPlans.map(plan => `
                <div class="plan-card" onclick="viewDetail(${plan.id})">
                    <div class="plan-cover ${plan.season || 'default'}"></div>
                    <div class="plan-info">
                        <div>
                            <div class="plan-header">
                                <div class="plan-name">${plan.name}</div>
                                <div class="plan-status-badge">${plan.statusText}</div>
                            </div>
                            <div class="plan-time">
                                <i class="fa-solid fa-calendar"></i>
                                <span>${plan.startDate} 至 ${plan.endDate}</span>
                            </div>
                            <div class="plan-stats">
                                <span><i class="fa-solid fa-book"></i>${plan.bookCount}本书</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewDetail(planId) {
            Router.toStudentPage('readingPlanDetail', { planId });
        }

        renderPlans();
    </script>
</body>
</html>
