<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入班级 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; width: 375px; margin: 0 auto; min-height: 100vh; opacity: 0; }

        .navbar { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; }
        .back-btn { font-size: 20px; cursor: pointer; margin-right: 12px; }
        .navbar-title { font-size: 18px; line-height: 1.4; font-weight: 600; flex: 1; }

        .join-container { padding: 24px 16px; }

        .illustration { text-align: center; margin-bottom: 32px; }
        .illustration-icon { width: 120px; height: 120px; background: linear-gradient(135deg, #e6f7ff, #f0f5ff); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .illustration-icon i { font-size: 56px; color: var(--color-primary); }
        .illustration-title { font-size: 20px; font-weight: 600; color: #262626; margin-bottom: 8px; }
        .illustration-desc { font-size: 14px; color: #8c8c8c; }

        .class-preview { background: white; border-radius: 12px; padding: 16px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }

        .preview-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #f0f0f0; }
        .preview-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .preview-info { flex: 1; }
        .preview-name { font-size: 16px; font-weight: 600; color: #262626; margin-bottom: 4px; }
        .preview-teacher { font-size: 13px; color: #8c8c8c; }

        .preview-stats { display: flex; gap: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: 600; color: var(--color-primary); }
        .stat-label { font-size: 12px; color: #8c8c8c; margin-top: 4px; }

        .join-btn { width: 100%; height: 48px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; border: none; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .join-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .join-btn:disabled { background: #d9d9d9; cursor: not-allowed; transform: none; }

        .tips-section { background: #fff7e6; border-radius: 8px; padding: 16px; margin-top: 24px; }
        .tips-title { font-size: 14px; font-weight: 600; color: #fa8c16; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .tips-list { font-size: 13px; color: #595959; line-height: 1.8; padding-left: 16px; }
        .tips-list li { margin-bottom: 4px; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }
        .navbar .fa-solid,
        .illustration-icon .fa-solid,
        .preview-icon .fa-solid,
        .join-btn .fa-solid {
            color: inherit;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="navbar-title">加入班级</div>
    </div>

    <div class="join-container">
        <div class="illustration">
            <div class="illustration-icon">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="illustration-title">加入班级</div>
            <div class="illustration-desc">确认加入以下班级</div>
        </div>

        <div class="class-preview" id="classPreview">
            <div class="preview-header" style="margin-bottom: 0; padding-bottom: 0; border-bottom: none;">
                <div class="preview-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="preview-info">
                    <div class="preview-name">三年级2班</div>
                    <div class="preview-teacher">老师：李老师</div>
                </div>
            </div>
        </div>

        <button class="join-btn" id="joinBtn" onclick="joinClass()">
            <i class="fa-solid fa-user-plus"></i> 确认加入
        </button>

        <div class="tips-section">
            <div class="tips-title"><i class="fa-solid fa-circle-info"></i> 温馨提示</div>
            <ul class="tips-list">
                <li>加入后可参与班级阅读任务</li>
                <li>每个学生只能加入一个班级</li>
                <li>如有问题请联系班级老师</li>
            </ul>
        </div>
    </div>

    <!-- 引入路由管理脚本 -->
    <script src="./router.js"></script>
    <script>
        function joinClass() {
            // 实际应用中会发送加入请求
            alert('加入班级成功！');
            Router.toStudentPage('home');
        }
    </script>
</body>
</html>
