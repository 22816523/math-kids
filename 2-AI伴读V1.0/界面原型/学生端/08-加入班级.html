<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入班级 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            opacity: 0;
        }

        .navbar {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .back-btn {
            font-size: 20px;
            cursor: pointer;
            margin-right: 12px;
        }

        .navbar-title {
            font-size: 18px;
            line-height: 1.4;
            font-weight: 600;
            flex: 1;
        }

        .join-container { padding: 24px 16px; }

        .child-context {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
        }

        .child-context-main {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .child-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: white;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .child-context-name {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
        }

        .child-context-tip {
            font-size: 12px;
            color: #8c8c8c;
            text-align: right;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .illustration {
            text-align: center;
            margin-bottom: 28px;
        }

        .illustration-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #e6f7ff, #f0f5ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .illustration-icon i {
            font-size: 56px;
            color: var(--color-primary);
        }

        .illustration-title {
            font-size: 20px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 8px;
        }

        .illustration-desc {
            font-size: 14px;
            color: #8c8c8c;
        }

        .class-preview {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .preview-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .preview-info { flex: 1; }

        .preview-name {
            font-size: 16px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 4px;
        }

        .preview-teacher {
            font-size: 13px;
            color: #8c8c8c;
            line-height: 1.7;
        }

        .join-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tips-section {
            background: #fff7e6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 24px;
        }

        .tips-title {
            font-size: 14px;
            font-weight: 600;
            color: #fa8c16;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tips-list {
            font-size: 13px;
            color: #595959;
            line-height: 1.8;
            padding-left: 16px;
        }

        .tips-list li { margin-bottom: 4px; }

        .child-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .child-modal.show {
            display: flex;
        }

        .child-modal-panel {
            width: 375px;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 16px 16px 24px;
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12);
        }

        .child-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .child-modal-title {
            font-size: 16px;
            font-weight: 700;
            color: #262626;
        }

        .child-modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            color: #8c8c8c;
        }

        .child-option-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .child-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            border: 1px solid #f0f0f0;
            border-radius: 14px;
            cursor: pointer;
        }

        .child-option.active {
            border-color: #87e8de;
            background: #f6ffed;
        }

        .child-option-main {
            flex: 1;
            min-width: 0;
        }

        .child-option-name {
            font-size: 15px;
            font-weight: 600;
            color: #262626;
            margin-bottom: 4px;
        }

        .child-option-meta {
            font-size: 12px;
            color: #8c8c8c;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="navbar-title">加入班级</div>
    </div>

    <div class="join-container">
        <div class="child-context" onclick="openChildSelectorModal()">
            <div>
                <div class="child-context-main">
                    <div class="child-avatar" id="currentChildAvatar">明</div>
                    <div class="child-context-name" id="currentChildName">小明</div>
                </div>
            </div>
            <div class="child-context-tip" id="childContextSwitch">切换 <i class="fa-solid fa-chevron-right"></i></div>
        </div>

        <div class="illustration">
            <div class="illustration-icon">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="illustration-title">加入班级</div>
            <div class="illustration-desc">确认加入以下班级</div>
        </div>

        <div class="class-preview">
            <div class="preview-header">
                <div class="preview-icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <div class="preview-info">
                    <div class="preview-name">二年级三班</div>
                    <div class="preview-teacher">学校：阳光小学</div>
                    <div class="preview-teacher">老师：李老师</div>
                </div>
            </div>
        </div>

        <button class="join-btn" onclick="joinClass()">
            <i class="fa-solid fa-user-plus"></i> 确认加入
        </button>

        <div class="tips-section">
            <div class="tips-title"><i class="fa-solid fa-circle-info"></i> 温馨提示</div>
            <ul class="tips-list">
                <li>加入后可参与班级阅读任务</li>
                <li>本页可先切换孩子，再执行加入班级</li>
                <li>如有问题请联系班级老师</li>
            </ul>
        </div>
    </div>

    <div class="child-modal" id="childSelectorModal" onclick="closeChildSelectorModal(event)">
        <div class="child-modal-panel" onclick="event.stopPropagation()">
            <div class="child-modal-header">
                <div class="child-modal-title">选择孩子</div>
                <button class="child-modal-close" onclick="closeChildSelectorModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="child-option-list" id="childOptionList"></div>
        </div>
    </div>

    <script src="./router.js"></script>
    <script>
        function closeChildSelectorModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('childSelectorModal').classList.remove('show');
        }

        function renderChildSelectorModal() {
            const currentChild = StudentChildStore.getCurrentChild() || StudentChildStore.ensureDemoChildren()[0];
            const children = StudentChildStore.ensureDemoChildren();
            const listEl = document.getElementById('childOptionList');

            listEl.innerHTML = children.map(child => `
                <div class="child-option ${currentChild && currentChild.id === child.id ? 'active' : ''}" onclick="selectCurrentChild('${child.id}')">
                    <div class="child-avatar">${child.avatar || child.name.slice(-1)}</div>
                    <div class="child-option-main">
                        <div class="child-option-name">${child.name}</div>
                        <div class="child-option-meta">${child.school} · ${child.className}</div>
                    </div>
                    <i class="fa-solid fa-check" style="${currentChild && currentChild.id === child.id ? 'color:#52c41a;' : 'color:#d9d9d9;'}"></i>
                </div>
            `).join('');
        }

        function openChildSelectorModal() {
            renderChildSelectorModal();
            document.getElementById('childSelectorModal').classList.add('show');
        }

        function selectCurrentChild(childId) {
            StudentChildStore.setCurrentChild(childId);
            applyChildContext();
            closeChildSelectorModal();
        }

        function applyChildContext() {
            const childId = Router.getQuery('childId');
            if (childId) {
                StudentChildStore.setCurrentChild(childId);
            } else {
                StudentChildStore.ensureDemoChildren();
            }

            const currentChild = StudentChildStore.getCurrentChild();
            if (!currentChild) return;

            document.getElementById('currentChildAvatar').textContent = currentChild.avatar || currentChild.name.slice(-1);
            document.getElementById('currentChildName').textContent = currentChild.name;
            renderChildSelectorModal();
        }

        function joinClass() {
            const currentChild = StudentChildStore.getCurrentChild();
            const childName = currentChild ? currentChild.name : '当前孩子';
            alert(`${childName} 已加入班级`);
            Router.toStudentPage('home', {}, 'redirectTo');
        }

        window.closeChildSelectorModal = closeChildSelectorModal;
        window.selectCurrentChild = selectCurrentChild;

        applyChildContext();
    </script>
</body>
</html>
