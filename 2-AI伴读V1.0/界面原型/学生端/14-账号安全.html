<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号安全 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f5f5f5; width: 375px; margin: 0 auto; min-height: 100vh; opacity: 0; }

        .navbar { background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0, 200, 167, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; line-height: 1.4; font-weight: 600; flex: 1; }

        .security-level { background: white; margin: 16px; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .level-title { font-size: 16px; line-height: 1.5; font-weight: 600; color: #333333; margin-bottom: 12px; }
        .level-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .level-progress { height: 100%; background: linear-gradient(90deg, #52c41a, #73d13d); transition: width 0.3s; }
        .level-text { font-size: 14px; line-height: 1.6; color: #52c41a; }
        .level-text.warning { color: #faad14; }

        .menu-section { background: white; margin: 16px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .menu-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: #fafafa; }
        .menu-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #e6fffb, #b5f5ec); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; line-height: 1.2; margin-right: 12px; }
        .menu-content { flex: 1; }
        .menu-title { font-size: 15px; line-height: 1.6; color: #333333; margin-bottom: 2px; }
        .menu-desc { font-size: 12px; line-height: 1.5; color: #999999; }
        .menu-arrow { color: #bfbfbf; font-size: 18px; line-height: 1.4; }
        .menu-status { font-size: 12px; line-height: 1.5; color: #52c41a; margin-right: 8px; }
        .menu-status.warning { color: #faad14; }

        .tips-section { padding: 16px; font-size: 12px; color: #999999; line-height: 1.8; }

        /* Font Awesome图标样式 */
        .navbar .fa-solid { color: white; }
        .menu-icon .fa-solid { color: var(--color-primary); opacity: 1; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="navbar-title">账号安全</div>
    </div>

    <div class="security-level">
        <div class="level-title">账号安全等级</div>
        <div class="level-bar">
            <div class="level-progress" id="levelProgress" style="width: 100%;"></div>
        </div>
        <div class="level-text" id="levelText">高 - 账号安全等级良好</div>
    </div>

    <div class="menu-section">
        <div class="menu-item" onclick="bindPhone()">
            <div class="menu-icon"><i class="fa-solid fa-mobile"></i></div>
            <div class="menu-content">
                <div class="menu-title">绑定手机号</div>
                <div class="menu-desc" id="phoneDesc">138****5678</div>
            </div>
            <div class="menu-status" id="phoneStatus">已绑定</div>
            <div class="menu-arrow">→</div>
        </div>
        <div class="menu-item" onclick="Router.toStudentPage('feedback')">
            <div class="menu-icon"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="menu-content">
                <div class="menu-title">用户反馈</div>
                <div class="menu-desc">提交问题或建议</div>
            </div>
            <div class="menu-arrow">→</div>
        </div>
    </div>

    <div class="menu-section">
        <div class="menu-item" onclick="handleLogout()" style="justify-content: center;">
            <div class="menu-content" style="text-align: center; flex: none;">
                <div class="menu-title" style="color: #ff4d4f;">退出登录</div>
            </div>
        </div>
    </div>

    <div class="tips-section">
        温馨提示<br>
        • 绑定手机号可提高账号安全性<br>
        • 如发现账号异常，请及时联系客服
    </div>

    <script src="./router.js"></script>
    <script>
        // 模拟用户绑定状态
        const userBindingStatus = {
            hasPhone: true,
            phoneNumber: '138****5678'
        }

        // 页面加载时更新状态
        window.addEventListener('DOMContentLoaded', () => {
            updateSecurityLevel()
        })

        function updateSecurityLevel() {
            const levelProgress = document.getElementById('levelProgress')
            const levelText = document.getElementById('levelText')
            const phoneDesc = document.getElementById('phoneDesc')
            const phoneStatus = document.getElementById('phoneStatus')

            if (userBindingStatus.hasPhone) {
                levelProgress.style.width = '100%'
                levelText.textContent = '高 - 账号安全等级良好'
                levelText.classList.remove('warning')
                phoneDesc.textContent = userBindingStatus.phoneNumber
                phoneStatus.textContent = '已绑定'
                phoneStatus.classList.remove('warning')
            } else {
                levelProgress.style.width = '50%'
                levelText.textContent = '中 - 建议绑定手机号'
                levelText.classList.add('warning')
                phoneDesc.textContent = '绑定后可用于登录和找回密码'
                phoneStatus.textContent = '未绑定'
                phoneStatus.classList.add('warning')
            }
        }

        function bindPhone() {
            if (userBindingStatus.hasPhone) {
                window.location.href = '13-3-更改手机号.html'
            } else {
                window.location.href = '13-2-绑定手机号.html'
            }
        }

        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('isLoggedIn')
                localStorage.removeItem('userInfo')
                alert('已退出登录')
                // 实际应用中跳转到登录页
            }
        }
    </script>
</body>
</html>
