<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阅读计划详情 - 校校读吧学生端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F7FA;
            width: 375px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 24px;
        }

        .navbar {
            background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%);
            color: white;
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.15);
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            line-height: 1.4;
            cursor: pointer;
            padding: 4px;
        }

        .navbar-title {
            flex: 1;
            text-align: center;
            font-size: 18px;
            line-height: 1.4;
            font-weight: 600;
        }

        .navbar-placeholder {
            width: 26px;
        }

        .plan-header {
            background: linear-gradient(135deg, #2E5BFF 0%, #1E4BEF 100%);
            padding: 20px 16px;
            color: white;
        }

        .plan-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            flex: 1;
        }

        .plan-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
        }

        .desc-btn-inline {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .desc-btn-inline:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .plan-meta {
            font-size: 13px;
            opacity: 0.92;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .plan-stats {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.92);
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-mask.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 335px;
            max-height: 80vh;
            background: white;
            border-radius: 16px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .modal-container.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
        }

        .modal-close {
            background: none;
            border: none;
            color: #999999;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 20px;
            font-size: 13px;
            color: #595959;
            line-height: 1.8;
            overflow-y: auto;
        }

        .books-section {
            padding: 0 16px;
            margin-top: 12px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333333;
        }

        .section-count {
            font-size: 13px;
            color: #999999;
        }

        .books-tip {
            font-size: 11px;
            color: #999999;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .books-tip i {
            font-size: 11px;
            color: #bfbfbf;
            margin-right: 4px;
        }

        .books-list {
            padding: 0;
        }

        .book-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .book-card:active {
            transform: scale(0.98);
        }

        .book-cover {
            width: 90px;
            height: 120px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            flex-shrink: 0;
            position: relative;
        }

        .book-order-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(255, 165, 0, 0.4);
            border: 2px solid white;
            z-index: 2;
        }

        .book-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .book-header {
            margin-bottom: 8px;
        }

        .book-title {
            font-size: 15px;
            font-weight: 600;
            color: #333333;
            line-height: 1.4;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .book-author-publisher {
            font-size: 12px;
            color: #999999;
            line-height: 1.4;
        }

        .book-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .book-date {
            font-size: 12px;
            color: #999999;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .book-date i {
            font-size: 11px;
            color: #2E5BFF;
        }

        .fa-solid, .fa-regular {
            font-weight: 400;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="navbar-title">阅读计划详情</div>
        <div class="navbar-placeholder"></div>
    </div>

    <div class="plan-header">
        <div class="plan-title-row">
            <div class="plan-title" id="planTitle">2026春季阅读计划</div>
            <button class="desc-btn-inline" onclick="showDescModal()">简介</button>
        </div>
        <div class="plan-meta">
            <i class="fa-solid fa-calendar"></i>
            <span id="planDate">2026-03-01 至 2026-05-31</span>
        </div>
        <div class="plan-stats">
            <div class="stat-item">
                <span class="stat-value" id="bookCount">4</span>
                <span class="stat-label">本书</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="taskCount">12</span>
                <span class="stat-label">个任务</span>
            </div>
        </div>
    </div>

    <div class="books-section">
        <div class="section-header">
            <div class="section-title">阅读路线图</div>
            <div class="section-count" id="sectionCount">共4本</div>
        </div>

        <div class="books-tip">
            <i class="fa-solid fa-lightbulb"></i>
            点击书籍卡片，可以查看每本书的详细阅读计划
        </div>

        <div class="books-list" id="booksList"></div>
    </div>

    <div class="modal-mask" id="descModal" onclick="hideDescModal()"></div>
    <div class="modal-container" id="descModalContainer">
        <div class="modal-header">
            <div class="modal-title">计划简介</div>
            <button class="modal-close" onclick="hideDescModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="modal-body" id="planDesc">围绕春季主题精选经典文学与科普读物，帮助同学们持续养成阅读习惯。</div>
    </div>

    <script src="./router.js"></script>
    <script>
        const mockPlans = {
            1: {
                id: 1,
                name: '2026春季阅读计划',
                startDate: '2026-03-01',
                endDate: '2026-05-31',
                description: '围绕春季主题精选经典文学与科普读物，通过阅读、导读单和测评完成整本书阅读训练。',
                books: [
                    { id: 1, order: 1, title: '昆虫记', author: '法布尔', publisher: '人民文学出版社', startLabel: '03月01日开始' },
                    { id: 2, order: 2, title: '三体', author: '刘慈欣', publisher: '重庆出版社', startLabel: '03月15日开始' },
                    { id: 3, order: 3, title: '骆驼祥子', author: '老舍', publisher: '人民文学出版社', startLabel: '04月01日开始' },
                    { id: 4, order: 4, title: '朝花夕拾', author: '鲁迅', publisher: '人民文学出版社', startLabel: '04月20日开始' }
                ]
            },
            2: {
                id: 2,
                name: '名著精读成长计划',
                startDate: '2026-03-10',
                endDate: '2026-06-10',
                description: '以整本书深度阅读为主，通过导读、测评和打卡逐步提升阅读理解和表达能力。',
                books: [
                    { id: 1, order: 1, title: '三体', author: '刘慈欣', publisher: '重庆出版社', startLabel: '03月10日开始' },
                    { id: 4, order: 2, title: '平凡的世界', author: '路遥', publisher: '北京十月文艺出版社', startLabel: '04月01日开始' },
                    { id: 5, order: 3, title: '活着', author: '余华', publisher: '作家出版社', startLabel: '05月05日开始' }
                ]
            },
            3: {
                id: 3,
                name: '班级共读挑战计划',
                startDate: '2026-03-15',
                endDate: '2026-04-30',
                description: '全班共同参与的阶段性阅读活动，按阅读任务推进并记录班级阅读成果，培养班级共读氛围。',
                books: [
                    { id: 2, order: 1, title: '昆虫记', author: '法布尔', publisher: '人民文学出版社', startLabel: '03月15日开始' },
                    { id: 3, order: 2, title: '海底两万里', author: '凡尔纳', publisher: '译林出版社', startLabel: '03月22日开始' },
                    { id: 6, order: 3, title: '宝葫芦的秘密', author: '张天翼', publisher: '中国少年儿童出版社', startLabel: '03月29日开始' },
                    { id: 7, order: 4, title: '草房子', author: '曹文轩', publisher: '江苏凤凰少年儿童出版社', startLabel: '04月08日开始' },
                    { id: 8, order: 5, title: '夏洛的网', author: 'E.B.怀特', publisher: '上海译文出版社', startLabel: '04月18日开始' }
                ]
            },
            4: {
                id: 4,
                name: '2025暑期阅读计划',
                startDate: '2025-07-01',
                endDate: '2025-08-31',
                description: '暑期阅读计划聚焦假期阅读习惯培养，围绕经典文学与科学启蒙书目设置阶段性阅读任务，帮助学生在假期保持稳定阅读节奏。',
                books: [
                    { id: 8, order: 1, title: '夏洛的网', author: 'E.B.怀特', publisher: '上海译文出版社', startLabel: '07月01日开始' },
                    { id: 2, order: 2, title: '昆虫记', author: '法布尔', publisher: '人民文学出版社', startLabel: '07月16日开始' }
                ]
            },
            5: {
                id: 5,
                name: '2025秋季名著共读计划',
                startDate: '2025-09-10',
                endDate: '2025-12-20',
                description: '秋季名著共读计划围绕整本书阅读和阅读表达展开，通过共读、测评和分享任务帮助学生建立更完整的阅读理解能力。',
                books: [
                    { id: 1, order: 1, title: '昆虫记', author: '法布尔', publisher: '人民文学出版社', startLabel: '09月10日开始' },
                    { id: 7, order: 2, title: '草房子', author: '曹文轩', publisher: '江苏凤凰少年儿童出版社', startLabel: '10月08日开始' },
                    { id: 5, order: 3, title: '活着', author: '余华', publisher: '作家出版社', startLabel: '11月05日开始' }
                ]
            }
        };

        let currentPlan = null;

        function loadPlanData() {
            const planId = Router.getQuery('planId') || '1';
            currentPlan = mockPlans[planId] || mockPlans[1];

            document.getElementById('planTitle').textContent = currentPlan.name;
            document.getElementById('planDate').textContent = `${currentPlan.startDate} 至 ${currentPlan.endDate}`;
            document.getElementById('planDesc').textContent = currentPlan.description;
            document.getElementById('bookCount').textContent = currentPlan.books.length;
            document.getElementById('taskCount').textContent = currentPlan.books.length * 3;
            document.getElementById('sectionCount').textContent = `共${currentPlan.books.length}本`;

            renderBooks();
        }

        function renderBooks() {
            const booksList = document.getElementById('booksList');

            booksList.innerHTML = currentPlan.books.map(book => `
                <div class="book-card" onclick="viewBookDetail(${book.id})">
                    <div class="book-cover">
                        <div class="book-order-badge">${book.order}</div>
                    </div>
                    <div class="book-info">
                        <div class="book-header">
                            <div class="book-title">《${book.title}》</div>
                            <div class="book-author-publisher">${book.author} · ${book.publisher}</div>
                        </div>
                        <div class="book-meta">
                            <div class="book-date">
                                <i class="fa-solid fa-calendar"></i>
                                <span>${book.startLabel}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function viewBookDetail(bookId) {
            Router.toStudentPage('bookDetail', { planId: currentPlan.id, bookId });
        }

        function showDescModal() {
            document.getElementById('descModal').classList.add('show');
            document.getElementById('descModalContainer').classList.add('show');
        }

        function hideDescModal() {
            document.getElementById('descModal').classList.remove('show');
            document.getElementById('descModalContainer').classList.remove('show');
        }

        loadPlanData();
    </script>
</body>
</html>
