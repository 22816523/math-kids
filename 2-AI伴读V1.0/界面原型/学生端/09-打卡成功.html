<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡成功 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; width: 375px; margin: 0 auto; min-height: 100vh; padding-bottom: 80px; opacity: 0; }

        .navbar { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; }
        .back-btn { font-size: 20px; cursor: pointer; margin-right: 12px; }
        .navbar-title { font-size: 18px; line-height: 1.4; font-weight: 600; flex: 1; }

        .success-banner { background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; padding: 24px 16px; text-align: center; }
        .success-icon { width: 64px; height: 64px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 32px; }
        .success-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .reward-row { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }
        .reward-item { display: flex; align-items: center; gap: 6px; background: rgba(255, 255, 255, 0.2); padding: 6px 16px; border-radius: 16px; font-size: 14px; font-weight: 600; }

        .content-container { padding: 16px; }

        .section-card { background: white; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); overflow: hidden; }
        .section-header { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }
        .section-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #e6f7ff, #f0f5ff); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--color-primary); }
        .section-title { font-size: 16px; font-weight: 600; color: #262626; flex: 1; }

        /* 导读单图片 */
        .guide-image-container { padding: 16px; }
        .guide-image-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .guide-image-item:active { transform: scale(0.98); }

        /* 模拟图片样式 */
        .guide-image-mock {
            width: 100%;
            aspect-ratio: 4/3;
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid #dee2e6;
        }
        .guide-image-mock::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .guide-image-mock .mock-icon {
            font-size: 36px;
            color: #adb5bd;
            margin-bottom: 8px;
            margin-top: 20px;
        }
        .guide-image-mock .mock-text {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
        }
        .guide-image-mock .mock-lines {
            margin-top: 12px;
            width: 80%;
        }
        .guide-image-mock .mock-line {
            height: 6px;
            background: #dee2e6;
            border-radius: 3px;
            margin-bottom: 8px;
        }
        .guide-image-mock .mock-line:nth-child(2) { width: 90%; }
        .guide-image-mock .mock-line:nth-child(3) { width: 75%; }
        .guide-image-mock .mock-line:nth-child(4) { width: 85%; }
        .guide-image-mock .mock-line:nth-child(5) { width: 60%; }

        .image-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #999;
        }

        .tips-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .tips-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .tips-icon { font-size: 24px; }
        .tips-title { font-size: 16px; font-weight: 600; }
        .tips-content { font-size: 14px; line-height: 1.8; opacity: 0.95; }

        .action-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 375px; background: white; padding: 12px 16px; box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06); }
        .btn { width: 100%; height: 44px; border-radius: 22px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white; border: none; }
        .btn:hover { opacity: 0.9; }

        /* 图片查看器 */
        .image-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .image-viewer.show { display: flex; }
        .image-viewer-close {
            position: absolute;
            top: 16px;
            right: 16px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .image-viewer-content {
            width: 90%;
            max-width: 340px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        .viewer-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
            text-align: center;
        }
        .viewer-header .title { font-size: 16px; font-weight: 700; }
        .viewer-body {
            padding: 16px;
            max-height: 60vh;
            overflow-y: auto;
        }
        .viewer-q { margin-bottom: 16px; }
        .viewer-q:last-child { margin-bottom: 0; }
        .viewer-q-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .viewer-q-answer { font-size: 12px; color: #666; line-height: 1.7; background: #f5f5f5; padding: 10px; border-radius: 6px; }
        .image-viewer-hint {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 16px;
        }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }
        .navbar .fa-solid,
        .success-icon .fa-solid,
        .section-icon .fa-solid,
        .tips-icon .fa-solid,
        .btn .fa-solid {
            color: inherit;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <div class="back-btn" onclick="Router.toStudentPage('home')"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="navbar-title">打卡成功</div>
    </div>

    <div class="success-banner">
        <div class="success-icon"><i class="fa-solid fa-check"></i></div>
        <div class="success-title">打卡成功</div>
        <div class="reward-row">
            <div class="reward-item"><i class="fa-solid fa-coins" style="color: white;"></i> +5积分</div>
            <div class="reward-item"><i class="fa-solid fa-fire" style="color: white;"></i> 连续15天</div>
        </div>
    </div>

    <div class="content-container">
        <div class="tips-card">
            <div class="tips-header">
                <div class="tips-icon"><i class="fa-solid fa-robot"></i></div>
                <div class="tips-title">小读点评</div>
            </div>
            <div class="tips-content">
                你的回答很有深度！对人物心理的分析很到位。建议在描述科学概念时可以更加具体，结合书中的例子会更好哦
            </div>
        </div>

        <div class="section-card">
            <div class="section-header">
                <div class="section-icon"><i class="fa-solid fa-image"></i></div>
                <div class="section-title">导读单参考答案</div>
            </div>
            <div class="guide-image-container">
                <div class="guide-image-item" onclick="showImageViewer()">
                    <div class="guide-image-mock">
                        <i class="fa-solid fa-file-lines mock-icon"></i>
                        <div class="mock-text">导读单参考答案</div>
                        <div class="mock-lines">
                            <div class="mock-line"></div>
                            <div class="mock-line"></div>
                            <div class="mock-line"></div>
                            <div class="mock-line"></div>
                            <div class="mock-line"></div>
                        </div>
                    </div>
                </div>
                <div class="image-hint">
                    <i class="fa-solid fa-search-plus"></i> 点击图片可放大查看
                </div>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn" onclick="Router.toStudentPage('home')">
            <i class="fa-solid fa-house"></i> 返回首页
        </button>
    </div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="imageViewer" onclick="hideImageViewer()">
        <div class="image-viewer-close"><i class="fa-solid fa-xmark"></i></div>
        <div class="image-viewer-content" onclick="event.stopPropagation()">
            <div class="guide-image-mock" style="aspect-ratio: 3/4; height: auto;">
                <i class="fa-solid fa-file-lines mock-icon" style="font-size: 48px; margin-top: 50px;"></i>
                <div class="mock-text" style="font-size: 18px;">导读单参考答案</div>
                <div class="mock-lines" style="margin-top: 20px;">
                    <div class="mock-line"></div>
                    <div class="mock-line"></div>
                    <div class="mock-line"></div>
                    <div class="mock-line"></div>
                    <div class="mock-line"></div>
                </div>
            </div>
        </div>
        <div class="image-viewer-hint">点击空白处关闭</div>
    </div>

    <!-- 引入路由管理脚本 -->
    <script src="./router.js"></script>
    <script>
        function showImageViewer() {
            document.getElementById('imageViewer').classList.add('show');
        }

        function hideImageViewer() {
            document.getElementById('imageViewer').classList.remove('show');
        }
    </script>
</body>
</html>
