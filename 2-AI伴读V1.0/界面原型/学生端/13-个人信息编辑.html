<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人信息 - 校校读吧-学生端</title>
    <link rel="stylesheet" href="design-system.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; width: 375px; margin: 0 auto; min-height: 100vh; opacity: 0; }

        .navbar { background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%); color: white; height: 44px; display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0, 200, 167, 0.15); }
        .back-btn { background: none; border: none; color: white; font-size: 18px; line-height: 1.4; cursor: pointer; padding: 0; margin-right: 12px; }
        .navbar-title { font-size: 18px; line-height: 1.4; font-weight: 600; flex: 1; }

        .avatar-section { background: white; padding: 24px 16px; text-align: center; margin-bottom: 12px; }
        .avatar-upload { width: 80px; height: 80px; border-radius: 50%; background: white; color: var(--color-primary); display: inline-flex; align-items: center; justify-content: center; font-size: 32px; line-height: 1.2; cursor: pointer; position: relative; overflow: hidden; border: 2px solid #e8e8e8; }
        .avatar-upload:hover { opacity: 0.9; }
        .avatar-tip { font-size: 12px; line-height: 1.5; color: #999999; margin-top: 12px; }

        .form-section { background: white; margin-bottom: 12px; }
        .form-item { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; cursor: pointer; transition: background 0.3s; }
        .form-item:last-child { border-bottom: none; }
        .form-item:hover { background: #fafafa; }
        .form-item.disabled { cursor: default; }
        .form-item.disabled:hover { background: white; }
        .form-label { width: 80px; font-size: 15px; line-height: 1.6; color: #333333; }
        .form-arrow { color: #bfbfbf; font-size: 18px; line-height: 1.4; margin-left: 8px; }
        .form-value { flex: 1; font-size: 15px; line-height: 1.6; color: #595959; text-align: right; }
        .form-value.readonly { color: #999999; }

        .tips-section { padding: 16px; font-size: 12px; color: #8c8c8c; line-height: 1.8; }

        /* Font Awesome图标样式优化 */
        .fa-solid, .fa-regular {
            font-weight: 400;
            color: #595959;
            opacity: 0.85;
        }

        /* 导航栏图标保持白色 */
        .navbar .fa-solid {
            color: white;
            opacity: 1;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="navbar">
        <button class="back-btn" onclick="Router.back()"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="navbar-title">个人信息</div>
    </div>

    <div class="avatar-section">
        <div class="avatar-upload" onclick="uploadAvatar()">
            <i class="fa-solid fa-user" style="color: var(--color-primary);"></i>
        </div>
        <div class="avatar-tip">点击更换头像</div>
    </div>

    <div class="form-section">
        <div class="form-item" onclick="editName()">
            <div class="form-label">姓名</div>
            <div class="form-value">小*</div>
            <div class="form-arrow">→</div>
        </div>
        <div class="form-item" onclick="editSchool()">
            <div class="form-label">学校</div>
            <div class="form-value">阳光小学</div>
            <div class="form-arrow">→</div>
        </div>
        <div class="form-item" onclick="editClass()">
            <div class="form-label">班级</div>
            <div class="form-value">三年级一班</div>
            <div class="form-arrow">→</div>
        </div>
    </div>

    <div class="form-section">
        <div class="form-item" onclick="editPhone()">
            <div class="form-label">手机号</div>
            <div class="form-value" id="phoneValue">未绑定</div>
            <div class="form-arrow">→</div>
        </div>
    </div>

    <script src="./router.js"></script>
    <script>
        // 模拟手机号绑定状态
        let phoneBound = false;
        let phoneNumber = '';

        function uploadAvatar() {
            alert('选择头像图片（实际应用中会打开图片选择器）');
        }

        function editName() {
            window.location.href = '13-1-编辑姓名.html';
        }

        function editSchool() {
            window.location.href = '13-4-选择学校.html';
        }

        function editClass() {
            window.location.href = '13-5-选择班级.html';
        }

        function editPhone() {
            if (phoneBound) {
                // 已绑定，跳转到更改绑定页面
                window.location.href = '13-3-更改手机号.html';
            } else {
                // 未绑定，跳转到首次绑定页面
                window.location.href = '13-2-绑定手机号.html';
            }
        }

        // 页面加载时检查手机号绑定状态
        window.addEventListener('DOMContentLoaded', () => {
            // 模拟已绑定状态
            phoneBound = true;
            phoneNumber = '138****5678';

            const phoneValueEl = document.getElementById('phoneValue');
            if (phoneBound) {
                phoneValueEl.textContent = phoneNumber;
            } else {
                phoneValueEl.textContent = '未绑定';
                phoneValueEl.style.color = '#ff4d4f';
            }
        });
    </script>
</body>
</html>
