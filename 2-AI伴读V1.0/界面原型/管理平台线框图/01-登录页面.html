<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园读吧管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 1000px;
            height: 550px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            display: flex;
            overflow: hidden;
        }

        .login-brand {
            flex: 1;
            background: #333;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .brand-desc {
            font-size: 13px;
            color: #ccc;
        }

        .login-form-wrapper {
            width: 450px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-header {
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .login-subtitle {
            font-size: 13px;
            color: #999;
            line-height: 1.8;
        }

        .login-form {
            margin-bottom: 20px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #999;
        }

        .form-input::placeholder {
            color: #ccc;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #666;
        }

        .remember-me input {
            margin-right: 6px;
        }

        .forgot-password {
            color: #666;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            height: 44px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #333;
            color: #fff;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #555;
        }

        .login-footer {
            font-size: 12px;
            color: #999;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <div class="brand-logo">校园读吧</div>
            <div class="brand-desc">智能阅读管理平台</div>
        </div>

        <div class="login-form-wrapper">
            <div class="login-header">
                <div class="login-title">管理平台登录</div>
                <div class="login-subtitle">欢迎使用校园读吧管理平台</div>
            </div>

            <form class="login-form">
                <div class="form-item">
                    <label class="form-label">工号</label>
                    <input type="text" class="form-input" placeholder="请输入工号 / 手机号（外部人员）">
                </div>
                <div class="form-item">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" placeholder="请输入密码">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>记住密码</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="alert('请联系管理员重置密码'); return false;">忘记密码？</a>
                </div>

                <button type="button" class="btn btn-primary" onclick="window.location.href='02-首页.html'">登录</button>
            </form>

            <div class="login-footer">© 2026 校园读吧 版权所有</div>
        </div>
    </div>

</body>
</html>
