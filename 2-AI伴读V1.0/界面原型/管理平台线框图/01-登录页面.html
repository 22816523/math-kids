<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校校读吧管理平台 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录容器 */
        .login-container {
            width: 400px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 40px;
        }

        /* 标题 */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: #999;
        }

        /* 表单 */
        .form-item {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #999;
        }

        /* 记住密码和忘记密码 */
        .form-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            color: #666;
        }
        .form-checkbox input {
            margin-right: 6px;
        }
        .form-link {
            color: #666;
            text-decoration: none;
        }
        .form-link:hover {
            text-decoration: underline;
        }

        /* 按钮 */
        .btn {
            width: 100%;
            height: 44px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #333;
            color: #fff;
            margin-bottom: 12px;
        }
        .btn-secondary {
            background: #fff;
            color: #333;
            border: 1px solid #999;
        }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #999;
            font-size: 12px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .divider::before {
            margin-right: 12px;
        }
        .divider::after {
            margin-left: 12px;
        }

        /* 版权信息 */
        .login-footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 标题 -->
        <div class="login-header">
            <div class="login-title">校校读吧管理平台</div>
            <div class="login-subtitle">Reading Platform Management System</div>
        </div>

        <!-- 登录表单 -->
        <form>
            <div class="form-item">
                <label class="form-label">账号</label>
                <input type="text" class="form-input" placeholder="请输入手机号或邮箱">
            </div>

            <div class="form-item">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" placeholder="请输入密码">
            </div>

            <div class="form-extra">
                <label class="form-checkbox">
                    <input type="checkbox">
                    <span>记住密码</span>
                </label>
                <a href="#" class="form-link">忘记密码？</a>
            </div>

            <button type="submit" class="btn btn-primary">登录</button>
        </form>

        <!-- 分割线 -->
        <div class="divider">或</div>

        <!-- 企微登录 -->
        <button class="btn btn-secondary">
            [企微图标] 企业微信登录
        </button>

        <!-- 版权信息 -->
        <div class="login-footer">
            © 2026 校校读吧 All Rights Reserved
        </div>
    </div>
</body>
</html>
