<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍编辑 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 24px;
        }

        /* 页面头部 */
        .page-header {
            margin-bottom: 24px;
        }
        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
        }

        /* 标签页 */
        .tabs {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px 4px 0 0;
            display: flex;
            border-bottom: none;
        }

        .tab-item {
            padding: 16px 24px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-item:hover {
            color: #333;
        }

        .tab-item.active {
            color: #333;
            font-weight: 500;
            border-bottom-color: #333;
        }

        /* 表单容器 */
        .form-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 0 0 4px 4px;
            padding: 24px;
            margin-bottom: 24px;
        }

        /* 表单项 */
        .form-item {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: "*";
            color: #f44336;
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #999;
        }

        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #999;
        }

        /* 多选框组 */
        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        /* 封面管理 */
        .cover-section {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .current-cover {
            width: 200px;
            height: 280px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }

        .cover-actions {
            flex: 1;
        }

        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #999;
            background: #f5f5f5;
        }

        .upload-icon {
            font-size: 48px;
            color: #999;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        /* 资源列表 */
        .resource-list {
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }

        .resource-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: #f5f5f5;
        }

        .resource-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #333;
            color: #fff;
        }

        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .resource-item:last-child {
            border-bottom: none;
        }

        .resource-info {
            flex: 1;
        }

        .resource-name {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }

        .resource-meta {
            font-size: 12px;
            color: #999;
        }

        .resource-actions {
            display: flex;
            gap: 12px;
        }

        .btn-link {
            color: #666;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-link:hover {
            text-decoration: underline;
        }

        .btn-link.danger {
            color: #f44336;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #999;
            font-size: 14px;
        }

        /* 提示信息 */
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* 底部按钮 */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="breadcrumb">
            <a href="#">首页</a> / <a href="#">书籍资源库</a> / 编辑书籍
        </div>
        <div class="page-title">编辑书籍 - 《小王子》</div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
        <div class="tab-item active">基本信息</div>
        <div class="tab-item">封面管理</div>
        <div class="tab-item">视频资源</div>
        <div class="tab-item">音频资源</div>
        <div class="tab-item">导读单资源</div>
    </div>

    <!-- 表单容器 - 基本信息 -->
    <div class="form-container">
        <!-- 书名 -->
        <div class="form-item">
            <label class="form-label required">书名</label>
            <input type="text" class="form-input" value="小王子" placeholder="请输入书名，不超过100个字符">
        </div>

        <!-- 作者 -->
        <div class="form-item">
            <label class="form-label required">作者</label>
            <input type="text" class="form-input" value="圣埃克苏佩里" placeholder="请输入作者姓名，不超过50个字符">
        </div>

        <!-- 出版社 -->
        <div class="form-item">
            <label class="form-label">出版社</label>
            <input type="text" class="form-input" value="人民文学出版社" placeholder="请输入出版社名称，不超过50个字符">
        </div>

        <!-- ISBN -->
        <div class="form-item">
            <label class="form-label">ISBN</label>
            <input type="text" class="form-input" value="9787020042494" placeholder="请输入13位ISBN编号">
            <div class="form-hint">国际标准书号，13位数字</div>
        </div>

        <!-- 适用年级 -->
        <div class="form-item">
            <label class="form-label required">适用年级</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="grade1" checked>
                    <label for="grade1">一年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade2" checked>
                    <label for="grade2">二年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade3" checked>
                    <label for="grade3">三年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade4">
                    <label for="grade4">四年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade5">
                    <label for="grade5">五年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade6">
                    <label for="grade6">六年级</label>
                </div>
            </div>
        </div>

        <!-- 书籍分类 -->
        <div class="form-item">
            <label class="form-label">书籍分类</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="cat1" checked>
                    <label for="cat1">文学</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat2">
                    <label for="cat2">科普</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat3">
                    <label for="cat3">历史</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat4">
                    <label for="cat4">艺术</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat5" checked>
                    <label for="cat5">童话</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat6">
                    <label for="cat6">寓言</label>
                </div>
            </div>
        </div>

        <!-- 书籍简介 -->
        <div class="form-item">
            <label class="form-label">书籍简介</label>
            <textarea class="form-textarea" placeholder="请输入书籍简介，不超过500个字符">《小王子》是法国作家安托万·德·圣埃克苏佩里于1942年写成的著名儿童文学短篇小说。本书的主人公是来自外星球的小王子。书中以一位飞行员作为故事叙述者，讲述了小王子从自己星球出发前往地球的过程中，所经历的各种历险。</textarea>
            <div class="form-hint">已输入 128 / 500 字</div>
        </div>

        <!-- 底部按钮 -->
        <div class="form-actions">
            <button class="btn btn-default">取消</button>
            <button class="btn btn-primary">保存</button>
        </div>
    </div>

    <!-- 表单容器 - 封面管理（隐藏） -->
    <div class="form-container" style="display: none;">
        <div class="form-item">
            <label class="form-label">当前封面</label>
            <div class="cover-section">
                <div class="current-cover">当前封面图</div>
                <div class="cover-actions">
                    <div class="upload-area">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">点击或拖拽上传新封面</div>
                        <div class="upload-hint">支持JPG、PNG格式，建议尺寸400x600px，大小不超过2MB</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-default">取消</button>
            <button class="btn btn-primary">保存</button>
        </div>
    </div>

    <!-- 表单容器 - 视频资源（隐藏） -->
    <div class="form-container" style="display: none;">
        <div class="resource-list">
            <div class="resource-header">
                <div class="resource-title">视频资源列表</div>
                <button class="btn btn-primary">上传视频</button>
            </div>
            <div class="resource-item">
                <div class="resource-info">
                    <div class="resource-name">导读视频1 - 小王子的星球</div>
                    <div class="resource-meta">时长：5分30秒 | 大小：45.2MB | 上传时间：2026-02-08</div>
                </div>
                <div class="resource-actions">
                    <a href="#" class="btn-link">预览</a>
                    <a href="#" class="btn-link">编辑</a>
                    <a href="#" class="btn-link danger">删除</a>
                </div>
            </div>
            <div class="resource-item">
                <div class="resource-info">
                    <div class="resource-name">导读视频2 - 小王子的旅行</div>
                    <div class="resource-meta">时长：6分15秒 | 大小：52.8MB | 上传时间：2026-02-08</div>
                </div>
                <div class="resource-actions">
                    <a href="#" class="btn-link">预览</a>
                    <a href="#" class="btn-link">编辑</a>
                    <a href="#" class="btn-link danger">删除</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
