<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍资源库 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .header {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .header .logo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .main {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }

        .sidebar {
            width: 200px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 16px 0;
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 0;
        }
        .sidebar-item {
            padding: 12px 24px;
            font-size: 14px;
            color: #666;
        }
        .sidebar-item.active {
            color: #333;
            font-weight: 600;
            background: #f5f5f5;
            border-left: 3px solid #333;
        }

        .content {
            flex: 1;
            margin-left: 200px;
            padding: 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        .btn {
            height: 36px;
            padding: 0 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #333;
            color: #fff;
        }

        /* 筛选栏 */
        .filter-bar {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }
        .filter-item {
            flex: 1;
        }
        .filter-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .filter-input,
        .filter-select {
            width: 100%;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 书籍网格 */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .book-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }
        .book-card:hover {
            border-color: #999;
        }
        .book-cover-large {
            width: 100%;
            height: 260px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #999;
        }
        .book-card-body {
            padding: 12px;
        }
        .book-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .book-card-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        .book-card-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .book-tag {
            padding: 2px 6px;
            background: #f5f5f5;
            border-radius: 2px;
            font-size: 12px;
            color: #666;
        }
        .book-card-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 12px;
        }
        .status-active {
            background: #f5f5f5;
            color: #333;
        }
        .status-inactive {
            background: #f5f5f5;
            color: #999;
        }
        .book-card-actions {
            display: flex;
            gap: 8px;
        }
        .action-link {
            font-size: 12px;
            color: #666;
            text-decoration: none;
        }
        .action-link:hover {
            text-decoration: underline;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 24px 0;
        }
        .pagination-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #fff;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }
        .pagination-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">校校读吧管理平台</div>
    </div>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-item">阅读计划</div>
            <div class="sidebar-item active">书籍资源库</div>
            <div class="sidebar-item">测评管理</div>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">书籍资源库</div>
                <button class="btn btn-primary">[+] 上传书籍</button>
            </div>

            <div class="filter-bar">
                <div class="filter-item">
                    <label class="filter-label">搜索</label>
                    <input type="text" class="filter-input" placeholder="输入书名、作者或ISBN">
                </div>
                <div class="filter-item">
                    <label class="filter-label">适用年级</label>
                    <select class="filter-select">
                        <option>全部年级</option>
                        <option>一年级</option>
                        <option>二年级</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="filter-label">书籍分类</label>
                    <select class="filter-select">
                        <option>全部分类</option>
                        <option>文学</option>
                        <option>科普</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label class="filter-label">上架状态</label>
                    <select class="filter-select">
                        <option>全部状态</option>
                        <option>已上架</option>
                        <option>已下架</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button class="btn btn-primary">查询</button>
                </div>
            </div>

            <div class="book-grid">
                <!-- 书籍卡片1 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">小王子</div>
                        <div class="book-card-meta">圣埃克苏佩里 | 120页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">一年级</span>
                            <span class="book-tag">文学</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-active">已上架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">下架</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 书籍卡片2 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">夏洛的网</div>
                        <div class="book-card-meta">E·B·怀特 | 180页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">一年级</span>
                            <span class="book-tag">文学</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-active">已上架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">下架</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 书籍卡片3 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">十万个为什么</div>
                        <div class="book-card-meta">米·伊林 | 200页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">一年级</span>
                            <span class="book-tag">科普</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-active">已上架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">下架</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 书籍卡片4 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">安徒生童话</div>
                        <div class="book-card-meta">安徒生 | 150页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">二年级</span>
                            <span class="book-tag">文学</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-inactive">已下架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">上架</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 书籍卡片5 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">格林童话</div>
                        <div class="book-card-meta">格林兄弟 | 160页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">二年级</span>
                            <span class="book-tag">文学</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-active">已上架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">下架</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 书籍卡片6 -->
                <div class="book-card">
                    <div class="book-cover-large">[书籍封面]</div>
                    <div class="book-card-body">
                        <div class="book-card-title">昆虫记</div>
                        <div class="book-card-meta">法布尔 | 220页</div>
                        <div class="book-card-tags">
                            <span class="book-tag">三年级</span>
                            <span class="book-tag">科普</span>
                        </div>
                        <div class="book-card-status">
                            <span class="status-badge status-active">已上架</span>
                            <div class="book-card-actions">
                                <a href="#" class="action-link">编辑</a>
                                <a href="#" class="action-link">下架</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pagination">
                <button class="pagination-btn">[←]</button>
                <button class="pagination-btn active">1</button>
                <button class="pagination-btn">2</button>
                <button class="pagination-btn">3</button>
                <button class="pagination-btn">[→]</button>
            </div>
        </div>
    </div>
</body>
</html>
