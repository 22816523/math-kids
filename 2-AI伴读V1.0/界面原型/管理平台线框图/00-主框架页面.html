<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校校读吧管理平台 - 主框架</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: 100vh;
        }

        /* 左侧导航 */
        .sidebar {
            width: 200px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        /* Logo区域 */
        .sidebar-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #e0e0e0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        /* 菜单区域 */
        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }

        .menu-item {
            padding: 12px 20px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .menu-item:hover {
            background: #f5f5f5;
            color: #333;
        }
        .menu-item.active {
            background: #f5f5f5;
            color: #333;
            border-left-color: #333;
            font-weight: 500;
        }

        .menu-group-title {
            padding: 12px 20px;
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        /* 右侧内容区 */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部栏 */
        .header {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .header-left {
            font-size: 18px;
            font-weight: 500;
            color: #333;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
        }

        /* 内容区 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* 面包屑 */
        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 16px;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }

        /* 页面标题 */
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
            margin-bottom: 24px;
        }

        /* 示例内容卡片 */
        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 24px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 16px;
        }

        .card-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <div class="sidebar-header">
                校校读吧管理平台
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active">首页</div>

                <div class="menu-group-title">学校与老师</div>
                <div class="menu-item">学校列表</div>
                <div class="menu-item">老师列表</div>

                <div class="menu-group-title">阅读计划</div>
                <div class="menu-item">计划列表</div>
                <div class="menu-item">创建计划</div>

                <div class="menu-group-title">书籍资源</div>
                <div class="menu-item">书籍资源库</div>
                <div class="menu-item">测评管理</div>

                <div class="menu-group-title">学生管理</div>
                <div class="menu-item">学生列表</div>

                <div class="menu-group-title">数据分析</div>
                <div class="menu-item">数据统计</div>

                <div class="menu-group-title">系统配置</div>
                <div class="menu-item">激励体系</div>
                <div class="menu-item">消息管理</div>
                <div class="menu-item">用户反馈</div>
                <div class="menu-item">系统设置</div>
                <div class="menu-item">效率工具</div>
            </div>
        </div>

        <!-- 右侧内容区 -->
        <div class="content-wrapper">
            <!-- 顶部栏 -->
            <div class="header">
                <div class="header-left">
                    首页
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar">张</div>
                        <span>张经理</span>
                    </div>
                </div>
            </div>

            <!-- 内容区 -->
            <div class="content">
                <div class="breadcrumb">
                    <a href="#">首页</a>
                </div>

                <div class="page-title">欢迎使用校校读吧管理平台</div>

                <div class="card">
                    <div class="card-title">平台概览</div>
                    <div class="card-content">
                        这是管理平台的主框架页面，包含左侧导航菜单和顶部栏
                        <br><br>
                        左侧菜单包含以下模块：
                        <br>• 学校与老师管理
                        <br>• 阅读计划管理
                        <br>• 书籍资源库管理
                        <br>• 学生管理
                        <br>• 数据统计分析
                        <br>• 系统配置
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
