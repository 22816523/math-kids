<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建阅读计划 - 步骤1 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .header .logo {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .header .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: #666;
        }

        /* 主体布局 */
        .main {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 200px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 16px 0;
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 0;
            overflow-y: auto;
        }
        .sidebar-group {
            margin-bottom: 16px;
        }
        .sidebar-group-title {
            padding: 8px 24px;
            font-size: 12px;
            color: #999;
            font-weight: 600;
        }
        .sidebar-item {
            padding: 12px 24px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        .sidebar-item:hover {
            background: #f5f5f5;
        }
        .sidebar-item.active {
            color: #333;
            font-weight: 600;
            background: #f5f5f5;
            border-left: 3px solid #333;
        }

        /* 内容区 */
        .content {
            flex: 1;
            margin-left: 200px;
            padding: 24px;
            max-width: 1000px;
        }

        /* 页面标题 */
        .page-header {
            margin-bottom: 24px;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .page-desc {
            font-size: 14px;
            color: #999;
        }

        /* 步骤条 */
        .steps {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .steps-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .step {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
        }
        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            flex-shrink: 0;
        }
        .step.active .step-number {
            background: #333;
            border-color: #333;
            color: #fff;
        }
        .step.completed .step-number {
            background: #f5f5f5;
            border-color: #333;
            color: #333;
        }
        .step-content {
            margin-left: 12px;
        }
        .step-title {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }
        .step.active .step-title {
            color: #333;
            font-weight: 600;
        }
        .step.completed .step-title {
            color: #333;
        }
        .step-line {
            flex: 1;
            height: 2px;
            background: #e0e0e0;
            margin: 0 16px;
        }
        .step.completed + .step .step-line {
            background: #333;
        }

        /* 表单容器 */
        .form-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 32px;
        }
        .form-section {
            margin-bottom: 32px;
        }
        .form-section:last-child {
            margin-bottom: 0;
        }
        .form-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        /* 表单项 */
        .form-item {
            margin-bottom: 20px;
        }
        .form-item-row {
            display: flex;
            gap: 20px;
        }
        .form-item-row .form-item {
            flex: 1;
        }
        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }
        .form-label .required {
            color: #999;
            margin-left: 4px;
        }
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-input,
        .form-select {
            height: 40px;
        }
        .form-textarea {
            min-height: 100px;
            padding: 12px;
            resize: vertical;
        }
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #999;
        }
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        /* 多选框组 */
        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        .checkbox-item input {
            margin-right: 6px;
        }
        .checkbox-item label {
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        /* 上传组件 */
        .upload-area {
            width: 200px;
            height: 120px;
            border: 2px dashed #e0e0e0;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #999;
        }
        .upload-icon {
            font-size: 32px;
            color: #e0e0e0;
            margin-bottom: 8px;
        }
        .upload-text {
            font-size: 14px;
            color: #999;
        }
        .upload-hint {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        /* 底部操作栏 */
        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }
        .btn {
            height: 40px;
            padding: 0 32px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #333;
            color: #fff;
        }
        .btn-secondary {
            background: #fff;
            color: #666;
            border: 1px solid #e0e0e0;
        }
        .btn-text {
            background: none;
            color: #666;
            border: none;
            padding: 0;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="logo">校校读吧管理平台</div>
        <div class="user-info">
            <span>管理员</span>
            <span>|</span>
            <a href="#" style="color:#666; text-decoration:none;">退出</a>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-group">
                <div class="sidebar-group-title">基础管理</div>
                <div class="sidebar-item">学校管理</div>
                <div class="sidebar-item">老师管理</div>
                <div class="sidebar-item">学生管理</div>
            </div>
            <div class="sidebar-group">
                <div class="sidebar-group-title">内容管理</div>
                <div class="sidebar-item active">阅读计划</div>
                <div class="sidebar-item">书籍资源库</div>
                <div class="sidebar-item">测评管理</div>
            </div>
            <div class="sidebar-group">
                <div class="sidebar-group-title">数据分析</div>
                <div class="sidebar-item">数据统计</div>
                <div class="sidebar-item">激励体系</div>
            </div>
            <div class="sidebar-group">
                <div class="sidebar-group-title">系统设置</div>
                <div class="sidebar-item">消息管理</div>
                <div class="sidebar-item">用户反馈</div>
                <div class="sidebar-item">系统配置</div>
            </div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <!-- 页面标题 -->
            <div class="page-header">
                <div class="page-title">创建阅读计划</div>
                <div class="page-desc">配置计划基本信息、选择书籍、设置任务和资源</div>
            </div>

            <!-- 步骤条 -->
            <div class="steps">
                <div class="steps-container">
                    <div class="step active">
                        <div class="step-number">1</div>
                        <div class="step-content">
                            <div class="step-title">基本信息</div>
                        </div>
                    </div>
                    <div class="step-line"></div>
                    <div class="step">
                        <div class="step-number">2</div>
                        <div class="step-content">
                            <div class="step-title">选择书籍</div>
                        </div>
                    </div>
                    <div class="step-line"></div>
                    <div class="step">
                        <div class="step-number">3</div>
                        <div class="step-content">
                            <div class="step-title">配置任务</div>
                        </div>
                    </div>
                    <div class="step-line"></div>
                    <div class="step">
                        <div class="step-number">4</div>
                        <div class="step-content">
                            <div class="step-title">资源解锁</div>
                        </div>
                    </div>
                    <div class="step-line"></div>
                    <div class="step">
                        <div class="step-number">5</div>
                        <div class="step-content">
                            <div class="step-title">AI导语</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 表单 -->
            <div class="form-container">
                <form>
                    <!-- 基本信息 -->
                    <div class="form-section">
                        <div class="form-section-title">基本信息</div>

                        <div class="form-item">
                            <label class="form-label">
                                计划名称
                                <span class="required">*</span>
                            </label>
                            <input type="text" class="form-input" placeholder="请输入计划名称，不超过50个字符">
                            <div class="form-hint">例如：2026春季阅读计划</div>
                        </div>

                        <div class="form-item">
                            <label class="form-label">
                                适用年级
                                <span class="required">*</span>
                            </label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade1">
                                    <label for="grade1">一年级</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade2">
                                    <label for="grade2">二年级</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade3">
                                    <label for="grade3">三年级</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade4">
                                    <label for="grade4">四年级</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade5">
                                    <label for="grade5">五年级</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="grade6">
                                    <label for="grade6">六年级</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-item-row">
                            <div class="form-item">
                                <label class="form-label">
                                    开始时间
                                    <span class="required">*</span>
                                </label>
                                <input type="date" class="form-input">
                                <div class="form-hint">计划开始时间，不能早于当前时间</div>
                            </div>
                            <div class="form-item">
                                <label class="form-label">
                                    结束时间
                                    <span class="required">*</span>
                                </label>
                                <input type="date" class="form-input">
                                <div class="form-hint">计划结束时间，不能早于开始时间</div>
                            </div>
                        </div>

                        <div class="form-item">
                            <label class="form-label">计划简介</label>
                            <textarea class="form-textarea" placeholder="请输入计划简介，不超过500个字符"></textarea>
                            <div class="form-hint">简要描述本次阅读计划的目标和特色</div>
                        </div>

                        <div class="form-item">
                            <label class="form-label">计划封面</label>
                            <div class="upload-area">
                                <div class="upload-icon">[+]</div>
                                <div class="upload-text">点击上传封面</div>
                            </div>
                            <div class="form-hint">建议尺寸：750x400px，支持JPG、PNG格式，不超过2MB</div>
                        </div>
                    </div>

                    <!-- 底部操作 -->
                    <div class="form-footer">
                        <button type="button" class="btn btn-text">[←] 返回列表</button>
                        <div class="btn-group">
                            <button type="button" class="btn btn-secondary">保存草稿</button>
                            <button type="submit" class="btn btn-primary">下一步 [→]</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
