<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评列表 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 24px;
        }

        /* 页面头部 */
        .page-header {
            margin-bottom: 24px;
        }
        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
        }

        /* 筛选区域 */
        .filter-bar {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .filter-row {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .filter-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .filter-input {
            flex: 1;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .filter-select {
            flex: 1;
            height: 36px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }

        .filter-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #333;
            color: #fff;
        }

        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        /* 表格容器 */
        .table-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .table-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .table-count {
            font-size: 14px;
            color: #999;
        }

        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #f5f5f5;
            color: #666;
            font-weight: 500;
            text-align: left;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        td {
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
        }

        tr:hover {
            background: #fafafa;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #e8f5e9;
            color: #4caf50;
            border-radius: 4px;
            font-size: 12px;
        }

        .status-badge.unconfigured {
            background: #ffebee;
            color: #f44336;
        }

        .table-actions {
            display: flex;
            gap: 12px;
        }

        .btn-link {
            color: #666;
            text-decoration: none;
            cursor: pointer;
        }
        .btn-link:hover {
            text-decoration: underline;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
        }

        .page-btn {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }

        .page-btn.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="breadcrumb">
            <a href="#">首页</a> / 测评列表
        </div>
        <div class="page-title">测评列表</div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-bar">
        <div class="filter-row">
            <div class="filter-item">
                <span class="filter-label">搜索</span>
                <input type="text" class="filter-input" placeholder="输入书名搜索">
            </div>
            <div class="filter-item">
                <span class="filter-label">测评状态</span>
                <select class="filter-select">
                    <option>全部状态</option>
                    <option>已配置</option>
                    <option>未配置</option>
                </select>
            </div>
            <div class="filter-item">
                <span class="filter-label">适用年级</span>
                <select class="filter-select">
                    <option>全部年级</option>
                    <option>一年级</option>
                    <option>二年级</option>
                    <option>三年级</option>
                    <option>四年级</option>
                    <option>五年级</option>
                    <option>六年级</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="btn btn-primary">查询</button>
                <button class="btn btn-default">重置</button>
            </div>
        </div>
    </div>

    <!-- 表格 -->
    <div class="table-container">
        <div class="table-header">
            <div class="table-title">测评列表</div>
            <div class="table-count">共 86 条记录</div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>书籍ID</th>
                    <th>书名</th>
                    <th>作者</th>
                    <th>适用年级</th>
                    <th>测评状态</th>
                    <th>题目数量</th>
                    <th>最后更新时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>B001</td>
                    <td>小王子</td>
                    <td>圣埃克苏佩里</td>
                    <td>1-3年级</td>
                    <td><span class="status-badge">已配置</span></td>
                    <td>15题</td>
                    <td>2026-02-08</td>
                    <td>
                        <div class="table-actions">
                            <a href="#" class="btn-link">编辑</a>
                            <a href="#" class="btn-link">预览</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>B002</td>
                    <td>夏洛的网</td>
                    <td>E.B.怀特</td>
                    <td>2-4年级</td>
                    <td><span class="status-badge">已配置</span></td>
                    <td>20题</td>
                    <td>2026-02-07</td>
                    <td>
                        <div class="table-actions">
                            <a href="#" class="btn-link">编辑</a>
                            <a href="#" class="btn-link">预览</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>B003</td>
                    <td>窗边的小豆豆</td>
                    <td>黑柳彻子</td>
                    <td>3-5年级</td>
                    <td><span class="status-badge unconfigured">未配置</span></td>
                    <td>0题</td>
                    <td>-</td>
                    <td>
                        <div class="table-actions">
                            <a href="#" class="btn-link">配置测评</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>B004</td>
                    <td>草房子</td>
                    <td>曹文轩</td>
                    <td>4-6年级</td>
                    <td><span class="status-badge">已配置</span></td>
                    <td>18题</td>
                    <td>2026-02-06</td>
                    <td>
                        <div class="table-actions">
                            <a href="#" class="btn-link">编辑</a>
                            <a href="#" class="btn-link">预览</a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td>B005</td>
                    <td>城南旧事</td>
                    <td>林海音</td>
                    <td>5-6年级</td>
                    <td><span class="status-badge unconfigured">未配置</span></td>
                    <td>0题</td>
                    <td>-</td>
                    <td>
                        <div class="table-actions">
                            <a href="#" class="btn-link">配置测评</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="pagination">
            <button class="page-btn" disabled>上一页</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn">下一页</button>
        </div>
    </div>
</body>
</html>
