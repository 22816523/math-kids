<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手动录入测评题目 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 24px;
        }

        /* 页面头部 */
        .page-header {
            margin-bottom: 24px;
        }
        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
        }

        /* 表单容器 */
        .form-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        /* 书籍信息 */
        .book-info-card {
            background: #f5f5f5;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .book-info-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 12px;
        }

        .book-info-content {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        /* 表单项 */
        .form-item {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: "*";
            color: #f44336;
            margin-left: 4px;
        }

        .form-select {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }

        .form-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #999;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #999;
        }

        /* 选项列表 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .option-label {
            width: 60px;
            font-size: 14px;
            color: #666;
        }

        .option-input {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        /* 单选框组 */
        .radio-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .radio-item input {
            cursor: pointer;
        }

        .radio-item label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        /* 多选框组 */
        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        /* 提示信息 */
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* 底部按钮 */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 8px 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .btn-primary {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="breadcrumb">
            <a href="#">首页</a> / <a href="#">测评列表</a> / 手动录入题目
        </div>
        <div class="page-title">手动录入测评题目</div>
    </div>

    <!-- 表单容器 -->
    <div class="form-container">
        <div class="form-title">录入题目信息</div>

        <!-- 书籍信息 -->
        <div class="book-info-card">
            <div class="book-info-title">当前书籍</div>
            <div class="book-info-content">
                书名：《小王子》<br>
                作者：圣埃克苏佩里<br>
                适用年级：1-3年级
            </div>
        </div>

        <!-- 题目类型 -->
        <div class="form-item">
            <label class="form-label required">题目类型</label>
            <select class="form-select">
                <option>请选择题目类型</option>
                <option>单选题</option>
                <option>多选题</option>
                <option>判断题</option>
                <option>填空题</option>
            </select>
        </div>

        <!-- 题目内容 -->
        <div class="form-item">
            <label class="form-label required">题目内容</label>
            <textarea class="form-textarea" placeholder="请输入题目内容，不超过500个字符"></textarea>
            <div class="form-hint">已输入 0 / 500 字</div>
        </div>

        <!-- 选项（单选题/多选题） -->
        <div class="form-item">
            <label class="form-label required">选项</label>
            <div class="options-list">
                <div class="option-item">
                    <span class="option-label">选项 A</span>
                    <input type="text" class="option-input" placeholder="请输入选项A的内容">
                </div>
                <div class="option-item">
                    <span class="option-label">选项 B</span>
                    <input type="text" class="option-input" placeholder="请输入选项B的内容">
                </div>
                <div class="option-item">
                    <span class="option-label">选项 C</span>
                    <input type="text" class="option-input" placeholder="请输入选项C的内容">
                </div>
                <div class="option-item">
                    <span class="option-label">选项 D</span>
                    <input type="text" class="option-input" placeholder="请输入选项D的内容">
                </div>
            </div>
            <div class="form-hint">选择题必须填写选项</div>
        </div>

        <!-- 正确答案（单选题） -->
        <div class="form-item">
            <label class="form-label required">正确答案</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="answerA" name="answer">
                    <label for="answerA">选项 A</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="answerB" name="answer">
                    <label for="answerB">选项 B</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="answerC" name="answer">
                    <label for="answerC">选项 C</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="answerD" name="answer">
                    <label for="answerD">选项 D</label>
                </div>
            </div>
        </div>

        <!-- 正确答案（多选题，隐藏） -->
        <div class="form-item" style="display: none;">
            <label class="form-label required">正确答案（可多选）</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="multiA">
                    <label for="multiA">选项 A</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="multiB">
                    <label for="multiB">选项 B</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="multiC">
                    <label for="multiC">选项 C</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="multiD">
                    <label for="multiD">选项 D</label>
                </div>
            </div>
        </div>

        <!-- 正确答案（判断题，隐藏） -->
        <div class="form-item" style="display: none;">
            <label class="form-label required">正确答案</label>
            <div class="radio-group">
                <div class="radio-item">
                    <input type="radio" id="answerTrue" name="judge">
                    <label for="answerTrue">对</label>
                </div>
                <div class="radio-item">
                    <input type="radio" id="answerFalse" name="judge">
                    <label for="answerFalse">错</label>
                </div>
            </div>
        </div>

        <!-- 正确答案（填空题，隐藏） -->
        <div class="form-item" style="display: none;">
            <label class="form-label required">正确答案</label>
            <input type="text" class="form-input" placeholder="请输入正确答案">
            <div class="form-hint">如有多个答案，请用逗号分隔</div>
        </div>

        <!-- 题目解析 -->
        <div class="form-item">
            <label class="form-label">题目解析</label>
            <textarea class="form-textarea" placeholder="请输入题目解析，不超过500个字符"></textarea>
            <div class="form-hint">已输入 0 / 500 字</div>
        </div>

        <!-- 底部按钮 -->
        <div class="form-actions">
            <button class="btn btn-default">取消</button>
            <button class="btn btn-primary">保存</button>
        </div>
    </div>
</body>
</html>
