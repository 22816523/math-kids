<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统参数 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* 主体布局 */
        .main { display: flex; min-height: 100vh; }
        /* 侧边栏 */
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        /* Logo区域 */
        .sidebar-header { height: 60px; display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid #e0e0e0; font-size: 18px; font-weight: 600; color: #333; }
        .sidebar-menu { flex: 1; padding: 16px 0; overflow-y: auto; }
        .menu-group {
            margin-bottom: 8px;
        }
        .menu-group-title {
            padding: 12px 24px;
            font-size: 14px;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .menu-group-icon {
            font-size: 12px;
            color: #999;
            transition: transform 0.2s;
        }
        .menu-group.expanded .menu-group-icon {
            transform: rotate(90deg);
        }
        .menu-group-items {
            display: none;
        }
        .menu-group.expanded .menu-group-items {
            display: block;
        }
        .menu-item {
            padding: 10px 24px 10px 48px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
        }
        .menu-item:hover {
            background: #f5f5f5;
        }
        .menu-item.active {
            color: #333;
            font-weight: 600;
            background: #f5f5f5;
            border-left: 3px solid #333;
        }

        /* 右侧内容区 */
        .content { flex: 1; display: flex; flex-direction: column; }
        /* 顶部栏 */
        .header { height: 60px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        /* 面包屑 */
        .breadcrumb { font-size: 14px; color: #999; }
        .breadcrumb a { color: #666; text-decoration: none; }
        .breadcrumb a:hover { color: #333; }
        /* 用户信息 */
        .user-info { display: flex; align-items: center; gap: 16px; }
        .user-name { font-size: 14px; color: #333; }
        .logout-btn { font-size: 14px; color: #666; cursor: pointer; text-decoration: none; }
        .logout-btn:hover { color: #333; }
        /* 主内容区 */
        .main-content { flex: 1; padding: 24px; overflow-y: auto; }

        /* 页面操作栏 */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        /* 按钮 */
        .btn {
            height: 36px;
            padding: 0 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #333;
            color: #fff;
            border: 1px solid #333;
        }
        .btn-primary:hover {
            background: #555;
        }
        .btn-secondary {
            background: #fff;
            color: #333;
            border: 1px solid #999;
        }
        .btn-secondary:hover {
            background: #f5f5f5;
        }

        /* 标签页 */
        .tabs {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 0 24px;
            margin-bottom: 20px;
            display: flex;
            gap: 32px;
        }
        .tab {
            padding: 16px 0;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover {
            color: #333;
        }
        .tab.active {
            color: #333;
            font-weight: 600;
            border-bottom-color: #333;
        }

        /* 配置卡片 */
        .config-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        .config-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        /* 表单 */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .form-item.full-width {
            width: 100%;
        }
        .form-label {
            width: 120px;
            font-size: 14px;
            color: #333;
            flex-shrink: 0;
        }
        .form-label .required {
            color: #999;
            margin-left: 4px;
        }
        .form-input {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-input:focus {
            outline: none;
            border-color: #999;
        }
        .form-input[readonly] {
            background: transparent;
            border: none;
            padding-left: 0;
            cursor: default;
        }
        .param-input[readonly] {
            background: transparent;
            border: none;
            padding-left: 0;
            cursor: default;
        }
        .param-input:focus {
            outline: none;
        }
        .form-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        .form-textarea:focus {
            outline: none;
            border-color: #999;
        }
        .form-select {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        /* 开关 */
        .switch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .switch-item:last-child {
            border-bottom: none;
        }
        .switch-info {
            flex: 1;
        }
        .switch-label {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
        }
        .switch-desc {
            font-size: 12px;
            color: #999;
        }
        .switch {
            width: 48px;
            height: 24px;
            background: #e0e0e0;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .switch.on {
            background: #333;
        }
        .switch-handle {
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }
        .switch.on .switch-handle {
            left: 26px;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #999;
            background: #f5f5f5;
        }
        .upload-icon {
            font-size: 32px;
            color: #999;
            margin-bottom: 12px;
        }
        .upload-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        /* 预览图片 */
        .preview-image {
            width: 120px;
            height: 120px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 12px;
            margin-top: 12px;
        }

        /* 小型上传区域 */
        .upload-area-small {
            border: 2px dashed #e0e0e0;
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area-small:hover {
            border-color: #999;
            background: #f5f5f5;
        }
        .upload-area-small .upload-icon {
            font-size: 24px;
            color: #999;
            margin-bottom: 8px;
        }
        .upload-area-small .upload-text {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .upload-area-small .upload-hint {
            font-size: 11px;
            color: #999;
        }
        .preview-image-small {
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 11px;
            margin-top: 8px;
        }

        /* 参数列表 */
        .param-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .param-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .param-label {
            width: 200px;
            font-size: 14px;
            color: #333;
            flex-shrink: 0;
        }
        .param-input {
            flex: 1;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }
        .param-unit {
            font-size: 14px;
            color: #999;
            flex-shrink: 0;
        }

        /* 保存按钮区域 */
        .save-section {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 20px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="main">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">校校读吧管理平台</div>
            <div class="sidebar-menu">
            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>用户管理</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">学校管理</div>
                    <div class="menu-item">班级管理</div>
                    <div class="menu-item">小程序用户管理</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>内容管理</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">阅读计划</div>
                    <div class="menu-item">书籍资源库</div>
                    <div class="menu-item">测评管理</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                                        <span>数据分析</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">阅读数据分析</div>
                    <div class="menu-item">测评数据分析</div>
                    <div class="menu-item">用户行为分析</div>
                    <div class="menu-item">学校数据对比</div>
                    <div class="menu-item">数据导出中心</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>激励体系</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">积分规则</div>
                    <div class="menu-item">等级体系</div>
                    <div class="menu-item">徽章配置</div>
                    <div class="menu-item">证书配置</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>消息管理</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">系统消息</div>
                </div>
            </div>

            <div class="menu-group">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>用户反馈</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item">意见反馈</div>
                </div>
            </div>

            <div class="menu-group expanded">
                <div class="menu-group-title" onclick="toggleMenu(this)">
                    <span>系统配置</span>
                    <span class="menu-group-icon">[▶]</span>
                </div>
                <div class="menu-group-items">
                    <div class="menu-item active">系统参数</div>
                    <div class="menu-item">数据字典</div>
                </div>
            </div>
            </div>
        </div>

        <!-- 内容区 -->
        <div class="content">
            <div class="header">
                <div class="breadcrumb">
                    <a href="#">首页</a> > <a href="#">系统配置</a> > 系统参数
                </div>
                <div class="user-info">
                    <span class="user-name">管理员</span>
                    <a href="#" class="logout-btn">退出登录</a>
                </div>
            </div>
            <div class="main-content">

            <!-- 页面操作栏 -->
            <div class="page-header">
                <div>
                    <button class="btn btn-primary" id="editBtn" onclick="toggleEdit()">编辑</button>
                    <button class="btn btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display: none; margin-right: 8px;">取消</button>
                    <button class="btn btn-primary" id="saveBtn" onclick="saveConfig()" style="display: none;">保存</button>
                </div>
            </div>

            <!-- 业务参数 -->
            <div class="config-card">
                <div class="config-header">
                    <div class="config-title">业务参数</div>
                </div>
                <div class="param-list">
                    <div class="param-item">
                        <div class="param-label">图片上传大小限制</div>
                        <input type="number" class="param-input editable-input" value="5" readonly>
                        <div class="param-unit">MB</div>
                    </div>
                    <div class="param-item">
                        <div class="param-label">阅读计划结束后可查看天数</div>
                        <input type="number" class="param-input editable-input" value="30" readonly>
                        <div class="param-unit">天</div>
                    </div>
                </div>
            </div>

            <!-- 基本信息配置 -->
            <div class="config-card">
                <div class="config-header">
                    <div class="config-title">基本信息</div>
                </div>
                <div class="form-grid">
                    <div class="form-item">
                        <label class="form-label">系统名称<span class="required">*</span></label>
                        <input type="text" class="form-input editable-input" value="校校读吧管理平台" readonly>
                    </div>
                    <div class="form-item full-width">
                        <label class="form-label">版权信息</label>
                        <input type="text" class="form-input editable-input" value="© 2024 校校读吧 版权所有" readonly>
                    </div>
                    <div class="form-item full-width">
                        <label class="form-label">备案号</label>
                        <input type="text" class="form-input editable-input" value="京ICP备12345678号" readonly>
                    </div>
                    <div class="form-item full-width">
                        <label class="form-label">客服二维码</label>
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <div style="width: 100px; height: 100px; border: 1px solid #e0e0e0; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: #f5f5f5; color: #999; font-size: 12px;">
                                [二维码预览]
                            </div>
                            <button class="btn btn-secondary editable-btn" disabled style="display: none;">上传二维码</button>
                        </div>
                        <div class="form-hint editable-hint" style="margin-left: 120px; display: none;">建议尺寸：200x200px，支持PNG、JPG格式</div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
    let isEditing = false;

    function toggleMenu(element) {
        const menuGroup = element.parentElement;
        menuGroup.classList.toggle('expanded');
    }

    function toggleSwitch(element) {
        element.classList.toggle('on');
    }

    function toggleEdit() {
        isEditing = !isEditing;
        const editBtn = document.getElementById('editBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        const editableInputs = document.querySelectorAll('.editable-input');
        const editableBtns = document.querySelectorAll('.editable-btn');
        const editableHints = document.querySelectorAll('.editable-hint');

        if (isEditing) {
            editBtn.style.display = 'none';
            cancelBtn.style.display = 'inline-block';
            saveBtn.style.display = 'inline-block';
            editableInputs.forEach(input => input.removeAttribute('readonly'));
            editableBtns.forEach(btn => {
                btn.removeAttribute('disabled');
                btn.style.display = 'inline-block';
            });
            editableHints.forEach(hint => hint.style.display = 'block');
        } else {
            editBtn.style.display = 'inline-block';
            cancelBtn.style.display = 'none';
            saveBtn.style.display = 'none';
            editableInputs.forEach(input => input.setAttribute('readonly', 'readonly'));
            editableBtns.forEach(btn => {
                btn.setAttribute('disabled', 'disabled');
                btn.style.display = 'none';
            });
            editableHints.forEach(hint => hint.style.display = 'none');
        }
    }

    function cancelEdit() {
        toggleEdit();
        // 这里可以添加重置表单数据的逻辑
    }

    function saveConfig() {
        // 这里添加保存配置的逻辑
        alert('配置已保存');
        toggleEdit();
    }
    </script>
</body>
</html>
