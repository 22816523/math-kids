<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍上传 - 校校读吧管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 24px;
        }

        /* 页面头部 */
        .page-header {
            margin-bottom: 24px;
        }
        .breadcrumb {
            font-size: 14px;
            color: #999;
            margin-bottom: 12px;
        }
        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }
        .page-title {
            font-size: 20px;
            font-weight: 500;
            color: #333;
        }

        /* 表单容器 */
        .form-container {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-description {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* 表单项 */
        .form-item {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
        }

        .form-label.required::after {
            content: "*";
            color: #f44336;
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #999;
        }

        .form-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: #999;
        }

        /* 多选框组 */
        .checkbox-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-item input {
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 4px;
            padding: 40px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #999;
            background: #f5f5f5;
        }

        .upload-icon {
            font-size: 48px;
            color: #999;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: #999;
        }

        /* 预览区域 */
        .preview-area {
            margin-top: 16px;
        }

        .preview-image {
            width: 200px;
            height: 280px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
        }

        /* 提示信息 */
        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        /* 底部按钮 */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 8px 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .btn-primary {
            background: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="breadcrumb">
            <a href="#">首页</a> / <a href="#">书籍资源库</a> / 上传书籍
        </div>
        <div class="page-title">上传书籍</div>
    </div>

    <!-- 表单容器 -->
    <div class="form-container">
        <div class="form-title">书籍基本信息</div>
        <div class="form-description">
            请填写书籍的基本信息。标记为 * 的字段为必填项。上传后书籍默认为"已下架"状态，需要上传配套资源和配置测评后才能上架
        </div>

        <!-- 书名 -->
        <div class="form-item">
            <label class="form-label required">书名</label>
            <input type="text" class="form-input" placeholder="请输入书名，不超过100个字符">
        </div>

        <!-- 作者 -->
        <div class="form-item">
            <label class="form-label required">作者</label>
            <input type="text" class="form-input" placeholder="请输入作者姓名，不超过50个字符">
        </div>

        <!-- 出版社 -->
        <div class="form-item">
            <label class="form-label">出版社</label>
            <input type="text" class="form-input" placeholder="请输入出版社名称，不超过50个字符">
        </div>

        <!-- ISBN -->
        <div class="form-item">
            <label class="form-label">ISBN</label>
            <input type="text" class="form-input" placeholder="请输入13位ISBN编号">
            <div class="form-hint">国际标准书号，13位数字</div>
        </div>

        <!-- 适用年级 -->
        <div class="form-item">
            <label class="form-label required">适用年级</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="grade1">
                    <label for="grade1">一年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade2">
                    <label for="grade2">二年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade3">
                    <label for="grade3">三年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade4">
                    <label for="grade4">四年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade5">
                    <label for="grade5">五年级</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="grade6">
                    <label for="grade6">六年级</label>
                </div>
            </div>
        </div>

        <!-- 书籍分类 -->
        <div class="form-item">
            <label class="form-label">书籍分类</label>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="cat1">
                    <label for="cat1">文学</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat2">
                    <label for="cat2">科普</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat3">
                    <label for="cat3">历史</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat4">
                    <label for="cat4">艺术</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat5">
                    <label for="cat5">童话</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="cat6">
                    <label for="cat6">寓言</label>
                </div>
            </div>
        </div>

        <!-- 书籍简介 -->
        <div class="form-item">
            <label class="form-label">书籍简介</label>
            <textarea class="form-textarea" placeholder="请输入书籍简介，不超过500个字符"></textarea>
            <div class="form-hint">已输入 0 / 500 字</div>
        </div>

        <!-- 书籍封面 -->
        <div class="form-item">
            <label class="form-label required">书籍封面</label>
            <div class="upload-area">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击或拖拽上传书籍封面</div>
                <div class="upload-hint">支持JPG、PNG格式，建议尺寸400x600px，大小不超过2MB</div>
            </div>
            <div class="preview-area">
                <div class="preview-image">封面预览</div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="form-actions">
            <button class="btn btn-default">取消</button>
            <button class="btn btn-primary">保存</button>
        </div>
    </div>
</body>
</html>
