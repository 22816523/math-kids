<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI伴读业务流程图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1976d2;
            margin-bottom: 50px;
        }

        .flow-container {
            position: relative;
            padding: 40px 20px;
            border: 3px solid #1976d2;
            border-radius: 15px;
            background: #fafbfc;
        }

        /* 顶部箭头 */
        .top-arrow {
            position: absolute;
            top: -3px;
            right: 80px;
            width: 3px;
            height: 40px;
            background: #1976d2;
        }

        .top-arrow::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #1976d2;
        }

        /* 底部箭头 */
        .bottom-arrow {
            position: absolute;
            bottom: -3px;
            right: 80px;
            width: 3px;
            height: 40px;
            background: #1976d2;
        }

        .bottom-arrow::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 12px solid #1976d2;
        }

        /* 左侧箭头 */
        .left-arrow {
            position: absolute;
            left: 80px;
            bottom: -3px;
            width: 40px;
            height: 3px;
            background: #1976d2;
        }

        .left-arrow::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 12px solid #1976d2;
        }

        .flow-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            padding: 0 20px;
        }

        .role {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            line-height: 1.4;
            text-align: center;
            padding: 10px;
        }

        .avatar.admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .avatar.teacher {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .avatar.student {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .role-name {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        .arrow-horizontal {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .arrow-line {
            width: 80px;
            height: 3px;
            background: #1976d2;
            position: relative;
        }

        .arrow-line::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid #1976d2;
        }

        .arrow-line.green {
            background: #10b981;
        }

        .arrow-line.green::after {
            border-left-color: #10b981;
        }

        .arrow-text {
            font-size: 14px;
            font-weight: 600;
            color: #1976d2;
            white-space: nowrap;
        }

        .arrow-text.green {
            color: #10b981;
        }

        .cloud {
            width: 160px;
            height: 120px;
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(25, 118, 210, 0.3);
            padding: 20px;
        }

        .cloud-text {
            text-align: center;
            line-height: 1.5;
        }

        .label {
            position: absolute;
            font-size: 16px;
            font-weight: 600;
            color: #1976d2;
        }

        .label.top {
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
        }

        .label.bottom {
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .flow-content {
                flex-direction: column;
                gap: 40px;
            }

            .arrow-horizontal {
                transform: rotate(90deg);
            }

            .cloud {
                width: 120px;
                height: 120px;
                font-size: 14px;
            }

            .avatar {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">创建并发布阅读计划</div>

        <div class="flow-container">
            <div class="label top">创建并发布阅读计划</div>
            <div class="label bottom">数据反馈与评估</div>

            <div class="top-arrow"></div>
            <div class="bottom-arrow"></div>
            <div class="left-arrow"></div>

            <div class="flow-content">
                <!-- 阅读管理员 -->
                <div class="role">
                    <div class="avatar admin">阅读<br>管理员</div>
                    <div class="role-name">阅读管理员</div>
                </div>

                <!-- 箭头1 -->
                <div class="arrow-horizontal">
                    <div class="arrow-line"></div>
                </div>

                <!-- 任课教师 -->
                <div class="role">
                    <div class="avatar teacher">任课<br>教师</div>
                    <div class="role-name">任课教师</div>
                </div>

                <!-- 箭头2 -->
                <div class="arrow-horizontal">
                    <div class="arrow-text">为班级报名</div>
                    <div class="arrow-line"></div>
                    <div class="arrow-text">并下发任务</div>
                </div>

                <!-- 学生 -->
                <div class="role">
                    <div class="avatar student">学生</div>
                    <div class="role-name">学生</div>
                </div>

                <!-- 箭头3 -->
                <div class="arrow-horizontal">
                    <div class="arrow-text green">完成阅读</div>
                    <div class="arrow-line green"></div>
                    <div class="arrow-text green">并打卡</div>
                </div>

                <!-- 系统/数据中心 -->
                <div class="cloud">
                    <div class="cloud-text">系统/数据中心</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
